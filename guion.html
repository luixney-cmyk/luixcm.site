<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Guiones - Sen. Ivideliza Reyes</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client?external=react",
            "lucide-react": "https://esm.sh/lucide-react@0.344.0?bundle&external=react",
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js"
        }
    }
    </script>

    <script>
        window.addEventListener('error', function(event) {
            const root = document.getElementById('root');
            if(root) {
                root.innerHTML = '<div style="padding:20px; color:red; font-family:sans-serif; text-align:center;"><b>Error crítico en la aplicación:</b><br><br>' + event.message + '<br><br>Revisa la consola (F12) para más detalles.</div>';
            }
        });
    </script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased">
    
    <div id="root">
        <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; font-family:sans-serif; color:#64748b;">
            <div style="width:40px; height:40px; border:4px solid #8b5cf6; border-top-color:transparent; border-radius:50%; animation: spin 1s linear infinite;"></div>
            <p style="margin-top:20px; font-weight:bold;">Cargando Estudio de Guiones...</p>
            <style>@keyframes spin { 100% { transform: rotate(360deg); } }</style>
        </div>
    </div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
            Video, Settings, LogOut, Key, AlertTriangle, Send, 
            Copy, CheckCircle2, ChevronLeft, Sparkles, RefreshCw, 
            Globe, Edit3, Type, Users, BookOpen, Megaphone, Smile
        } from 'lucide-react';
        
        import { initializeApp } from 'firebase/app';
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from 'firebase/auth';
        import { getFirestore } from 'firebase/firestore';

        // --- CREDENCIALES DE FIREBASE (MISMAS QUE INDEX) ---
        const firebaseConfig = {
            apiKey: "AIzaSyA7xjysJVQb3tYEb8ZU9yHbs-MBDWVUhk4",
            authDomain: "gestor-ivi.firebaseapp.com",
            projectId: "gestor-ivi",
            storageBucket: "gestor-ivi.firebasestorage.app",
            messagingSenderId: "562230194451",
            appId: "1:562230194451:web:3877b3bf0d18b6ac912ae6",
            measurementId: "G-5MDJNBV15H"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        provider.setCustomParameters({ prompt: 'select_account' });

        const ALLOWED_EMAIL = "luixnay@gmail.com";
        const normalizeEmail = (email) => (email || "").trim().toLowerCase();
        const isAllowedUser = (firebaseUser) => {
            return firebaseUser && normalizeEmail(firebaseUser.email) === ALLOWED_EMAIL && firebaseUser.emailVerified === true;
        };

        const copyToClipboard = (text) => {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            textArea.style.left = "-9999px";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            let successful = false;
            try { successful = document.execCommand('copy'); } catch (err) {}
            document.body.removeChild(textArea);
            return successful;
        };

        // --- STREAMING_CHUNK:Configurando API de Gemini... ---
        const GEMINI_MODEL = "gemini-1.5-flash"; // Usamos 1.5-flash para estabilidad y soporte de Grounding

        const fetchGemini = async (payload, apiKey) => {
            const cleanApiKey = (apiKey || "").trim().replace(/^['"]|['"]$/g, "");
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent`;
            
            const response = await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-goog-api-key': cleanApiKey
                },
                body: JSON.stringify(payload)
            });

            if (!response.ok) {
                let detail = "";
                try { const errJson = await response.json(); detail = errJson?.error?.message ? ` - ${errJson.error.message}` : ""; } catch (_) {}
                if (response.status === 400) throw new Error(`Solicitud inválida${detail}`);
                if (response.status === 401 || response.status === 403) throw new Error(`API Key rechazada${detail}`);
                if (response.status === 429) throw new Error(`Límite de peticiones alcanzado. Espera un minuto.${detail}`);
                throw new Error(`Error Gemini ${response.status}${detail}`);
            }

            return await response.json();
        };

        const availableTones = [
            { id: 'Social', label: 'Social / Territorio', icon: Users, desc: 'Cercano, lenguaje cotidiano, empatía con la gente.' },
            { id: 'Legislativo', label: 'Legislativo', icon: BookOpen, desc: 'Tono formal, sustento jurídico, propuestas de ley.' },
            { id: 'Político', label: 'Político / Contraste', icon: Megaphone, desc: 'Firmeza, debate, contraste de ideas, oposición responsable.' },
            { id: 'Familiar', label: 'Familiar / Personal', icon: Smile, desc: 'Muy casual, vivencias personales, lado humano.' }
        ];

        // --- STREAMING_CHUNK:Definiendo componente principal y estados... ---
        function App() {
            const [user, setUser] = useState(null);
            const [authLoading, setAuthLoading] = useState(true);
            const [loginError, setLoginError] = useState("");
            
            const [isApiModalOpen, setIsApiModalOpen] = useState(false);
            const [tempApiKey, setTempApiKey] = useState("");
            const [pendingAction, setPendingAction] = useState(null);
            const [errorMsg, setErrorMsg] = useState("");

            // Estados del Formulario de Guion
            const [topic, setTopic] = useState("");
            const [instructions, setInstructions] = useState("");
            const [selectedTones, setSelectedTones] = useState(['Social']);
            const [useGrounding, setUseGrounding] = useState(true); // Buscar en internet
            
            // Estados del Editor
            const [scriptContent, setScriptContent] = useState("");
            const [isGenerating, setIsGenerating] = useState(false);
            const [isAdapting, setIsAdapting] = useState(false);
            const [isRefining, setIsRefining] = useState(false);
            const [refineText, setRefineText] = useState("");
            const [copied, setCopied] = useState(false);

            useEffect(() => {
                const unsubscribe = onAuthStateChanged(auth, async (currentUser) => {
                    if (currentUser && !isAllowedUser(currentUser)) {
                        setUser(null);
                        setLoginError(`Acceso denegado. Solo autorizado para ${ALLOWED_EMAIL}.`);
                        await signOut(auth);
                        setAuthLoading(false);
                        return;
                    }
                    setUser(currentUser);
                    setAuthLoading(false);
                });
                return () => unsubscribe();
            }, []);

            const handleLogin = async () => {
                setLoginError("");
                try {
                    const result = await signInWithPopup(auth, provider);
                    if (!isAllowedUser(result.user)) {
                        await signOut(auth);
                        setUser(null);
                        setLoginError(`Acceso denegado. Solo autorizado para ${ALLOWED_EMAIL}.`);
                    }
                } catch (error) {
                    setLoginError("Error al iniciar sesión: " + error.message);
                }
            };

            const toggleTone = (toneId) => {
                setSelectedTones(prev => 
                    prev.includes(toneId) 
                        ? prev.filter(t => t !== toneId) 
                        : [...prev, toneId]
                );
            };

            const executeWithApiKey = (actionCallback) => {
                const key = localStorage.getItem('gemini_api_key');
                if (!key) {
                    setPendingAction(() => actionCallback); 
                    setIsApiModalOpen(true);
                } else { actionCallback(key); }
            };

            const saveApiKeyAndExecute = () => {
                const cleanKey = tempApiKey.trim().replace(/^['"]|['"]$/g, "");
                if(cleanKey) {
                    localStorage.setItem('gemini_api_key', cleanKey);
                    setIsApiModalOpen(false);
                    if(pendingAction) {
                        pendingAction(cleanKey);
                        setPendingAction(null);
                    }
                }
            };

            const handleCopy = () => {
                if (copyToClipboard(scriptContent)) {
                    setCopied(true);
                    setTimeout(() => setCopied(false), 2000);
                }
            };

            // --- STREAMING_CHUNK:Lógica de Generación de Guiones... ---
            const runGenerateScript = async (currentApiKey) => {
                setIsGenerating(true);
                setErrorMsg("");
                setScriptContent("");

                if (selectedTones.length === 0) setSelectedTones(['Social']);

                let toneDescriptions = selectedTones.map(t => {
                    const found = availableTones.find(at => at.id === t);
                    return found ? `- ${found.label}: ${found.desc}` : '';
                }).join('\n');

                const systemPrompt = `
                    Eres el estratega principal y guionista de la Senadora Ivideliza Reyes (Estado de Nayarit, México, Partido PAN).
                    Tu tarea es escribir un GUION PARA VIDEO (Reels, TikTok, Facebook) impactante, claro y directo.
                    
                    REGLAS INQUEBRANTABLES:
                    1. ESTRICTAMENTE PROHIBIDO inventar datos, leyes, presupuestos o fechas. Si el usuario te pide hablar de un tema, limítate a los hechos verificables.
                    2. Habla SIEMPRE en primera persona del singular ("Yo", "Estaré") o plural inclusivo ("Estamos", "Los nayaritas"). Nunca en tercera persona de la senadora.
                    3. No seas acartonado. Escribe como habla una persona real frente a una cámara. Frases cortas, contundentes.
                    4. Incluye indicaciones visuales simples entre corchetes, ej: [Mirando a cámara], [Texto en pantalla: X], [Cambio de toma].
                    5. El tono del guion debe ser una mezcla de:
                    ${toneDescriptions}
                `;

                const userPrompt = `
                    TEMA DEL VIDEO:
                    ${topic}

                    INSTRUCCIONES ADICIONALES DEL USUARIO:
                    ${instructions || "Sin instrucciones adicionales."}
                `;

                const payload = {
                    contents: [{ parts: [{ text: userPrompt }] }],
                    systemInstruction: { parts: [{ text: systemPrompt }] },
                };

                // Si está activada la opción de buscar en internet (Grounding)
                if (useGrounding) {
                    payload.tools = [{ google_search: {} }];
                }

                try {
                    const data = await fetchGemini(payload, currentApiKey);
                    const generatedText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    
                    if (!generatedText) throw new Error("La IA no devolvió un texto válido.");
                    setScriptContent(generatedText);
                    
                } catch (err) {
                    setErrorMsg("Error al generar: " + (err.message || "Verifica tu conexión y API Key."));
                } finally {
                    setIsGenerating(false);
                }
            };

            // --- STREAMING_CHUNK:Lógica del botón Adecuar (Mejorar redacción)... ---
            const runAdaptScript = async (currentApiKey) => {
                if (!scriptContent.trim()) return;
                setIsAdapting(true);
                setErrorMsg("");

                const systemPrompt = `
                    Eres un experto corrector de estilo y editor de video. 
                    Tu única tarea es tomar el guion proporcionado por el usuario y MEJORAR su redacción, corregir faltas de ortografía, arreglar saltos abruptos y hacer que el texto fluya de manera perfecta y natural para ser leído en voz alta.
                    
                    REGLAS ESTRICTAS:
                    1. NO inventes ni agregues ideas nuevas.
                    2. NO quites información clave.
                    3. NO cambies el sentido del texto.
                    4. Mantén las acotaciones visuales [como estas] si existen.
                    5. Devuelve ÚNICAMENTE el texto corregido, sin saludos ni explicaciones.
                `;

                const payload = {
                    contents: [{ parts: [{ text: `Texto a pulir y adecuar:\n\n${scriptContent}` }] }],
                    systemInstruction: { parts: [{ text: systemPrompt }] },
                };

                try {
                    const data = await fetchGemini(payload, currentApiKey);
                    const polishedText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    
                    if (polishedText) {
                        setScriptContent(polishedText);
                    }
                } catch (err) {
                    setErrorMsg("Error al adecuar el texto: " + err.message);
                } finally {
                    setIsAdapting(false);
                }
            };

            // --- STREAMING_CHUNK:Lógica para Refinar (Dar instrucciones de cambio)... ---
            const runRefineScript = async (currentApiKey) => {
                if (!scriptContent.trim() || !refineText.trim()) return;
                setIsRefining(true);
                setErrorMsg("");

                const systemPrompt = `
                    Eres el guionista de la Senadora Ivideliza Reyes.
                    Se te entregará un guion de video existente y una INSTRUCCIÓN ESPECÍFICA de tu director de comunicación para modificarlo.
                    
                    Debes reescribir el guion aplicando EXACTAMENTE lo que pide la instrucción.
                    Mantén las reglas de hablar en primera persona y no inventar datos falsos.
                    Devuelve el guion completo ya modificado. No des explicaciones de lo que cambiaste.
                `;

                const userPrompt = `
                    GUION ACTUAL:
                    ${scriptContent}

                    INSTRUCCIÓN DE MODIFICACIÓN:
                    ${refineText}
                `;

                const payload = {
                    contents: [{ parts: [{ text: userPrompt }] }],
                    systemInstruction: { parts: [{ text: systemPrompt }] },
                };

                try {
                    const data = await fetchGemini(payload, currentApiKey);
                    const refinedText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    
                    if (refinedText) {
                        setScriptContent(refinedText);
                        setRefineText(""); // Limpiar input después de éxito
                    }
                } catch (err) {
                    setErrorMsg("Error al refinar el guion: " + err.message);
                } finally {
                    setIsRefining(false);
                }
            };

            // --- STREAMING_CHUNK:Renderizado de UI... ---
            if (authLoading) return null; 

            if (!user) {
                return (
                    <div className="flex items-center justify-center h-screen bg-gradient-to-br from-violet-50 to-slate-100 relative z-10">
                        <div className="bg-white p-10 rounded-3xl shadow-xl max-w-md w-full text-center border border-slate-200 m-4">
                            <div className="bg-violet-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6">
                                <Video className="w-10 h-10 text-violet-600" />
                            </div>
                            <h1 className="text-2xl font-black text-slate-800 mb-2">Estudio de Guiones</h1>
                            <p className="text-slate-500 mb-8 font-medium">Herramienta exclusiva - Sen. Ivideliza Reyes</p>
                            
                            {loginError && (
                                <div className="mb-4 bg-red-50 text-red-600 p-3 rounded-lg text-sm border border-red-200 text-left">
                                    <AlertTriangle className="w-4 h-4 inline mr-2"/> {loginError}
                                </div>
                            )}

                            <button onClick={handleLogin} className="w-full flex items-center justify-center gap-3 bg-white border-2 border-slate-200 hover:bg-slate-50 hover:border-slate-300 text-slate-700 py-3 px-4 rounded-xl font-bold transition-all shadow-sm">
                                <svg className="w-5 h-5" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/><path fill="none" d="M1 1h22v22H1z"/></svg>
                                Ingresar con Google
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex flex-col h-screen overflow-hidden bg-slate-50 relative z-10">
                    
                    {/* Header */}
                    <header className="bg-white border-b border-slate-200 p-4 flex items-center justify-between shrink-0">
                        <div className="flex items-center gap-4">
                            <a href="index.html" className="flex items-center gap-2 text-slate-500 hover:text-violet-600 font-bold text-sm bg-slate-100 hover:bg-violet-50 px-3 py-1.5 rounded-lg transition-colors">
                                <ChevronLeft className="w-4 h-4"/> Volver al Gestor
                            </a>
                            <div className="h-6 w-px bg-slate-200 hidden md:block"></div>
                            <h1 className="text-lg font-bold text-slate-800 hidden md:flex items-center gap-2">
                                <Video className="w-5 h-5 text-violet-600"/> Creador de Guiones
                            </h1>
                        </div>
                        <div className="flex items-center gap-4">
                            <button onClick={() => setIsApiModalOpen(true)} className="text-slate-400 hover:text-violet-600 p-2 rounded-md transition-colors bg-slate-100 hover:bg-violet-50" title="Configurar API Key">
                                <Key className="w-5 h-5"/>
                            </button>
                            <div className="flex items-center gap-2 border-l border-slate-200 pl-4">
                                <img src={user.photoURL || "https://ui-avatars.com/api/?name=User"} className="w-8 h-8 rounded-full border border-slate-200" />
                                <button onClick={() => signOut(auth)} className="text-slate-400 hover:text-red-500 p-1 rounded-md transition-colors" title="Cerrar sesión"><LogOut className="w-5 h-5"/></button>
                            </div>
                        </div>
                    </header>

                    {errorMsg && (
                        <div className="bg-red-50 text-red-600 p-3 text-sm text-center border-b border-red-100 flex justify-center items-center gap-2 shrink-0">
                            <AlertTriangle className="w-4 h-4"/> {errorMsg}
                        </div>
                    )}

                    {/* Area Principal de Trabajo */}
                    <div className="flex-1 overflow-y-auto p-4 md:p-6">
                        <div className="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6 h-full min-h-min">
                            
                            {/* PANEL IZQUIERDO: CONFIGURACIÓN */}
                            <div className="lg:col-span-4 space-y-5">
                                
                                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-5">
                                    <h2 className="font-bold text-slate-800 mb-4 flex items-center gap-2">
                                        <Edit3 className="w-5 h-5 text-violet-600"/> 1. ¿De qué hablaremos?
                                    </h2>
                                    
                                    <div className="space-y-4">
                                        <div>
                                            <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Tema Principal (Obligatorio)</label>
                                            <textarea 
                                                value={topic} 
                                                onChange={(e) => setTopic(e.target.value)} 
                                                placeholder="Ej: El problema del agua en Tepic y cómo el gobierno no ha respondido..."
                                                className="w-full h-24 p-3 rounded-xl border border-slate-300 focus:border-violet-500 focus:ring-2 focus:ring-violet-100 outline-none resize-none text-sm"
                                            />
                                        </div>

                                        <div>
                                            <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 flex justify-between">
                                                <span>Instrucciones / Contexto</span>
                                                <span className="text-slate-400 font-normal">(Opcional)</span>
                                            </label>
                                            <textarea 
                                                value={instructions} 
                                                onChange={(e) => setInstructions(e.target.value)} 
                                                placeholder="Ej: Que dure menos de un minuto. Mencionar que estuvimos en la colonia Mololoa ayer."
                                                className="w-full h-20 p-3 rounded-xl border border-slate-300 focus:border-violet-500 outline-none resize-none text-sm bg-slate-50"
                                            />
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-5">
                                    <h2 className="font-bold text-slate-800 mb-4 flex items-center gap-2">
                                        <Settings className="w-5 h-5 text-violet-600"/> 2. Configuración de IA
                                    </h2>

                                    <div className="mb-4">
                                        <label className="flex items-center gap-3 p-3 rounded-xl border border-violet-200 bg-violet-50 cursor-pointer hover:bg-violet-100 transition-colors">
                                            <input 
                                                type="checkbox" 
                                                checked={useGrounding} 
                                                onChange={(e) => setUseGrounding(e.target.checked)}
                                                className="w-5 h-5 text-violet-600 rounded border-violet-300 focus:ring-violet-500"
                                            />
                                            <div>
                                                <p className="font-bold text-violet-900 text-sm flex items-center gap-1">
                                                    <Globe className="w-4 h-4"/> Buscar en Internet
                                                </p>
                                                <p className="text-[10px] text-violet-700">Evita inventar datos y busca información real sobre el tema.</p>
                                            </div>
                                        </label>
                                    </div>

                                    <div>
                                        <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">Tono del Video (Puedes elegir varios)</label>
                                        <div className="grid grid-cols-2 gap-2">
                                            {availableTones.map(tone => {
                                                const isSelected = selectedTones.includes(tone.id);
                                                return (
                                                    <button 
                                                        key={tone.id}
                                                        onClick={() => toggleTone(tone.id)}
                                                        className={`p-2 rounded-xl text-xs font-bold flex flex-col items-center gap-1 border-2 transition-all ${isSelected ? 'border-violet-500 bg-violet-50 text-violet-700 shadow-sm' : 'bg-white text-slate-500 border-slate-100 hover:bg-slate-50 hover:border-slate-300'}`}
                                                    >
                                                        <tone.icon className="w-4 h-4"/>
                                                        {tone.id}
                                                    </button>
                                                )
                                            })}
                                        </div>
                                    </div>
                                </div>

                                <button 
                                    onClick={() => executeWithApiKey(runGenerateScript)} 
                                    disabled={!topic.trim() || isGenerating}
                                    className="w-full py-4 rounded-xl font-black flex items-center justify-center gap-2 bg-slate-800 text-white hover:bg-slate-900 transition-all disabled:opacity-50 disabled:cursor-not-allowed shadow-md"
                                >
                                    {isGenerating ? <><RefreshCw className="w-5 h-5 animate-spin"/> Escribiendo Guion...</> : <><Sparkles className="w-5 h-5"/> Generar Guion Mágico</>}
                                </button>
                            </div>

                            {/* PANEL DERECHO: RESULTADO Y EDICIÓN */}
                            <div className="lg:col-span-8 flex flex-col space-y-4">
                                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 flex flex-col h-full overflow-hidden flex-1 min-h-[400px]">
                                    
                                    <div className="bg-slate-50 border-b border-slate-200 p-4 flex justify-between items-center shrink-0">
                                        <h2 className="font-bold text-slate-800 flex items-center gap-2">
                                            <Type className="w-5 h-5 text-blue-600"/> 3. Resultado y Edición
                                        </h2>
                                        
                                        <div className="flex items-center gap-2">
                                            {/* BOTON ADECUAR (NUEVO) */}
                                            <button 
                                                onClick={() => executeWithApiKey(runAdaptScript)}
                                                disabled={!scriptContent.trim() || isAdapting || isGenerating}
                                                className="text-xs bg-purple-100 hover:bg-purple-200 text-purple-700 px-3 py-1.5 rounded-lg font-bold flex items-center gap-1 transition-colors border border-purple-200 shadow-sm disabled:opacity-50"
                                                title="Corrige gramática y mejora la fluidez sin cambiar tus ideas."
                                            >
                                                {isAdapting ? <><RefreshCw className="w-4 h-4 animate-spin"/> Adecuando...</> : <><Sparkles className="w-4 h-4"/> Adecuar</>}
                                            </button>
                                            
                                            <button 
                                                onClick={handleCopy}
                                                disabled={!scriptContent.trim()}
                                                className={`text-xs px-3 py-1.5 rounded-lg font-bold flex items-center gap-1 transition-colors border shadow-sm disabled:opacity-50 ${copied ? 'bg-green-100 text-green-700 border-green-300' : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-100'}`}
                                            >
                                                {copied ? <><CheckCircle2 className="w-4 h-4"/> Copiado</> : <><Copy className="w-4 h-4"/> Copiar</>}
                                            </button>
                                        </div>
                                    </div>
                                    
                                    <div className="p-4 flex-1 flex flex-col relative">
                                        {scriptContent === "" && !isGenerating ? (
                                            <div className="absolute inset-0 flex flex-col items-center justify-center text-slate-300 p-6 text-center">
                                                <Video className="w-16 h-16 mb-4 opacity-50"/>
                                                <p className="font-medium">El guion generado aparecerá aquí.</p>
                                                <p className="text-sm mt-2">Puedes editarlo directamente escribiendo sobre él.</p>
                                            </div>
                                        ) : (
                                            <textarea
                                                value={scriptContent}
                                                onChange={(e) => setScriptContent(e.target.value)}
                                                disabled={isGenerating || isAdapting || isRefining}
                                                className="w-full flex-1 p-4 text-base text-slate-700 font-medium leading-relaxed resize-none focus:outline-none focus:ring-2 focus:ring-blue-100 rounded-xl border-transparent focus:border-blue-200 transition-all bg-white disabled:bg-slate-50 disabled:text-slate-400"
                                                placeholder="Escribe o genera un guion..."
                                            />
                                        )}
                                    </div>

                                    {/* SECCIÓN REFINAR */}
                                    <div className="p-4 bg-slate-50 border-t border-slate-200 shrink-0">
                                        <p className="text-[10px] font-bold text-blue-600 uppercase tracking-wider mb-2">Ajustes de IA (Refinar)</p>
                                        <div className="flex gap-2">
                                            <input 
                                                type="text"
                                                value={refineText}
                                                onChange={(e) => setRefineText(e.target.value)}
                                                disabled={!scriptContent.trim() || isRefining || isGenerating || isAdapting}
                                                placeholder="Ej. Hazlo más corto, menciona la ley de aguas..."
                                                className="flex-1 p-3 rounded-xl border border-slate-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none text-sm disabled:bg-slate-100"
                                                onKeyDown={(e) => {
                                                    if(e.key === 'Enter' && refineText.trim()) { executeWithApiKey(runRefineScript); }
                                                }}
                                            />
                                            <button 
                                                onClick={() => executeWithApiKey(runRefineScript)}
                                                disabled={!refineText.trim() || !scriptContent.trim() || isRefining || isGenerating || isAdapting}
                                                className="bg-blue-500 hover:bg-blue-600 text-white px-5 rounded-xl font-bold transition-colors disabled:opacity-50 flex items-center gap-2"
                                            >
                                                {isRefining ? <RefreshCw className="w-5 h-5 animate-spin"/> : <Edit3 className="w-5 h-5"/>}
                                                <span className="hidden sm:inline">Refinar</span>
                                            </button>
                                        </div>
                                    </div>

                                </div>
                            </div>
                        </div>
                    </div>

                    {/* MODAL API KEY */}
                    {isApiModalOpen && (
                        <div className="fixed inset-0 bg-black/60 z-[60] flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden">
                                <div className="bg-violet-600 p-6 text-center">
                                    <div className="bg-white/20 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                                        <Key className="w-8 h-8 text-white" />
                                    </div>
                                    <h2 className="text-xl font-bold text-white">Configurar Gemini API Key</h2>
                                    <p className="text-violet-100 text-sm mt-2">Guarda tu llave de acceso para usar las funciones mágicas.</p>
                                </div>
                                <div className="p-6">
                                    <label className="block text-sm font-bold text-slate-700 mb-2">Ingresa tu API Key:</label>
                                    <input 
                                        type="password" 
                                        value={tempApiKey} 
                                        onChange={(e) => setTempApiKey(e.target.value)} 
                                        placeholder="AIzaSyA..." 
                                        className="w-full p-4 rounded-xl border-2 border-slate-200 focus:border-violet-500 outline-none text-slate-800 font-mono transition-colors"
                                    />
                                    <div className="mt-6 flex justify-end gap-3">
                                        <button onClick={() => { setIsApiModalOpen(false); setPendingAction(null); }} className="px-5 py-3 text-slate-500 font-medium hover:bg-slate-100 rounded-xl transition-colors">Cancelar</button>
                                        <button onClick={saveApiKeyAndExecute} disabled={!tempApiKey.trim()} className="px-6 py-3 bg-violet-600 hover:bg-violet-700 text-white rounded-xl font-bold disabled:opacity-50 transition-colors shadow-md">Guardar</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        try {
            const root = createRoot(document.getElementById('root'));
            root.render(<App />);
        } catch (error) {
            console.error(error);
            document.getElementById('root').innerHTML = '<div style="padding:20px; color:red; font-family:sans-serif; text-align:center;"><b>Error crítico al renderizar:</b><br><br>' + error.message + '</div>';
        }
    </script>
</body>
</html>
