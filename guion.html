<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creador de Guiones - Sen. Ivideliza Reyes</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client?external=react",
            "lucide-react": "https://esm.sh/lucide-react@0.344.0?bundle&external=react",
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js"
        }
    }
    </script>

    <script>
        window.addEventListener('error', function(event) {
            const root = document.getElementById('root');
            if(root) {
                root.innerHTML = '<div style="padding:20px; color:red; font-family:sans-serif; text-align:center;"><b>Error crítico en la aplicación:</b><br><br>' + event.message + '<br><br>Revisa la consola (F12) para más detalles.</div>';
            }
        });
    </script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased overflow-hidden">
    
    <div id="root">
        <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; font-family:sans-serif; color:#64748b;">
            <div style="width:40px; height:40px; border:4px solid #8b5cf6; border-top-color:transparent; border-radius:50%; animation: spin 1s linear infinite;"></div>
            <p style="margin-top:20px; font-weight:bold;">Cargando Creador de Guiones...</p>
            <style>@keyframes spin { 100% { transform: rotate(360deg); } }</style>
        </div>
    </div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { Video, Copy, Plus, Menu, X, ArrowLeft, Send, CheckCircle2, History, AlertTriangle, Globe, Sparkles, Save, Edit3, Type, Trash2, Key, Users, BookOpen, Megaphone, Smile, RefreshCw } from 'lucide-react';
        
        import { initializeApp } from 'firebase/app';
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from 'firebase/auth';
        import { getFirestore, collection, doc, onSnapshot, addDoc, serverTimestamp, updateDoc, deleteDoc } from 'firebase/firestore';

        const firebaseConfig = {
            apiKey: "AIzaSyA7xjysJVQb3tYEb8ZU9yHbs-MBDWVUhk4",
            authDomain: "gestor-ivi.firebaseapp.com",
            projectId: "gestor-ivi",
            storageBucket: "gestor-ivi.firebasestorage.app",
            messagingSenderId: "562230194451",
            appId: "1:562230194451:web:3877b3bf0d18b6ac912ae6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        provider.setCustomParameters({ prompt: 'select_account' });
        const appId = firebaseConfig.projectId;

        const ALLOWED_EMAIL = "luixnay@gmail.com";
        const isAllowedUser = (firebaseUser) => {
            return firebaseUser && (firebaseUser.email || "").trim().toLowerCase() === ALLOWED_EMAIL;
        };

        const copyToClipboard = (text) => {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            textArea.style.left = "-9999px";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            let successful = false;
            try { successful = document.execCommand('copy'); } catch (err) {}
            document.body.removeChild(textArea);
            return successful;
        };

        const delay = (ms) => new Promise(res => setTimeout(res, ms));

        const GEMINI_MODEL = "gemini-2.5-flash"; 

        const fetchGeminiScript = async (payload, apiKey) => {
            const cleanApiKey = (apiKey || "").trim().replace(/^['"]|['"]$/g, "");
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent`;
            
            const response = await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-goog-api-key': cleanApiKey
                },
                body: JSON.stringify(payload)
            });

            if (!response.ok) {
                let detail = "";
                try { const errJson = await response.json(); detail = errJson?.error?.message ? ` - ${errJson.error.message}` : ""; } catch (_) {}
                throw new Error(`Error Gemini ${response.status}${detail}`);
            }
            return await response.json();
        };

        function App() {
            const [user, setUser] = useState(null);
            const [authLoading, setAuthLoading] = useState(true);
            const [loginError, setLoginError] = useState("");
            const [errorMsg, setErrorMsg] = useState("");

            // Estado de Guiones e Historial
            const [guionesList, setGuionesList] = useState([]);
            const [activeGuionId, setActiveGuionId] = useState(null);
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);
            const [isSaving, setIsSaving] = useState(false);

            // Campos del formulario
            const [temaText, setTemaText] = useState("");
            const [contextoText, setContextoText] = useState("");
            const [useGrounding, setUseGrounding] = useState(true);
            const [activeTones, setActiveTones] = useState([]);
            
            // Editor de resultado
            const [scriptContent, setScriptContent] = useState("");
            const [isGenerating, setIsGenerating] = useState(false);
            const [isAdapting, setIsAdapting] = useState(false);
            
            // Refinamiento
            const [refineText, setRefineText] = useState("");
            const [isRefining, setIsRefining] = useState(false);
            const [copied, setCopied] = useState(false);

            // API Key management
            const [isApiModalOpen, setIsApiModalOpen] = useState(false);
            const [tempApiKey, setTempApiKey] = useState("");
            const [pendingAction, setPendingAction] = useState(null);

            useEffect(() => {
                const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
                    if (currentUser && !isAllowedUser(currentUser)) {
                        setUser(null);
                        setLoginError(`Acceso denegado. Solo autorizado para ${ALLOWED_EMAIL}.`);
                        signOut(auth);
                    } else {
                        setUser(currentUser);
                    }
                    setAuthLoading(false);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                
                const guionesRef = collection(db, 'artifacts', appId, 'users', user.uid, 'guiones');
                const unsub = onSnapshot(guionesRef, (snap) => {
                    const fetched = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    fetched.sort((a, b) => (b.updatedAt?.toMillis() || b.createdAt?.toMillis() || 0) - (a.updatedAt?.toMillis() || a.createdAt?.toMillis() || 0));
                    setGuionesList(fetched);
                }, (err) => {
                    console.error(err);
                    setErrorMsg("Error cargando historial de guiones.");
                });

                return () => unsub();
            }, [user]);

            const handleLogin = async () => {
                setLoginError("");
                try {
                    const result = await signInWithPopup(auth, provider);
                    if (!isAllowedUser(result.user)) {
                        await signOut(auth);
                        setLoginError(`Acceso denegado. Solo para ${ALLOWED_EMAIL}.`);
                    }
                } catch (error) { setLoginError("Error: " + error.message); }
            };

            const toggleTone = (tone) => {
                if (activeTones.includes(tone)) {
                    setActiveTones(activeTones.filter(t => t !== tone));
                } else {
                    setActiveTones([...activeTones, tone]);
                }
            };

            const createNewGuion = () => {
                setActiveGuionId(null);
                setTemaText("");
                setContextoText("");
                setScriptContent("");
                setActiveTones([]);
                setUseGrounding(true);
                if (window.innerWidth < 1024) setIsSidebarOpen(false);
            };

            const loadGuion = (g) => {
                setActiveGuionId(g.id);
                setTemaText(g.tema || "");
                setContextoText(g.contexto || "");
                setScriptContent(g.contenido || "");
                setActiveTones(g.tonos || []);
                setUseGrounding(g.useGrounding ?? true);
                if (window.innerWidth < 1024) setIsSidebarOpen(false);
            };

            const saveCurrentGuion = async () => {
                if (!scriptContent.trim()) return;
                setIsSaving(true);
                setErrorMsg("");
                try {
                    const data = {
                        tema: temaText.trim(),
                        contexto: contextoText.trim(),
                        contenido: scriptContent,
                        tonos: activeTones,
                        useGrounding: useGrounding,
                        updatedAt: serverTimestamp()
                    };

                    if (activeGuionId) {
                        await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'guiones', activeGuionId), data);
                    } else {
                        data.createdAt = serverTimestamp();
                        const docRef = await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'guiones'), data);
                        setActiveGuionId(docRef.id);
                    }
                } catch (err) {
                    setErrorMsg("Error al guardar el guion.");
                    console.error(err);
                } finally {
                    setIsSaving(false);
                }
            };

            const deleteGuion = async (id, e) => {
                e.stopPropagation();
                if(!window.confirm("¿Seguro que deseas eliminar este guion del historial?")) return;
                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'guiones', id));
                    if (activeGuionId === id) createNewGuion();
                } catch (err) { setErrorMsg("Error al eliminar."); }
            };

            const handleCopy = () => {
                if(copyToClipboard(scriptContent)) {
                    setCopied(true);
                    setTimeout(() => setCopied(false), 2000);
                }
            };

            const executeWithApiKey = (actionCallback) => {
                const key = localStorage.getItem('gemini_api_key');
                if (!key) {
                    setPendingAction(() => actionCallback);
                    setIsApiModalOpen(true);
                } else {
                    actionCallback(key);
                }
            };

            const saveApiKeyAndExecute = () => {
                const cleanKey = tempApiKey.trim().replace(/^['"]|['"]$/g, "");
                if (cleanKey) {
                    localStorage.setItem('gemini_api_key', cleanKey);
                    setIsApiModalOpen(false);
                    if (pendingAction) {
                        pendingAction(cleanKey);
                        setPendingAction(null);
                    }
                }
            };

            const runGenerateScript = async (currentApiKey) => {
                setIsGenerating(true);
                setErrorMsg("");
                
                const prompt = `
                    Eres el Guionista Principal y Copywriter Estratégico de la Senadora Ivideliza Reyes (Nayarit, PAN).
                    Tu objetivo es redactar el guion para un video o Reel destinado a sus redes sociales.

                    TEMA PRINCIPAL:
                    ${temaText}
                    
                    INSTRUCCIONES / CONTEXTO ADICIONAL:
                    ${contextoText || 'Ninguno'}
                    
                    TONOS APLICADOS:
                    ${activeTones.length > 0 ? activeTones.join(', ') : 'Institucional / Informativo'}
                    
                    REGLAS OBLIGATORIAS:
                    1. Identidad: Habla en primera persona (la Senadora hablando directo a la cámara) o en voz en off firme.
                    2. Lenguaje: Claro, directo, persuasivo. Cero palabras robóticas o complejas.
                    3. Formato: Escribe el guion listo para leerse. No pongas "Hola a todos" si es un tema de confrontación. 
                    4. Estructura recomendada: Gancho fuerte en los primeros 3 segundos, desarrollo rápido y llamado a la acción (Call to Action) claro al final.
                `;

                const payload = {
                    contents: [{ parts: [{ text: prompt }] }]
                };

                // Añadir Grounding si está activo
                if (useGrounding) {
                    payload.tools = [{ googleSearch: {} }];
                }

                try {
                    const data = await fetchGeminiScript(payload, currentApiKey);
                    const responseText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (!responseText) throw new Error("La API no devolvió contenido.");
                    
                    setScriptContent(responseText);
                    
                    // Solo guardamos auto si ya existía para no llenar el historial de borradores vacíos si apenas está probando
                    if(activeGuionId) saveCurrentGuion();

                } catch (err) {
                    console.error(err);
                    setErrorMsg("Error al generar: " + err.message);
                } finally {
                    setIsGenerating(false);
                }
            };

            const runAdaptScript = async (currentApiKey) => {
                if(!scriptContent.trim()) return;
                setIsAdapting(true);
                setErrorMsg("");

                const prompt = `
                    Aquí tienes el borrador de un guion de video. Ha sido editado manualmente y las ideas pueden estar desconectadas o la ortografía puede fallar.
                    Tu TAREA EXCLUSIVA es pulir la redacción, corregir ortografía y mejorar la fluidez (conectar bien las oraciones).
                    
                    REGLA DE ORO: NO agregues información nueva, NO inventes datos, NO cambies el significado ni el tono original. Solo haz que se lea natural y fluido.

                    TEXTO A ADECUAR:
                    "${scriptContent}"
                `;

                const payload = { contents: [{ parts: [{ text: prompt }] }] };

                try {
                    const data = await fetchGeminiScript(payload, currentApiKey);
                    const responseText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (!responseText) throw new Error("La API no devolvió contenido.");
                    setScriptContent(responseText);
                    
                    // Auto-guardar después de adecuar
                    if(activeGuionId) {
                        setTimeout(() => saveCurrentGuion(), 500); 
                    }
                } catch(err) {
                    setErrorMsg("Error al adecuar: " + err.message);
                } finally { setIsAdapting(false); }
            };

            const runRefineScript = async (currentApiKey) => {
                if(!refineText.trim() || !scriptContent.trim()) return;
                setIsRefining(true);
                setErrorMsg("");

                const prompt = `
                    Eres el Guionista de la Senadora. Tienes el siguiente guion de video:
                    
                    "${scriptContent}"
                    
                    El director te ha dado la siguiente INSTRUCCIÓN para modificarlo:
                    "${refineText}"
                    
                    Por favor, reescribe el guion aplicando EXACTAMENTE esa instrucción. Mantenlo en formato de guion listo para leerse.
                `;

                const payload = { contents: [{ parts: [{ text: prompt }] }] };

                try {
                    const data = await fetchGeminiScript(payload, currentApiKey);
                    const responseText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (!responseText) throw new Error("La API no devolvió contenido.");
                    setScriptContent(responseText);
                    setRefineText("");
                } catch(err) {
                    setErrorMsg("Error al refinar: " + err.message);
                } finally { setIsRefining(false); }
            };

            if (authLoading) return null;
            if (!user) {
                return (
                    <div className="flex items-center justify-center h-screen bg-gradient-to-br from-indigo-50 to-slate-100 relative z-10">
                        <div className="bg-white p-10 rounded-3xl shadow-xl max-w-md w-full text-center border border-slate-200 m-4">
                            <div className="bg-indigo-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6">
                                <Video className="w-10 h-10 text-indigo-600" />
                            </div>
                            <h1 className="text-2xl font-black text-slate-800 mb-2">Creador de Guiones</h1>
                            <p className="text-slate-500 mb-8 font-medium">Plataforma estratégica - Sen. Ivideliza Reyes</p>
                            
                            {loginError && (
                                <div className="mb-4 bg-red-50 text-red-600 p-3 rounded-lg text-sm border border-red-200 text-left">
                                    <AlertTriangle className="w-4 h-4 inline mr-2"/>
                                    {loginError}
                                </div>
                            )}

                            <button onClick={handleLogin} className="w-full flex items-center justify-center gap-3 bg-white border-2 border-slate-200 hover:bg-slate-50 hover:border-slate-300 text-slate-700 py-3 px-4 rounded-xl font-bold transition-all shadow-sm">
                                <svg className="w-5 h-5" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/><path fill="none" d="M1 1h22v22H1z"/></svg>
                                Ingresar con Google
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex h-screen overflow-hidden relative bg-slate-50">
                    
                    {/* SIDEBAR HISTORIAL */}
                    {isSidebarOpen && <div className="fixed inset-0 bg-black/20 z-40 lg:hidden" onClick={() => setIsSidebarOpen(false)} />}
                    <aside className={`fixed lg:static inset-y-0 left-0 w-80 bg-white border-r border-slate-200 z-50 transform transition-transform duration-300 flex flex-col ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'}`}>
                        <div className="p-4 border-b border-slate-200 bg-indigo-50/50 flex justify-between items-center">
                            <h2 className="text-indigo-800 font-bold text-lg flex items-center gap-2"><History className="w-5 h-5" /> Historial</h2>
                            <button className="lg:hidden p-1 text-slate-400" onClick={() => setIsSidebarOpen(false)}><X className="w-5 h-5"/></button>
                        </div>
                        <div className="flex-1 overflow-y-auto p-4 space-y-3">
                            <button onClick={createNewGuion} className={`w-full flex items-center justify-center gap-2 p-3 rounded-xl border-2 border-dashed font-medium transition-colors ${!activeGuionId ? 'border-indigo-500 text-indigo-600 bg-indigo-50' : 'border-slate-300 text-slate-600 hover:border-indigo-400 hover:bg-indigo-50'}`}>
                                <Plus className="w-5 h-5" /> Nuevo Guion
                            </button>
                            <div className="pt-4 space-y-2">
                                {guionesList.map(g => (
                                    <div key={g.id} className={`w-full text-left p-3 rounded-lg border transition-all relative group cursor-pointer ${activeGuionId === g.id ? 'border-indigo-500 bg-indigo-50 shadow-sm' : 'border-slate-200 hover:border-slate-300 bg-white'}`}>
                                        <div onClick={() => loadGuion(g)}>
                                            <p className="text-sm line-clamp-2 text-slate-700 pr-6 font-medium">{g.tema || 'Sin tema'}</p>
                                            <p className="text-[10px] text-slate-400 mt-1">{g.updatedAt?.toDate().toLocaleDateString() || 'Reciente'}</p>
                                        </div>
                                        <button onClick={(e) => deleteGuion(g.id, e)} className="absolute top-2 right-2 p-1.5 text-slate-300 hover:text-red-500 hover:bg-red-50 rounded-md transition-colors md:opacity-0 md:group-hover:opacity-100 opacity-100" title="Eliminar">
                                            <Trash2 className="w-4 h-4" />
                                        </button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </aside>

                    {/* MAIN CONTENT */}
                    <main className="flex-1 flex flex-col h-full overflow-hidden relative">
                        {/* HEADER */}
                        <header className="bg-white border-b border-slate-200 p-4 flex items-center justify-between z-10 shrink-0 shadow-sm">
                            <div className="flex items-center gap-3">
                                <button onClick={() => setIsSidebarOpen(true)} className="p-2 -ml-2 text-slate-500 lg:hidden rounded-lg hover:bg-slate-100"><Menu className="w-6 h-6" /></button>
                                <a href="index.html" className="hidden md:flex items-center gap-2 text-sm font-bold text-slate-500 hover:text-indigo-600 bg-slate-100 hover:bg-indigo-50 px-3 py-1.5 rounded-lg transition-colors">
                                    <ArrowLeft className="w-4 h-4" /> Volver al Gestor
                                </a>
                                <div className="h-6 w-px bg-slate-200 hidden md:block mx-2"></div>
                                <h1 className="text-lg font-black text-indigo-900 flex items-center gap-2">
                                    <Video className="w-5 h-5 text-indigo-600"/> Creador de Guiones
                                </h1>
                            </div>
                            <div className="flex items-center gap-4">
                                <button onClick={() => setIsApiModalOpen(true)} className="text-slate-400 hover:text-indigo-600 p-2 rounded-md transition-colors" title="Configurar API Key">
                                    <Key className="w-5 h-5"/>
                                </button>
                                <div className="flex items-center gap-2 border-l border-slate-200 pl-4">
                                    <img src={user.photoURL || "https://ui-avatars.com/api/?name=User"} className="w-8 h-8 rounded-full border border-slate-200" />
                                    <button onClick={() => signOut(auth)} className="text-slate-400 hover:text-red-500 p-1 rounded-md transition-colors" title="Cerrar sesión">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                                    </button>
                                </div>
                            </div>
                        </header>

                        {errorMsg && <div className="bg-red-50 text-red-600 p-3 text-sm text-center border-b border-red-100 flex justify-center items-center gap-2 shrink-0">
                            <AlertTriangle className="w-4 h-4"/> {errorMsg}
                        </div>}

                        {/* WORKSPACE */}
                        <div className="flex-1 overflow-y-auto p-4 md:p-6 bg-slate-50/50">
                            <div className="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6 h-full">
                                
                                {/* LADO IZQUIERDO: CONFIGURACIÓN */}
                                <div className="lg:col-span-4 space-y-6 flex flex-col">
                                    
                                    <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 shrink-0">
                                        <h2 className="font-bold text-slate-800 flex items-center gap-2 mb-4">
                                            <Edit3 className="w-5 h-5 text-indigo-500"/> 1. ¿De qué hablaremos?
                                        </h2>
                                        
                                        <div className="space-y-4">
                                            <div>
                                                <label className="block text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-2">Tema Principal (Obligatorio)</label>
                                                <textarea 
                                                    value={temaText}
                                                    onChange={(e) => setTemaText(e.target.value)}
                                                    placeholder="Ej: El ecocidio en la playa de Sayulita..."
                                                    className="w-full h-24 p-3 rounded-xl border border-slate-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 outline-none resize-none text-sm text-slate-700"
                                                />
                                            </div>
                                            <div>
                                                <div className="flex justify-between items-end mb-2">
                                                    <label className="block text-[11px] font-bold text-slate-400 uppercase tracking-wider">Instrucciones / Contexto</label>
                                                    <span className="text-[9px] text-slate-400 font-medium">(Opcional)</span>
                                                </div>
                                                <textarea 
                                                    value={contextoText}
                                                    onChange={(e) => setContextoText(e.target.value)}
                                                    placeholder="Ej: Mencionar que el gobierno estatal ignoró las denuncias previas. Mantenerlo debajo de 1 minuto."
                                                    className="w-full h-20 p-3 rounded-xl border border-slate-200 focus:border-indigo-400 focus:ring-2 focus:ring-indigo-50 outline-none resize-none text-sm text-slate-600 bg-slate-50"
                                                />
                                            </div>
                                        </div>
                                    </div>

                                    <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 shrink-0">
                                        <h2 className="font-bold text-slate-800 flex items-center gap-2 mb-4">
                                            <Settings className="w-5 h-5 text-indigo-500"/> 2. Configuración de IA
                                        </h2>
                                        
                                        <button 
                                            onClick={() => setUseGrounding(!useGrounding)} 
                                            className={`w-full p-4 rounded-xl border-2 text-left mb-5 transition-all ${useGrounding ? 'bg-indigo-50 border-indigo-200' : 'bg-white border-slate-200 hover:bg-slate-50'}`}
                                        >
                                            <div className="flex items-start gap-3">
                                                <div className={`mt-0.5 w-5 h-5 rounded flex items-center justify-center shrink-0 ${useGrounding ? 'bg-indigo-600 text-white' : 'border-2 border-slate-300'}`}>
                                                    {useGrounding && <CheckCircle2 className="w-4 h-4" />}
                                                </div>
                                                <div>
                                                    <p className={`text-sm font-bold ${useGrounding ? 'text-indigo-900' : 'text-slate-600'} flex items-center gap-1`}><Globe className="w-4 h-4"/> Buscar en Internet</p>
                                                    <p className="text-[10px] text-slate-500 mt-1">Evita inventar datos y busca información real sobre el tema.</p>
                                                </div>
                                            </div>
                                        </button>

                                        <p className="text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-2">Tono del Video (Puedes elegir varios)</p>
                                        <div className="grid grid-cols-2 gap-2">
                                            {[
                                                { name: 'Social', icon: Users },
                                                { name: 'Legislativo', icon: BookOpen },
                                                { name: 'Político', icon: Megaphone },
                                                { name: 'Familiar', icon: Smile }
                                            ].map(cat => {
                                                const isActive = activeTones.includes(cat.name);
                                                return (
                                                    <button 
                                                        key={cat.name} 
                                                        onClick={() => toggleTone(cat.name)} 
                                                        className={`p-3 rounded-xl text-xs font-bold flex flex-col items-center justify-center gap-1 border-2 transition-all ${isActive ? `border-indigo-400 bg-indigo-50 text-indigo-700 shadow-sm` : 'bg-white text-slate-400 border-slate-100 hover:bg-slate-50'}`}
                                                    >
                                                        <cat.icon className="w-5 h-5 mb-1" /> {cat.name}
                                                    </button>
                                                );
                                            })}
                                        </div>
                                    </div>

                                    <button 
                                        onClick={() => executeWithApiKey(runGenerateScript)} 
                                        disabled={!temaText.trim() || isGenerating} 
                                        className="w-full flex items-center justify-center gap-2 bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 disabled:hover:bg-indigo-600 text-white py-4 rounded-2xl font-black text-lg transition-all shadow-md shadow-indigo-200 mt-auto shrink-0"
                                    >
                                        {isGenerating ? "Redactando Guion..." : <><Sparkles className="w-6 h-6" /> Generar Guion</>}
                                    </button>

                                </div>

                                {/* LADO DERECHO: EDICIÓN */}
                                <div className="lg:col-span-8 flex flex-col h-full bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                                    <div className="p-4 border-b border-slate-100 flex justify-between items-center bg-slate-50/50 shrink-0">
                                        <h2 className="font-bold text-slate-800 flex items-center gap-2">
                                            <Type className="w-5 h-5 text-indigo-500"/> 3. Resultado y Edición
                                        </h2>
                                        <div className="flex gap-2">
                                            <button 
                                                onClick={saveCurrentGuion}
                                                disabled={!scriptContent.trim() || isGenerating || isSaving}
                                                className="text-xs bg-indigo-50 hover:bg-indigo-100 text-indigo-700 px-3 py-1.5 rounded-lg font-bold flex items-center gap-1 transition-colors border border-indigo-200 disabled:opacity-50"
                                            >
                                                {isSaving ? "Guardando..." : <><Save className="w-4 h-4"/> Guardar</>}
                                            </button>
                                            <button 
                                                onClick={() => executeWithApiKey(runAdaptScript)}
                                                disabled={!scriptContent.trim() || isAdapting || isGenerating}
                                                title="Pule el texto corregido a mano para que suene fluido sin inventar información extra."
                                                className="text-xs bg-purple-100 hover:bg-purple-200 text-purple-700 px-3 py-1.5 rounded-lg font-bold flex items-center gap-1 transition-colors border border-purple-200 disabled:opacity-50"
                                            >
                                                {isAdapting ? <RefreshCw className="w-4 h-4 animate-spin"/> : <Sparkles className="w-4 h-4"/>} Adecuar
                                            </button>
                                            <button 
                                                onClick={handleCopy}
                                                disabled={!scriptContent.trim()}
                                                className={`text-xs px-3 py-1.5 rounded-lg font-bold flex items-center gap-1 transition-colors border ${copied ? 'bg-green-100 text-green-700 border-green-200' : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-100'} disabled:opacity-50`}
                                            >
                                                {copied ? <CheckCircle2 className="w-4 h-4"/> : <Copy className="w-4 h-4"/>} Copiar
                                            </button>
                                        </div>
                                    </div>

                                    <div className="flex-1 p-4 md:p-6 overflow-hidden relative flex flex-col">
                                        {!scriptContent && !isGenerating && (
                                            <div className="absolute inset-0 flex flex-col items-center justify-center text-slate-300">
                                                <Video className="w-16 h-16 mb-4 opacity-50" />
                                                <p className="font-bold text-lg text-slate-400">El guion generado aparecerá aquí.</p>
                                                <p className="text-sm">Puedes editarlo directamente escribiendo sobre él.</p>
                                            </div>
                                        )}
                                        
                                        <textarea
                                            value={scriptContent}
                                            onChange={(e) => setScriptContent(e.target.value)}
                                            disabled={isGenerating || isAdapting}
                                            className={`flex-1 w-full h-full p-4 outline-none resize-none text-base md:text-lg leading-relaxed text-slate-800 bg-transparent ${isGenerating || isAdapting ? 'opacity-50' : ''}`}
                                            placeholder={isGenerating || isAdapting ? "Procesando..." : "Escribe aquí o genera un guion..."}
                                        />
                                    </div>

                                    <div className="p-4 border-t border-slate-100 bg-slate-50 shrink-0">
                                        <p className="text-[11px] font-bold text-indigo-600 uppercase tracking-wider mb-2">3. Ajustes de IA (Refinar)</p>
                                        <div className="flex gap-2">
                                            <input 
                                                type="text"
                                                value={refineText}
                                                onChange={(e) => setRefineText(e.target.value)}
                                                disabled={!scriptContent.trim() || isRefining || isGenerating || isAdapting}
                                                placeholder="Ej. Hazlo más corto, menciona la ley de aguas..."
                                                className="flex-1 p-3 rounded-xl border border-slate-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 outline-none text-sm disabled:bg-slate-100"
                                                onKeyDown={(e) => {
                                                    if(e.key === 'Enter' && refineText.trim()) { executeWithApiKey(runRefineScript); }
                                                }}
                                            />
                                            <button 
                                                onClick={() => executeWithApiKey(runRefineScript)}
                                                disabled={!refineText.trim() || !scriptContent.trim() || isRefining || isGenerating || isAdapting}
                                                className="bg-indigo-400 hover:bg-indigo-500 text-white px-5 rounded-xl font-bold transition-colors disabled:opacity-50 flex items-center gap-2"
                                            >
                                                {isRefining ? <RefreshCw className="w-5 h-5 animate-spin"/> : <Edit3 className="w-5 h-5"/>}
                                                <span className="hidden sm:inline">Refinar</span>
                                            </button>
                                        </div>
                                    </div>

                                </div>

                            </div>
                        </div>
                    </main>

                    {/* MODAL API KEY */}
                    {isApiModalOpen && (
                        <div className="fixed inset-0 bg-black/60 z-[60] flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden">
                                <div className="bg-indigo-600 p-6 text-center">
                                    <div className="bg-white/20 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                                        <Key className="w-8 h-8 text-white" />
                                    </div>
                                    <h2 className="text-xl font-bold text-white">Configurar Gemini API Key</h2>
                                </div>
                                <div className="p-6">
                                    <label className="block text-sm font-bold text-slate-700 mb-2">Ingresa tu API Key:</label>
                                    <input 
                                        type="password" 
                                        value={tempApiKey} 
                                        onChange={(e) => setTempApiKey(e.target.value)} 
                                        placeholder="AIzaSyA..." 
                                        className="w-full p-4 rounded-xl border-2 border-slate-200 focus:border-indigo-500 outline-none text-slate-800 font-mono"
                                    />
                                    <div className="mt-6 flex justify-end gap-3">
                                        <button onClick={() => { setIsApiModalOpen(false); setPendingAction(null); }} className="px-5 py-3 text-slate-500 font-medium hover:bg-slate-100 rounded-xl">Cancelar</button>
                                        <button onClick={saveApiKeyAndExecute} disabled={!tempApiKey.trim()} className="px-6 py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-bold disabled:opacity-50">Guardar</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        try {
            const root = createRoot(document.getElementById('root'));
            root.render(<App />);
        } catch (error) {
            console.error(error);
            document.getElementById('root').innerHTML = '<div style="padding:20px; color:red; font-family:sans-serif; text-align:center;"><b>Error crítico al renderizar:</b><br><br>' + error.message + '</div>';
        }
    </script>
</body>
</html>
