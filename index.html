                                    <div className="grid grid-cols-2 gap-4 mb-5">
                                        <div className="bg-blue-50 rounded-xl p-4 text-center border border-blue-100 flex flex-col items-center justify-center"><FileText className="w-5 h-5 text-blue-400 mb-1" /><p className="text-3xl font-black text-blue-700">{monthlyPosts.length}</p><p className="text-[10px] font-bold text-blue-600 uppercase mt-1">Posteos</p></div>
                                        <div className="bg-slate-50 rounded-xl p-4 text-center border border-slate-200 flex flex-col items-center justify-center"><MessageCircle className="w-5 h-5 text-slate-400 mb-1" /><p className="text-3xl font-black text-slate-700">{monthlyComments.length}</p><p className="text-[10px] font-bold text-slate-600 uppercase mt-1">Comentarios Analizados</p></div>
                                    </div>

                                    <p className="text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-3 border-b pb-1">Desglose de Sentimientos</p>
                                    <div className="grid grid-cols-3 gap-3 mb-5">

                                        <div className="bg-slate-50 rounded-xl p-3 flex flex-col items-center border border-slate-200"><p className="text-xl font-black text-slate-600">{sentNeu}</p><p className="text-[9px] font-bold text-slate-600 uppercase mt-1 text-center leading-tight">Neutro</p></div>
                                        <div className="bg-amber-50 rounded-xl p-3 flex flex-col items-center border border-amber-100"><p className="text-xl font-black text-amber-600">{sentRec}</p><p className="text-[9px] font-bold text-amber-700 uppercase mt-1 text-center leading-tight">Reclamo</p></div>
                                        <div className="bg-orange-50 rounded-xl p-3 flex flex-col items-center border border-orange-100"><p className="text-xl font-black text-orange-600">{sentCrit}</p><p className="text-[9px] font-bold text-orange-700 uppercase mt-1 text-center leading-tight">Crítica Externa</p></div>
                                        <div className="bg-red-50 rounded-xl p-3 flex flex-col items-center border border-red-100"><p className="text-xl font-black text-red-600">{sentNeg}</p><p className="text-[9px] font-bold text-red-700 uppercase mt-1 text-center leading-tight">Negativo / Ataque</p></div>
                                        <div className="bg-red-100 rounded-xl p-3 flex flex-col items-center border border-red-300"><p className="text-xl font-black text-red-800">{sentEsc}</p><p className="text-[9px] font-bold text-red-900 uppercase mt-1 text-center leading-tight">Escalar</p></div>
                                    </div>
                                    <p className="text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-3">Enfoque Predominante</p>
                                    <div className="bg-indigo-50 rounded-xl p-3 border border-indigo-100 flex items-center justify-between"><div><p className="text-[10px] font-bold text-indigo-500 uppercase">Más usado</p><p className="text-sm font-bold text-indigo-700">{topCat}</p></div><Megaphone className="w-5 h-5 text-indigo-300" /></div>
                                </div>

                                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 flex flex-col h-full max-h-[600px]">

                                        <button onClick={()=>executeWithApiKey(runGenerateReport)} disabled={isGeneratingReport || monthlyPosts.length === 0} className="bg-slate-800 hover:bg-slate-900 text-white text-xs px-3 py-1.5 rounded-lg font-bold disabled:opacity-50 transition-colors flex items-center gap-1">
                                        {isGeneratingReport ? "Analizando..." : <><Plus className="w-3 h-3"/> Nuevo Reporte</>}

                                            aiReports.map((rep, index) => (
                                                <button key={rep.id} onClick={() => setViewingReport(rep)} className="w-full text-left p-4 rounded-xl border border-slate-200 hover:border-amber-300 hover:bg-amber-50 transition-all flex items-center gap-3">
                                                    <div className="bg-white p-2 rounded-lg border border-slate-100 shadow-sm"><FileClock className="w-5 h-5 text-amber-600"/></div>
                                                    <div><p className="font-bold text-slate-700 text-sm">{rep.title || `Reporte 0${index + 1}`}</p><p className="text-xs text-slate-400">{rep.createdAt?.toDate().toLocaleDateString() || 'Generado recientemente'}</p></div>
                                                    <ChevronRight className="w-4 h-4 text-slate-300 ml-auto" />
                                                </button>
                                            ))
                                        )}
                                    </div>
                                </div>
                            </div>
                            </div>
                        )}
                        </div>
                    </main>

                    {}
                    
                    {/* Modales Genéricos: Alert y Confirm */}
                    {confirmDialog.isOpen && (
                        <div className="fixed inset-0 bg-black/60 z-[70] flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-white rounded-2xl p-6 shadow-xl w-full max-w-sm text-center">
                                <AlertTriangle className="w-12 h-12 text-amber-500 mx-auto mb-4" />
                                <h3 className="font-bold text-slate-800 mb-2">Confirmación</h3>
                                <p className="text-slate-600 text-sm mb-6">{confirmDialog.message}</p>
                                <div className="flex justify-center gap-3">
                                    <button onClick={() => setConfirmDialog({isOpen: false, message: "", onConfirm: null})} className="px-5 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold rounded-lg transition-colors">Cancelar</button>
                                    <button onClick={confirmDialog.onConfirm} className="px-5 py-2 bg-red-600 hover:bg-red-700 text-white font-bold rounded-lg transition-colors shadow-sm">Aceptar</button>
                                </div>
                            </div>
                        </div>
                    )}
                    {alertDialog.isOpen && (
                        <div className="fixed inset-0 bg-black/60 z-[70] flex items-center justify-center p-4 backdrop-blur-sm">

                                <Info className="w-12 h-12 text-blue-500 mx-auto mb-4" />
                                <h3 className="font-bold text-slate-800 mb-2">Aviso</h3>
                                <p className="text-slate-600 text-sm mb-6">{alertDialog.message}</p>
                                <button onClick={() => setAlertDialog({isOpen: false, message: ""})} className="px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg transition-colors shadow-sm w-full">Entendido</button>
                            </div>
                        </div>
                    )}

                    {viewingReport && (
                        <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-white rounded-2xl shadow-xl w-full max-w-2xl max-h-[90vh] flex flex-col overflow-hidden">
                                <div className="p-4 border-b flex justify-between items-center bg-amber-50">
                                    <h2 className="font-bold text-amber-900 flex items-center gap-2"><Lightbulb className="w-5 h-5 text-amber-600" /> {viewingReport.title || 'Reporte de Consultoría'}</h2>
                                    <button onClick={() => setViewingReport(null)} className="p-1 hover:bg-amber-100 rounded-lg"><X className="w-6 h-6 text-amber-700" /></button>
                                </div>
                                <div className="p-6 overflow-y-auto space-y-6">
                                    <div className="bg-blue-50/50 p-4 rounded-xl border border-blue-100"><p className="text-[10px] font-bold text-blue-600 uppercase mb-1">Tema Principal del Periodo</p><p className="text-lg font-black text-slate-800 leading-tight">{viewingReport.report?.temaPrincipal}</p></div>
                                    <div><p className="text-[10px] font-bold text-slate-400 uppercase mb-2">Diagnóstico Situacional</p><p className="text-sm text-slate-600 bg-slate-50 p-4 rounded-xl border border-slate-200 leading-relaxed">{viewingReport.report?.analisisSituacion}</p></div>
                                    <div><p className="text-[10px] font-bold text-slate-400 uppercase mb-3">Propuestas de Mejora</p><ul className="space-y-3">{viewingReport.report?.propuestas?.map((prop, idx) => (<li key={idx} className="flex gap-3 text-sm text-slate-700"><span className="text-amber-500 mt-0.5"><CheckCircle2 className="w-4 h-4" /></span><span>{prop}</span></li>))}</ul></div>
                                </div>
                                <div className="p-4 border-t bg-slate-50 flex justify-end"><button onClick={() => setViewingReport(null)} className="px-6 py-2 bg-slate-800 hover:bg-slate-900 text-white rounded-lg font-bold">Cerrar Reporte</button></div>
                            </div>
                        </div>
                    )}

                    {isSettingsModalOpen && (
                        <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                        <div className="bg-white rounded-2xl shadow-xl w-full max-w-2xl overflow-hidden flex flex-col max-h-[90vh]">
                            <div className="p-4 border-b flex justify-between bg-slate-50 shrink-0"><h2 className="font-bold flex items-center gap-2"><Settings className="w-5 h-5 text-slate-500" /> Configuración y Mantenimiento</h2><button onClick={() => setIsSettingsModalOpen(false)}><X className="w-6 h-6 text-slate-400 hover:text-slate-700" /></button></div>
                            <div className="p-6 overflow-y-auto flex-1 space-y-8">
                                <div className="border border-red-200 rounded-xl overflow-hidden">
                                    <div className="bg-red-50 p-4 border-b border-red-200 flex items-center gap-3"><Trash className="w-5 h-5 text-red-600"/><div><h3 className="font-bold text-red-900">Limpieza de Base de Datos</h3><p className="text-xs text-red-700">Evita superar la cuota gratuita de lecturas de Firebase borrando datos antiguos.</p></div></div>
                                    <div className="p-4 bg-white flex justify-between items-center"><div className="text-sm text-slate-600"><p>Actualmente tienes <b>{posts.length}</b> posts y <b>{comments.length}</b> comentarios en total.</p></div><button onClick={purgeOldData} disabled={isPurging} className="bg-red-100 text-red-700 hover:bg-red-600 hover:text-white px-4 py-2 rounded-lg font-bold text-sm transition-colors flex items-center gap-2">{isPurging ? "Borrando..." : <><Trash2 className="w-4 h-4"/> Purgar &gt; 3 meses</>}</button></div>
                                </div>
                            </div>
                            <div className="p-4 border-t bg-slate-50 flex justify-end shrink-0"><button onClick={() => setIsSettingsModalOpen(false)} className="px-6 py-2 bg-slate-800 text-white rounded-lg font-bold hover:bg-slate-900 shadow-sm">Cerrar</button></div>
                        </div>
                        </div>
                    )}

                    {isContextModalOpen && (
                        <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                        <div className="bg-white rounded-2xl shadow-xl w-full max-w-lg overflow-hidden flex flex-col max-h-[90vh]">
                            <div className="p-4 border-b flex justify-between bg-slate-50 shrink-0"><h2 className="font-bold flex items-center gap-2"><Settings className="w-5 h-5 text-slate-500" /> Configuración de la Publicación</h2><button onClick={() => setIsContextModalOpen(false)}><X className="w-6 h-6 text-slate-400 hover:text-slate-700" /></button></div>
                            <div className="p-6 overflow-y-auto flex-1 space-y-6">
                                <div><label className="block text-sm font-bold text-slate-700 mb-1">Contexto Específico (Antecedentes)</label><p className="text-[10px] text-slate-500 mb-2">Información de qué trata el post, datos importantes que la IA deba saber para responder.</p><textarea value={tempContextText} onChange={(e) => setTempContextText(e.target.value)} placeholder="Ej: Se entregaron 500 apoyos en la colonia Centro..." className="w-full h-24 p-3 rounded-xl border border-slate-300 outline-none resize-none text-sm focus:border-blue-500" /></div>
                                <div><label className="block text-sm font-bold text-blue-700 mb-1">Instrucción Temporal para Respuestas</label><p className="text-[10px] text-slate-500 mb-2">Una instrucción que SOLO aplique a este post.</p><textarea value={tempPostInstruction} onChange={(e) => setTempPostInstruction(e.target.value)} placeholder="Ej: Agradecer reclamos ciudadanos y llevar respuesta hacia soluciones..." className="w-full h-24 p-3 rounded-xl border border-blue-300 outline-none resize-none text-sm bg-blue-50 focus:border-blue-500" /></div>
                            </div>
                            <div className="p-4 border-t bg-slate-50 flex justify-end gap-3 shrink-0"><button onClick={() => setIsContextModalOpen(false)} className="px-4 py-2 text-slate-600 font-medium hover:bg-slate-200 rounded-lg">Cancelar</button><button onClick={savePostContext} className="px-6 py-2 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700 shadow-sm">Guardar</button></div>
                        </div>
                        </div>
                    )}

                    {isAliasModalOpen && (
                        <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                        <div className="bg-white rounded-2xl shadow-xl w-full max-w-sm overflow-hidden">
                            <div className="p-4 border-b flex justify-between bg-blue-50"><h2 className="font-bold flex items-center gap-2 text-blue-800"><UserPlus className="w-5 h-5 text-blue-600" /> Memoria de Nombres</h2><button onClick={() => setIsAliasModalOpen(false)}><X className="w-5 h-5 text-blue-400 hover:text-blue-700" /></button></div>
                            <div className="p-5">
                                <div className="mb-4"><label className="block text-xs font-bold text-slate-500 uppercase">Nombre en Facebook:</label><p className="text-slate-800 font-medium bg-slate-50 p-2 rounded border mt-1">{tempAliasOriginal}</p></div>
                                <div><label className="block text-xs font-bold text-blue-600 uppercase">¿Cómo prefiere que le llamen?</label><input type="text" value={tempAliasPreferred} onChange={(e) => setTempAliasPreferred(e.target.value)} placeholder="Ej: Pakin, Lic. José..." className="w-full mt-1 p-3 border-2 border-blue-200 rounded-lg focus:outline-none focus:border-blue-500 text-slate-800"/><p className="text-[10px] text-slate-500 mt-2">La IA recordará este alias automáticamente.</p></div>
                            </div>
                            <div className="p-4 border-t bg-slate-50 flex justify-end gap-3"><button onClick={() => setIsAliasModalOpen(false)} className="px-4 py-2 text-slate-600 text-sm font-medium">Cancelar</button><button onClick={saveAlias} disabled={!tempAliasPreferred.trim()} className="px-6 py-2 bg-blue-600 text-white rounded-lg text-sm font-bold disabled:opacity-50">Guardar</button></div>
                        </div>
                        </div>
                    )}

                    {isApiModalOpen && (
                        <div className="fixed inset-0 bg-black/60 z-[60] flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden">
                                <div className="bg-blue-600 p-6 text-center"><div className="bg-white/20 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4"><Key className="w-8 h-8 text-white" /></div><h2 className="text-xl font-bold text-white">Configurar Gemini API Key</h2><p className="text-blue-100 text-sm mt-2">La llave se guarda localmente en tu navegador.</p></div>
                                <div className="p-6"><label className="block text-sm font-bold text-slate-700 mb-2">Ingresa tu API Key:</label><input type="password" value={tempApiKey} onChange={(e) => setTempApiKey(e.target.value)} placeholder="AIzaSyA..." className="w-full p-4 rounded-xl border-2 border-slate-200 focus:border-blue-500 outline-none text-slate-800 font-mono" /><div className="mt-6 flex justify-end gap-3"><button onClick={() => { setIsApiModalOpen(false); setPendingAction(null); }} className="px-5 py-3 text-slate-500 font-medium hover:bg-slate-100 rounded-xl">Cancelar</button><button onClick={saveApiKeyAndExecute} disabled={!tempApiKey.trim()} className="px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold disabled:opacity-50 shadow-md">Guardar y Continuar</button></div></div>
                            </div>
                        </div>
                    )}

                    {regeneratingCommentId && commentBeingRegenerated && (
                        <div className="fixed inset-0 bg-black/60 z-[55] flex items-center justify-center p-4 backdrop-blur-sm">
                        <div className="bg-white rounded-2xl shadow-xl w-full max-w-lg overflow-hidden flex flex-col max-h-[90vh] border border-purple-200">
                            <div className="p-4 border-b flex justify-between bg-purple-50 shrink-0">
                                <div><h2 className="font-bold flex items-center gap-2 text-purple-900"><RefreshCw className="w-5 h-5 text-purple-600" /> Repensar Respuesta</h2><p className="text-xs text-purple-700 mt-1">Dale instrucciones a la IA para mejorar esta respuesta.</p></div>
                                <button onClick={() => { setRegeneratingCommentId(null); setRegenerateInstruction(""); }} disabled={isRegeneratingSingle}><X className="w-6 h-6 text-purple-400 hover:text-purple-700" /></button>
                            </div>
                            <div className="p-6 overflow-y-auto flex-1 space-y-4">
                                <div className="bg-slate-50 border border-slate-200 p-3 rounded-xl text-sm"><p className="text-[10px] font-bold text-slate-400 uppercase mb-1">Comentario original de {commentBeingRegenerated.nombreUsuario}:</p><p className="text-slate-700 italic">"{commentBeingRegenerated.originalComment}"</p><div className="mt-3 pt-3 border-t border-slate-200"><p className="text-[10px] font-bold text-red-400 uppercase mb-1">Versión actual:</p><p className="text-slate-600 bg-white p-2 rounded border border-slate-100">"{commentBeingRegenerated.generatedResponse}"</p></div></div>
                                <div><label className="block text-sm font-bold text-purple-700 mb-2">¿Cómo quieres que sea la nueva respuesta?</label><textarea value={regenerateInstruction} onChange={(e) => setRegenerateInstruction(e.target.value)} placeholder="Ej: Hazla más amable..." className="w-full h-28 p-3 rounded-xl border-2 border-purple-200 outline-none resize-none text-sm focus:border-purple-500" disabled={isRegeneratingSingle} /></div>
                            </div>
                            <div className="p-4 border-t bg-slate-50 flex justify-end gap-3 shrink-0">
                                <button onClick={() => { setRegeneratingCommentId(null); setRegenerateInstruction(""); }} disabled={isRegeneratingSingle} className="px-4 py-2 text-slate-600 font-medium hover:bg-slate-200 rounded-lg disabled:opacity-50">Cancelar</button>
                                <button onClick={() => executeWithApiKey(runRegenerateSingleResponse)} disabled={!regenerateInstruction.trim() || isRegeneratingSingle} className="px-6 py-2 bg-purple-600 text-white rounded-lg font-bold hover:bg-purple-700 shadow-sm disabled:opacity-50 flex items-center gap-2">{isRegeneratingSingle ? <><RefreshCw className="w-4 h-4 animate-spin"/> Pensando...</> : "Generar versión"}</button>
                            </div>
                        </div>
                        </div>
                    )}
                </div>
            );
        }

        try {
            const root = createRoot(document.getElementById('root'));
            root.render(<App />);
        } catch (error) {
            console.error(error);
            document.getElementById('root').innerHTML = '<div style="padding:20px; color:red; font-family:sans-serif; text-align:center;"><b>Error crítico al renderizar:</b><br><br>' + error.message + '</div>';
        }
    </script>
</body>
</html>
