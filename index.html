<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor CM - Sen. Ivideliza Reyes</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.344.0",
            "firebase/app": "https://esm.sh/firebase@10.8.1/app",
            "firebase/auth": "https://esm.sh/firebase@10.8.1/auth",
            "firebase/firestore": "https://esm.sh/firebase@10.8.1/firestore"
        }
    }
    </script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased">
    
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { Copy, Plus, Menu, X, Settings, MessageSquare, Send, CheckCircle2, ChevronRight, History, User, Users, FileText, BookOpen, Megaphone, BarChart3, TrendingUp, Target, Lightbulb, PieChart, MessageCircle, LogOut, Key } from 'lucide-react';
        
        import { initializeApp } from 'firebase/app';
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from 'firebase/auth';
        import { getFirestore, collection, doc, setDoc, onSnapshot, addDoc, serverTimestamp, updateDoc } from 'firebase/firestore';

        // Llaves de Firebase (Es seguro que estas sean públicas si el dominio está autorizado)
        const firebaseConfig = {
            apiKey: "AIzaSyA7xjysJVQb3tYEb8ZU9yHbs-MBDWVUhk4",
            authDomain: "gestor-ivi.firebaseapp.com",
            projectId: "gestor-ivi",
            storageBucket: "gestor-ivi.firebasestorage.app",
            messagingSenderId: "562230194451",
            appId: "1:562230194451:web:3877b3bf0d18b6ac912ae6",
            measurementId: "G-5MDJNBV15H"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        const appId = firebaseConfig.projectId;

        // Utilidades
        const copyToClipboard = (text) => {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            textArea.style.left = "-9999px";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            let successful = false;
            try { successful = document.execCommand('copy'); } catch (err) {}
            document.body.removeChild(textArea);
            return successful;
        };

        const delay = (ms) => new Promise(res => setTimeout(res, ms));

        function App() {
            const [user, setUser] = useState(null);
            const [authLoading, setAuthLoading] = useState(true);
            const [currentView, setCurrentView] = useState('manager'); 
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);
            
            // NUEVO: Estado para la llave de Gemini guardada en el dispositivo
            const [geminiKey, setGeminiKey] = useState(localStorage.getItem('gemini_api_key_ivi') || "");
            const [showKeySetup, setShowKeySetup] = useState(false);
            const [tempKeyInput, setTempKeyInput] = useState("");

            const [posts, setPosts] = useState([]);
            const [comments, setComments] = useState([]);
            const [activePostId, setActivePostId] = useState(null);
            
            const [isContextModalOpen, setIsContextModalOpen] = useState(false);
            const [tempContextText, setTempContextText] = useState("");
            const [globalStrategy, setGlobalStrategy] = useState("");
            const [isSavingStrategy, setIsSavingStrategy] = useState(false);

            const [newPostText, setNewPostText] = useState("");
            const [newCommentsText, setNewCommentsText] = useState("");
            const [isGenerating, setIsGenerating] = useState(false);
            const [errorMsg, setErrorMsg] = useState("");
            const [copiedId, setCopiedId] = useState(null);
            
            const [aiReport, setAiReport] = useState(null);
            const [isGeneratingReport, setIsGeneratingReport] = useState(false);

            useEffect(() => {
                const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
                    setUser(currentUser);
                    setAuthLoading(false);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                
                // Si el usuario entra y no tiene llave guardada, mostrar la pantalla de configuración
                if (!geminiKey) {
                    setShowKeySetup(true);
                }

                const uid = user.uid;
                const postsRef = collection(db, 'artifacts', appId, 'users', uid, 'posts');
                const commentsRef = collection(db, 'artifacts', appId, 'users', uid, 'comments');
                const settingsRef = collection(db, 'artifacts', appId, 'users', uid, 'settings');

                const unsubPosts = onSnapshot(postsRef, (snap) => {
                    const fetchedPosts = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    fetchedPosts.sort((a, b) => (b.createdAt?.toMillis() || 0) - (a.createdAt?.toMillis() || 0));
                    setPosts(fetchedPosts);
                });

                const unsubComments = onSnapshot(commentsRef, (snap) => {
                    const fetchedComments = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    fetchedComments.sort((a, b) => (b.createdAt?.toMillis() || 0) - (a.createdAt?.toMillis() || 0));
                    setComments(fetchedComments);
                });

                const unsubSettings = onSnapshot(settingsRef, (snap) => {
                    const globalDoc = snap.docs.find(d => d.id === 'global_strategy');
                    if (globalDoc) setGlobalStrategy(globalDoc.data().text || "");
                    
                    const reportDoc = snap.docs.find(d => d.id === 'ai_report');
                    if (reportDoc) setAiReport(reportDoc.data().report);
                });

                return () => { unsubPosts(); unsubComments(); unsubSettings(); };
            }, [user, geminiKey]);

            const handleLogin = async () => {
                try { await signInWithPopup(auth, provider); } 
                catch (error) { alert("Error al iniciar sesión: " + error.message); }
            };

            const handleLogout = () => { signOut(auth); };

            const saveApiKey = () => {
                if(tempKeyInput.trim().length > 10) {
                    localStorage.setItem('gemini_api_key_ivi', tempKeyInput.trim());
                    setGeminiKey(tempKeyInput.trim());
                    setShowKeySetup(false);
                }
            };

            const fetchGeminiWithRetry = async (payload, retries = 5) => {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${geminiKey}`;
                let attempt = 0;
                const backoff = [1000, 2000, 4000, 8000];

                while (attempt < retries) {
                    try {
                        const response = await fetch(url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                        if (!response.ok) throw new Error(`API Error: ${response.status}`);
                        return await response.json();
                    } catch (error) {
                        if (attempt === retries - 1) throw error;
                        await delay(backoff[attempt]);
                        attempt++;
                    }
                }
            };

            const saveGlobalStrategy = async () => {
                setIsSavingStrategy(true);
                try {
                    const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'settings', 'global_strategy');
                    await setDoc(docRef, { text: globalStrategy, updatedAt: serverTimestamp() }, { merge: true });
                    setTimeout(() => setIsSavingStrategy(false), 1000);
                } catch (err) { setErrorMsg("Error al guardar la estrategia."); setIsSavingStrategy(false); }
            };

            const createNewPost = async () => {
                if (!newPostText.trim()) return;
                try {
                    const docRef = await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'posts'), {
                        text: newPostText.trim(), context: "", category: "Genérica", createdAt: serverTimestamp()
                    });
                    setActivePostId(docRef.id);
                    setNewPostText("");
                    if (window.innerWidth < 1024) setIsSidebarOpen(false);
                } catch (err) { setErrorMsg("Error al crear la publicación."); }
            };

            const handleGenerateResponses = async () => {
                if (!newCommentsText.trim() || !activePostId || isGenerating) return;
                if (!geminiKey) { setShowKeySetup(true); return; }
                
                setIsGenerating(true);
                setErrorMsg("");
                const activePost = posts.find(p => p.id === activePostId);
                
                let categoryInstructions = "";
                switch(activePost.category) {
                    case 'Familiar': categoryInstructions = "CATEGORÍA: FAMILIAR. Las respuestas deben ser MUY CORTAS (1 a 10 palabras). Usa frases sencillas, cálidas y empáticas. Usa emojis cálidos. CERO política."; break;
                    case 'Legislativa': categoryInstructions = "CATEGORÍA: LEGISLATIVA. Respuestas más estudiadas y letradas. Utiliza argumentos respaldados en información jurídica o parlamentaria. Profesional y técnico."; break;
                    case 'Política': categoryInstructions = "CATEGORÍA: POLÍTICA. Tono FUERTE, CONTRASTANTE, FIRME y DIRECTO. Eres la voz de la oposición. Responde con alta política y contundencia, pero SIEMPRE respetuosa."; break;
                    case 'Genérica': default: categoryInstructions = "CATEGORÍA: GENÉRICA. Respuestas amables de rutina ('Totalmente de acuerdo', 'Seguiremos trabajando'). Usa emojis. No te extiendas."; break;
                }

                const postContext = activePost.context?.trim() ? `\nCONTEXTO ESPECÍFICO DEL POST: ${activePost.context}` : "";
                const globalContext = globalStrategy?.trim() ? `\nLÍNEA DISCURSIVA / ESTRATEGIA GLOBAL ACTUAL: ${globalStrategy}` : "";

                const systemPrompt = `Eres el Community Manager de la Senadora Ivideliza Reyes Hernández (Nayarit). ${categoryInstructions} ${postContext} ${globalContext} Reglas: 1. Extrae nombre. 2. NUNCA inicies con "Hola [Nombre]". 3. Analiza el sentimiento en: 'Positivo', 'Neutro', 'Reclamo' o 'Negativo'.`;
                const userPrompt = `PUBLICACIÓN:\n"${activePost.text}"\n\nCOMENTARIOS:\n${newCommentsText}`;

                const payload = {
                    contents: [{ parts: [{ text: userPrompt }] }],
                    systemInstruction: { parts: [{ text: systemPrompt }] },
                    generationConfig: {
                        responseMimeType: "application/json",
                        responseSchema: {
                        type: "ARRAY",
                        items: { type: "OBJECT", properties: { nombreUsuario: { type: "STRING" }, comentarioOriginal: { type: "STRING" }, sentimiento: { type: "STRING" }, respuestaGenerada: { type: "STRING" } }, required: ["nombreUsuario", "comentarioOriginal", "sentimiento", "respuestaGenerada"] }
                        }
                    }
                };

                try {
                    const data = await fetchGeminiWithRetry(payload);
                    const jsonText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (!jsonText) throw new Error("Asegúrate de que tu API key sea válida.");
                    
                    const generatedItems = JSON.parse(jsonText);
                    for (const item of generatedItems) {
                        await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'comments'), {
                            postId: activePostId, nombreUsuario: item.nombreUsuario || 'Usuario', originalComment: item.comentarioOriginal, sentiment: item.sentimiento, generatedResponse: item.respuestaGenerada, createdAt: serverTimestamp()
                        });
                    }
                    setNewCommentsText("");
                } catch (err) {
                    setErrorMsg("Error. Verifica que tu Llave de Gemini (API Key) sea correcta.");
                    setShowKeySetup(true);
                } finally { setIsGenerating(false); }
            };

            const handleCopy = (id, text) => {
                if (copyToClipboard(text)) { setCopiedId(id); setTimeout(() => setCopiedId(null), 2000); }
            };

            if (authLoading) return <div className="flex items-center justify-center h-screen bg-slate-50"><div className="w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div></div>;

            if (!user) {
                return (
                    <div className="flex items-center justify-center h-screen bg-gradient-to-br from-blue-50 to-slate-100">
                        <div className="bg-white p-10 rounded-3xl shadow-xl max-w-md w-full text-center border border-slate-200 m-4">
                            <div className="bg-blue-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6"><Target className="w-10 h-10 text-blue-600" /></div>
                            <h1 className="text-2xl font-black text-slate-800 mb-2">Gestor de Redes CM</h1>
                            <p className="text-slate-500 mb-8 font-medium">Sen. Ivideliza Reyes</p>
                            <button onClick={handleLogin} className="w-full flex items-center justify-center gap-3 bg-white border-2 border-slate-200 hover:bg-slate-50 text-slate-700 py-3 px-4 rounded-xl font-bold transition-all shadow-sm">
                                <svg className="w-5 h-5" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/><path fill="none" d="M1 1h22v22H1z"/></svg>
                                Ingresar con Google
                            </button>
                        </div>
                    </div>
                );
            }

            if (showKeySetup) {
                return (
                    <div className="flex items-center justify-center h-screen bg-slate-900 p-4">
                        <div className="bg-white p-8 rounded-2xl shadow-2xl max-w-lg w-full border-4 border-blue-500">
                            <div className="flex items-center gap-3 mb-4 text-blue-600"><Key className="w-8 h-8" /><h2 className="text-2xl font-black">Conexión de IA</h2></div>
                            <p className="text-slate-600 mb-6 text-sm">Para proteger tu cuenta, la llave de Gemini no se guarda en el código público de GitHub. Se guardará de forma segura y privada en la memoria de este dispositivo.</p>
                            <input type="text" value={tempKeyInput} onChange={e => setTempKeyInput(e.target.value)} placeholder="Pega tu nueva API Key (empieza con AIzaSy...)" className="w-full p-4 rounded-xl border-2 border-slate-300 focus:border-blue-500 outline-none mb-4 font-mono text-sm" />
                            <button onClick={saveApiKey} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl">Conectar Sistema</button>
                        </div>
                    </div>
                );
            }

            const activePost = posts.find(p => p.id === activePostId);
            const activeComments = comments.filter(c => c.postId === activePostId);

            return (
                <div className="flex h-screen overflow-hidden relative">
                    {/* SIDEBAR */}
                    {isSidebarOpen && <div className="fixed inset-0 bg-black/20 z-40 lg:hidden" onClick={() => setIsSidebarOpen(false)} />}
                    <aside className={`fixed lg:static inset-y-0 left-0 w-80 bg-white border-r border-slate-200 z-50 transform transition-transform duration-300 flex flex-col ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'}`}>
                        <div className="p-4 border-b border-slate-200 bg-blue-50/50"><h2 className="text-blue-800 font-bold text-lg flex items-center gap-2"><History className="w-5 h-5" /> Historial</h2></div>
                        <div className="flex-1 overflow-y-auto p-4 space-y-3">
                        <button onClick={() => { setActivePostId(null); setCurrentView('manager'); setIsSidebarOpen(false); }} className={`w-full flex items-center justify-center gap-2 p-3 rounded-xl border-2 border-dashed font-medium transition-colors ${!activePostId && currentView === 'manager' ? 'border-blue-500 text-blue-600 bg-blue-50' : 'border-slate-300 text-slate-600 hover:border-blue-400 hover:bg-blue-50'}`}>
                            <Plus className="w-5 h-5" /> Nueva Publicación
                        </button>
                        <div className="pt-4 space-y-2">
                            {posts.map(post => (
                            <button key={post.id} onClick={() => { setActivePostId(post.id); setCurrentView('manager'); setIsSidebarOpen(false); }} className={`w-full text-left p-3 rounded-lg border transition-all ${activePostId === post.id && currentView === 'manager' ? 'border-blue-500 bg-blue-50 shadow-sm' : 'border-slate-200 hover:border-slate-300 bg-white'}`}>
                                <p className="text-sm line-clamp-2 text-slate-700">{post.text}</p>
                            </button>
                            ))}
                        </div>
                        </div>
                    </aside>

                    {/* MAIN CONTENT */}
                    <main className="flex-1 flex flex-col h-full overflow-hidden relative">
                        <header className="bg-white border-b border-slate-200 p-4 flex items-center justify-between z-10 shrink-0">
                        <div className="flex items-center gap-4">
                            <button onClick={() => setIsSidebarOpen(true)} className="p-2 -ml-2 text-slate-500 lg:hidden rounded-lg hover:bg-slate-100"><Menu className="w-6 h-6" /></button>
                            <h1 className="text-lg font-bold text-slate-800">Sen. Ivideliza Reyes</h1>
                        </div>
                        <div className="flex items-center gap-2">
                            <button onClick={() => { localStorage.removeItem('gemini_api_key_ivi'); setGeminiKey(''); setShowKeySetup(true); }} className="text-xs bg-slate-100 text-slate-600 px-3 py-1.5 rounded-lg flex items-center gap-1"><Key className="w-3 h-3"/> Cambiar Llave IA</button>
                            <button onClick={handleLogout} className="text-slate-400 hover:text-red-500 p-1 rounded-md" title="Cerrar sesión"><LogOut className="w-5 h-5"/></button>
                        </div>
                        </header>

                        {errorMsg && <div className="bg-red-50 text-red-600 p-3 text-sm text-center border-b border-red-100">{errorMsg}</div>}

                        <div className="flex-1 overflow-y-auto p-4 md:p-6 bg-slate-50">
                            {!activePostId ? (
                                <div className="max-w-4xl mx-auto bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
                                    <div className="flex items-center gap-3 mb-4 text-blue-700"><MessageSquare className="w-6 h-6" /><h2 className="text-lg font-semibold">1. Pega la publicación original</h2></div>
                                    <textarea value={newPostText} onChange={(e) => setNewPostText(e.target.value)} placeholder="Ej: Seguimos trabajando por Nayarit..." className="w-full h-40 p-4 rounded-xl border border-slate-300 focus:border-blue-500 outline-none resize-none text-slate-700" />
                                    <div className="mt-4 flex justify-end"><button onClick={createNewPost} disabled={!newPostText.trim()} className="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl font-medium disabled:opacity-50">Guardar <ChevronRight className="w-5 h-5" /></button></div>
                                </div>
                            ) : (
                                <div className="max-w-4xl mx-auto space-y-6">
                                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 relative">
                                        <div className="absolute left-0 top-0 bottom-0 w-1 bg-blue-500"></div>
                                        <h3 className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Publicación Original</h3>
                                        <p className="text-slate-600 text-sm whitespace-pre-wrap">{activePost?.text}</p>
                                        <div className="mt-5 border-t border-slate-100 pt-4">
                                            <p className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">Tono (Categoría)</p>
                                            <div className="grid grid-cols-2 md:grid-cols-4 gap-2">
                                                {[{ name: 'Familiar', icon: Users, bg: 'bg-pink-50', color: 'text-pink-600', border: 'border-pink-200' }, { name: 'Genérica', icon: FileText, bg: 'bg-slate-50', color: 'text-slate-600', border: 'border-slate-200' }, { name: 'Legislativa', icon: BookOpen, bg: 'bg-indigo-50', color: 'text-indigo-600', border: 'border-indigo-200' }, { name: 'Política', icon: Megaphone, bg: 'bg-orange-50', color: 'text-orange-600', border: 'border-orange-200' }].map(cat => {
                                                    const isActive = (activePost?.category || 'Genérica') === cat.name;
                                                    return <button key={cat.name} onClick={() => { updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'posts', activePost.id), { category: cat.name }); }} className={`p-2 rounded-xl text-xs font-bold flex flex-col items-center gap-1 border-2 transition-all ${isActive ? `${cat.bg} ${cat.color} ${cat.border} shadow-sm scale-105` : 'bg-white text-slate-400 border-slate-100 hover:bg-slate-50'}`}><cat.icon className="w-4 h-4" /> {cat.name}</button>
                                                })}
                                            </div>
                                        </div>
                                    </div>
                                    <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-5">
                                        <h3 className="text-sm font-bold text-slate-700 mb-2">2. Pega los comentarios de Facebook</h3>
                                        <textarea value={newCommentsText} onChange={(e) => setNewCommentsText(e.target.value)} placeholder="Pega los comentarios copiados..." className="w-full h-32 p-3 rounded-lg border border-slate-300 focus:border-blue-500 outline-none resize-none text-sm mb-3" />
                                        <button onClick={handleGenerateResponses} disabled={!newCommentsText.trim() || isGenerating} className="w-full flex items-center justify-center gap-2 bg-slate-800 hover:bg-slate-900 disabled:opacity-50 text-white py-3 rounded-xl font-bold">
                                            {isGenerating ? "Redactando..." : <><Send className="w-5 h-5" /> Generar Respuestas</>}
                                        </button>
                                    </div>
                                    <div className="space-y-4">
                                        {activeComments.map((comment) => {
                                            const isNegative = comment.sentiment === 'Negativo' || comment.sentiment === 'Reclamo' || comment.isHostile;
                                            return (
                                                <div key={comment.id} className={`bg-white rounded-2xl shadow-sm border-2 overflow-hidden flex flex-col md:flex-row ${isNegative ? 'border-red-300' : 'border-slate-200'}`}>
                                                    <div className="p-4 md:w-2/3 border-b md:border-b-0 md:border-r border-slate-100 flex flex-col space-y-3">
                                                        <div className="flex justify-between items-start"><span className="font-bold text-sm flex items-center gap-2"><User className="w-4 h-4 text-slate-400"/> {comment.nombreUsuario}</span></div>
                                                        <div className="bg-slate-50 p-2 rounded border border-slate-100 text-sm text-slate-600 italic">"{comment.originalComment}"</div>
                                                        <div className="text-base text-slate-800">{comment.generatedResponse}</div>
                                                    </div>
                                                    <div className="p-4 md:w-1/3 bg-slate-50 flex items-center justify-center">
                                                        <button onClick={() => handleCopy(comment.id, comment.generatedResponse)} className={`w-full py-4 rounded-xl font-bold flex items-center justify-center gap-2 ${copiedId === comment.id ? 'bg-green-100 text-green-700 border border-green-200' : 'bg-white text-blue-600 border-2 border-blue-100 hover:bg-blue-50'}`}>{copiedId === comment.id ? <><CheckCircle2 className="w-5 h-5"/> Copiado</> : <><Copy className="w-5 h-5"/> Copiar</>}</button>
                                                    </div>
                                                </div>
                                            )
                                        })}
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
