<body class="bg-slate-50 text-slate-800 font-sans antialiased">

    <!-- 4. El Código de tu Aplicación -->
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { Copy, Plus, Menu, X, Settings, MessageSquare, Send, CheckCircle2, ChevronRight, History, AlertTriangle, User, Users, FileText, BookOpen, Megaphone, BarChart3, TrendingUp, Target, Lightbulb, MessageCircle, LogOut, Key, Smile, Meh, Frown, Edit2, Trash2, FileClock, Check, Save, UserPlus, Eye, EyeOff, ShieldAlert, Ban, Sparkles, Trash, RefreshCw } from 'lucide-react';
        
        import { initializeApp } from 'firebase/app';
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from 'firebase/auth';
        import { getFirestore, collection, doc, setDoc, onSnapshot, addDoc, serverTimestamp, updateDoc, deleteDoc } from 'firebase/firestore';

        // --- CREDENCIALES DE FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyA7xjysJVQb3tYEb8ZU9yHbs-MBDWVUhk4",
            authDomain: "gestor-ivi.firebaseapp.com",
            projectId: "gestor-ivi",
            storageBucket: "gestor-ivi.firebasestorage.app",
            messagingSenderId: "562230194451",
            appId: "1:562230194451:web:3877b3bf0d18b6ac912ae6",
            measurementId: "G-5MDJNBV15H"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        provider.setCustomParameters({ prompt: 'select_account' });
        const appId = firebaseConfig.projectId;

        // --- ACCESO PERMITIDO ---
        const ALLOWED_EMAIL = "luixnay@gmail.com";
        const normalizeEmail = (email) => (email || "").trim().toLowerCase();
        const isAllowedUser = (firebaseUser) => {
            return firebaseUser &&
                   normalizeEmail(firebaseUser.email) === ALLOWED_EMAIL &&
                   firebaseUser.emailVerified === true;
        };

        // --- FUNCIONES UTILITARIAS ---
        const copyToClipboard = (text) => {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            textArea.style.left = "-9999px";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            let successful = false;
            try { successful = document.execCommand('copy'); } catch (err) {}
            document.body.removeChild(textArea);
            return successful;
        };

        const delay = (ms) => new Promise(res => setTimeout(res, ms));

        // --- CONFIGURACIÓN DE GEMINI ---
        const GEMINI_MODEL = "gemini-2.5-flash";

        const fetchGeminiWithRetry = async (payload, apiKey, retries = 4) => {
            const cleanApiKey = (apiKey || "").trim().replace(/^['"]|['"]$/g, "");
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent`;
            let attempt = 0;
            const backoff = [2000, 5000, 10000, 18000];

            while (attempt < retries) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'x-goog-api-key': cleanApiKey
                        },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        let detail = "";
                        try {
                            const errJson = await response.json();
                            detail = errJson?.error?.message ? ` - ${errJson.error.message}` : "";
                        } catch (_) {}

                        if (response.status === 400) throw new Error(`Solicitud inválida a Gemini${detail}`);
                        if (response.status === 401 || response.status === 403) throw new Error(`API Key rechazada o sin permisos para Gemini${detail}`);
                        if (response.status === 404) throw new Error(`Modelo no encontrado o apagado: ${GEMINI_MODEL}${detail}`);
                        if (response.status === 429) throw new Error(`429_QUOTA_EXCEEDED${detail}`);
                        throw new Error(`Error Gemini ${response.status}${detail}`);
                    }

                    return await response.json();
                } catch (error) {
                    const msg = String(error?.message || error);
                    const retryable = msg.includes('429_QUOTA_EXCEEDED') || msg.includes('429') || msg.includes('500') || msg.includes('502') || msg.includes('503') || msg.includes('504') || msg.includes('Failed to fetch');
                    
                    if (!retryable || attempt === retries - 1) {
                        if (msg.includes('429') || msg.includes('QUOTA')) {
                            throw new Error("Límite gratuito de peticiones alcanzado. Por favor, espera 1 minuto e inténtalo de nuevo.");
                        }
                        throw error;
                    }
                    
                    console.warn(`Límite de API alcanzado (intento ${attempt + 1}). Esperando ${backoff[attempt]/1000} segundos para reconectar...`);
                    await delay(backoff[attempt]);
                    attempt++;
                }
            }
        };

        const getPostCategories = (post) => {
            if (!post) return ["Social"];
            if (post.categories && Array.isArray(post.categories) && post.categories.length > 0) {
                return post.categories;
            }
            if (post.category) {
                return post.category === "Genérica" ? ["Social"] : [post.category];
            }
            return ["Social"];
        };

        const getSentimentVisuals = (rawSentiment, isHostile = false) => {
            let s = rawSentiment || (isHostile ? 'Negativo' : 'Neutro');
            if (s === 'Reclamo') s = 'Reclamo ciudadano';
            
            switch (s) {
                case 'Positivo': return { label: s, border: 'border-green-200', bg: 'bg-green-100', text: 'text-green-700', icon: Smile };
                case 'Neutro': return { label: s, border: 'border-slate-200', bg: 'bg-slate-100', text: 'text-slate-600', icon: Meh };
                case 'Reclamo ciudadano': return { label: s, border: 'border-amber-300', bg: 'bg-amber-100', text: 'text-amber-700', icon: MessageSquare };
                case 'Crítica externa': return { label: s, border: 'border-orange-300', bg: 'bg-orange-100', text: 'text-orange-700', icon: AlertTriangle };
                case 'Negativo': return { label: s, border: 'border-red-300', bg: 'bg-red-100', text: 'text-red-700', icon: Frown };
                case 'Escalar': return { label: s, border: 'border-red-500 shadow-sm shadow-red-200', bg: 'bg-red-100', text: 'text-red-900', icon: ShieldAlert, pulse: true };
                default: return { label: s, border: 'border-slate-200', bg: 'bg-slate-100', text: 'text-slate-600', icon: Meh };
            }
        };

        // --- APLICACIÓN PRINCIPAL ---
        function App() {
            const [user, setUser] = useState(null);
            const [authLoading, setAuthLoading] = useState(true);
            const [currentView, setCurrentView] = useState('manager'); 
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);

            const [posts, setPosts] = useState([]);
            const [comments, setComments] = useState([]);
            const [activePostId, setActivePostId] = useState(null);
            
            const [isContextModalOpen, setIsContextModalOpen] = useState(false);
            const [tempContextText, setTempContextText] = useState("");
            const [tempPostInstruction, setTempPostInstruction] = useState("");
            
            const [strategies, setStrategies] = useState([]);
            const [aliases, setAliases] = useState([]);
            
            const [isSettingsModalOpen, setIsSettingsModalOpen] = useState(false);
            const [isPurging, setIsPurging] = useState(false);

            const [isDraftModalOpen, setIsDraftModalOpen] = useState(false);
            const [draftsList, setDraftsList] = useState([]);
            const [isGeneratingDrafts, setIsGeneratingDrafts] = useState(false);

            const [isAliasModalOpen, setIsAliasModalOpen] = useState(false);
            const [tempAliasOriginal, setTempAliasOriginal] = useState("");
            const [tempAliasPreferred, setTempAliasPreferred] = useState("");

            const [newStrategyText, setNewStrategyText] = useState("");
            const [isSavingStrategy, setIsSavingStrategy] = useState(false);
            const [editingStrategyId, setEditingStrategyId] = useState(null);
            const [editingStrategyText, setEditingStrategyText] = useState("");
            const [strategySuccessMsg, setStrategySuccessMsg] = useState("");

            const [newPostText, setNewPostText] = useState("");
            const [newCommentsText, setNewCommentsText] = useState("");
            const [isGenerating, setIsGenerating] = useState(false);
            const [errorMsg, setErrorMsg] = useState("");
            const [loginError, setLoginError] = useState("");
            
            const [copiedId, setCopiedId] = useState(null);
            const [revealedCopiedCommentIds, setRevealedCopiedCommentIds] = useState([]);
            const [revealedIgnoredCommentIds, setRevealedIgnoredCommentIds] = useState([]);
            
            const [aiReports, setAiReports] = useState([]);
            const [isGeneratingReport, setIsGeneratingReport] = useState(false);
            const [viewingReport, setViewingReport] = useState(null);

            const [isApiModalOpen, setIsApiModalOpen] = useState(false);
            const [tempApiKey, setTempApiKey] = useState("");
            const [pendingAction, setPendingAction] = useState(null);

            const [editingCommentId, setEditingCommentId] = useState(null);
            const [editingCommentText, setEditingCommentText] = useState("");

            const [regeneratingCommentId, setRegeneratingCommentId] = useState(null);
            const [regenerateInstruction, setRegenerateInstruction] = useState("");
            const [isRegeneratingSingle, setIsRegeneratingSingle] = useState(false);

            useEffect(() => {
                const unsubscribe = onAuthStateChanged(auth, async (currentUser) => {
                    if (currentUser && !isAllowedUser(currentUser)) {
                        setUser(null);
                        setLoginError(`Acceso denegado. Esta aplicación solo está autorizada para ${ALLOWED_EMAIL}.`);
                        await signOut(auth);
                        setAuthLoading(false);
                        return;
                    }
                    setUser(currentUser);
                    setAuthLoading(false);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const uid = user.uid; 

                const postsRef = collection(db, 'artifacts', appId, 'users', uid, 'posts');
                const commentsRef = collection(db, 'artifacts', appId, 'users', uid, 'comments');
                const strategiesRef = collection(db, 'artifacts', appId, 'users', uid, 'strategies'); 
                const reportsRef = collection(db, 'artifacts', appId, 'users', uid, 'ai_reports'); 
                const aliasesRef = collection(db, 'artifacts', appId, 'users', uid, 'user_aliases'); 

                const handleFirestoreError = async (err) => {
                    console.error(err);
                    if (err.code === 'permission-denied') {
                        setErrorMsg("Acceso denegado por las reglas de Firebase.");
                        await signOut(auth);
                    } else {
                        setErrorMsg("Error al leer datos de Firebase.");
                    }
                };

                const unsubPosts = onSnapshot(postsRef, (snap) => {
                    const fetchedPosts = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    fetchedPosts.sort((a, b) => (b.createdAt?.toMillis() || 0) - (a.createdAt?.toMillis() || 0));
                    setPosts(fetchedPosts);
                }, handleFirestoreError);

                const unsubComments = onSnapshot(commentsRef, (snap) => {
                    const fetchedComments = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    fetchedComments.sort((a, b) => (b.createdAt?.toMillis() || 0) - (a.createdAt?.toMillis() || 0));
                    setComments(fetchedComments);
                }, handleFirestoreError);

                const unsubStrategies = onSnapshot(strategiesRef, (snap) => {
                    const fetchedStrategies = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    fetchedStrategies.sort((a, b) => (b.createdAt?.toMillis() || 0) - (a.createdAt?.toMillis() || 0));
                    setStrategies(fetchedStrategies);
                }, handleFirestoreError);

                const unsubReports = onSnapshot(reportsRef, (snap) => {
                    const fetchedReports = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    fetchedReports.sort((a, b) => (b.createdAt?.toMillis() || 0) - (a.createdAt?.toMillis() || 0));
                    setAiReports(fetchedReports);
                }, handleFirestoreError);

                const unsubAliases = onSnapshot(aliasesRef, (snap) => {
                    const fetchedAliases = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setAliases(fetchedAliases);
                }, handleFirestoreError);

                return () => { unsubPosts(); unsubComments(); unsubStrategies(); unsubReports(); unsubAliases(); };
            }, [user]);

            const handleLogin = async () => {
                setLoginError("");
                try {
                    const result = await signInWithPopup(auth, provider);
                    if (!isAllowedUser(result.user)) {
                        await signOut(auth);
                        setUser(null);
                        setLoginError(`Acceso denegado. Esta aplicación solo está autorizada para ${ALLOWED_EMAIL}.`);
                    }
                } catch (error) {
                    console.error(error);
                    setLoginError("Error al iniciar sesión: " + error.message);
                }
            };

            const handleLogout = () => { signOut(auth); };

            const purgeOldData = async () => {
                if(!confirm("¿Estás seguro de eliminar todos los posts y comentarios de hace más de 3 meses? Esto reducirá tus lecturas en Firebase y no se puede deshacer.")) return;
                setIsPurging(true);
                const threeMonthsAgo = new Date();
                threeMonthsAgo.setMonth(threeMonthsAgo.getMonth() - 3);

                try {
                    const oldPosts = posts.filter(p => p.createdAt && p.createdAt.toDate() < threeMonthsAgo);
                    const oldComments = comments.filter(c => c.createdAt && c.createdAt.toDate() < threeMonthsAgo);

                    for (const p of oldPosts) await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'posts', p.id));
                    for (const c of oldComments) await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'comments', c.id));

                    alert(`Mantenimiento completado: Se eliminaron ${oldPosts.length} posts y ${oldComments.length} comentarios viejos.`);
                } catch(e) { setErrorMsg("Error purgando datos."); }
                finally { setIsPurging(false); }
            };

            const saveNewStrategy = async () => {
                if (!newStrategyText.trim()) return;
                setIsSavingStrategy(true);
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'strategies'), {
                        text: newStrategyText.trim(),
                        createdAt: serverTimestamp()
                    });
                    setNewStrategyText("");
                    setStrategySuccessMsg("¡Instrucción guardada exitosamente!");
                    setTimeout(() => setStrategySuccessMsg(""), 3000);
                } catch (err) { setErrorMsg("Error al guardar la estrategia."); } 
                finally { setIsSavingStrategy(false); }
            };

            const deleteStrategy = async (id) => {
                if(confirm("¿Estás seguro de eliminar esta instrucción?")) {
                    try { await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'strategies', id)); } 
                    catch (err) { setErrorMsg("Error al eliminar la estrategia."); }
                }
            };

            const startEditingStrategy = (strategy) => {
                setEditingStrategyId(strategy.id);
                setEditingStrategyText(strategy.text);
            };

            const saveEditedStrategy = async () => {
                if (!editingStrategyText.trim()) return;
                try {
                    await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'strategies', editingStrategyId), {
                        text: editingStrategyText.trim()
                    });
                    setEditingStrategyId(null);
                    setEditingStrategyText("");
                } catch (err) { setErrorMsg("Error al actualizar la estrategia."); }
            };

            const openAliasModal = (originalName) => {
                const existing = aliases.find(a => a.originalName.toLowerCase() === originalName.toLowerCase());
                setTempAliasOriginal(originalName);
                setTempAliasPreferred(existing ? existing.preferredName : "");
                setIsAliasModalOpen(true);
            };

            const saveAlias = async () => {
                if (!tempAliasPreferred.trim()) return;
                try {
                    const existing = aliases.find(a => a.originalName.toLowerCase() === tempAliasOriginal.toLowerCase());
                    if (existing) {
                        await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'user_aliases', existing.id), {
                            preferredName: tempAliasPreferred.trim(),
                            updatedAt: serverTimestamp()
                        });
                    } else {
                        await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'user_aliases'), {
                            originalName: tempAliasOriginal.trim(),
                            preferredName: tempAliasPreferred.trim(),
                            createdAt: serverTimestamp()
                        });
                    }
                    setIsAliasModalOpen(false);
                } catch (err) { setErrorMsg("Error al guardar alias."); }
            };

            const startEditingComment = (comment) => {
                setEditingCommentId(comment.id);
                setEditingCommentText(comment.generatedResponse);
            };

            const saveEditedResponse = async (commentId) => {
                if (!editingCommentText.trim()) return;
                try {
                    await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'comments', commentId), { 
                        generatedResponse: editingCommentText.trim(),
                        status: 'editado'
                    });
                    setEditingCommentId(null);
                    setEditingCommentText("");
                } catch (error) { setErrorMsg("Error al guardar la respuesta editada."); }
            };

            const changeCommentStatus = async (commentId, newStatus) => {
                try {
                    await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'comments', commentId), { 
                        status: newStatus 
                    });
                } catch (error) { console.error("Error cambiando estado:", error); }
            };

            const handleCopy = (id, text) => {
                if (copyToClipboard(text)) {
                    setCopiedId(id);
                    setTimeout(() => {
                        setCopiedId(null);
                        changeCommentStatus(id, 'copiado');
                        setRevealedCopiedCommentIds(prev => prev.filter(cId => cId !== id));
                    }, 800);
                }
            };

            const createNewPost = async () => {
                if (!newPostText.trim()) return;
                try {
                    const docRef = await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'posts'), {
                        text: newPostText.trim(),
                        context: "", 
                        postInstruction: "",
                        categories: ["Social"], 
                        createdAt: serverTimestamp()
                    });
                    setActivePostId(docRef.id);
                    setNewPostText("");
                    if (window.innerWidth < 1024) setIsSidebarOpen(false);
                } catch (err) { setErrorMsg("Error al crear la publicación."); }
            };

            const deletePost = async (postId, e) => {
                if (e) e.stopPropagation();
                if (!confirm("¿Estás seguro de eliminar esta publicación y todas sus respuestas? Esta acción no se puede deshacer.")) return;
                
                try {
                    const associatedComments = comments.filter(c => c.postId === postId);
                    for (const c of associatedComments) {
                        await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'comments', c.id));
                    }
                    
                    await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'posts', postId));
                    
                    if (activePostId === postId) {
                        setActivePostId(null);
                        setCurrentView('manager');
                    }
                } catch (err) {
                    setErrorMsg("Error al eliminar la publicación.");
                }
            };

            const openContextModal = () => {
                const activePost = posts.find(p => p.id === activePostId);
                if (activePost) {
                    setTempContextText(activePost.context || "");
                    setTempPostInstruction(activePost.postInstruction || "");
                    setIsContextModalOpen(true);
                }
            };

            const savePostContext = async () => {
                try {
                    await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'posts', activePostId), { 
                        context: tempContextText,
                        postInstruction: tempPostInstruction
                    });
                    setIsContextModalOpen(false);
                } catch (err) { setErrorMsg("Error al guardar el contexto."); }
            };

            const togglePostCategory = async (postId, categoryName, currentCategories) => {
                try {
                    let newCategories = [...currentCategories];
                    if (newCategories.includes(categoryName)) {
                        newCategories = newCategories.filter(c => c !== categoryName);
                    } else {
                        newCategories.push(categoryName);
                    }
                    if (newCategories.length === 0) newCategories = ["Social"];
                    
                    await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'posts', postId), { 
                        categories: newCategories,
                        category: null 
                    });
                } catch (err) { setErrorMsg("Error al actualizar categorías."); }
            };

            const executeWithApiKey = (actionCallback) => {
                const key = localStorage.getItem('gemini_api_key');
                if (!key) {
                    setPendingAction(() => actionCallback); 
                    setIsApiModalOpen(true);
                } else { actionCallback(key); }
            };

            const saveApiKeyAndExecute = () => {
                const cleanKey = tempApiKey.trim().replace(/^['"]|['"]$/g, "");
                if(cleanKey) {
                    localStorage.setItem('gemini_api_key', cleanKey);
                    setIsApiModalOpen(false);
                    if(pendingAction) {
                        pendingAction(cleanKey);
                        setPendingAction(null);
                    }
                }
            };

            const runGenerateResponses = async (currentApiKey) => {
                setIsGenerating(true);
                setErrorMsg("");
                const activePost = posts.find(p => p.id === activePostId);
                const activeCategories = getPostCategories(activePost);
                
                let categoryInstructions = activeCategories.map(cat => {
                    switch(cat) {
                        case 'Social': return "- SOCIAL: Publicación de cercanía ciudadana, comunidad, territorio, causas sociales o interacción cotidiana. Responder con calidez, claridad y naturalidad. Evitar sonar genérico, vacío o robótico.";
                        case 'Familiar': return "- FAMILIAR: Respuestas muy cortas, cálidas, humanas y sencillas. Idealmente de 1 a 10 palabras. Puede usar emojis cálidos. Cero confrontación.";
                        case 'Legislativa': return "- LEGISLATIVA: Responder con seriedad institucional, claridad y sustento. Puede usar lenguaje parlamentario o jurídico sencillo, sin inventar datos. Mantener tono profesional.";
                        case 'Política': return "- POLÍTICA: Responder con firmeza, contraste y claridad política. Tono directo, de oposición, pero siempre respetuoso. No insultar, no acusar sin evidencia y no inventar datos.";
                        default: return "";
                    }
                }).join('\n');

                const activeAliasesText = aliases.length > 0 
                    ? `\nMEMORIA DE ALIAS CONOCIDOS:\n${aliases.map(a => `- ${a.originalName} -> Prefiere que lo llamen: ${a.preferredName}`).join('\n')}\n(Usa estos alias de forma natural si el usuario coincide. NO inventes alias, usa solo los de esta lista).` 
                    : "";

                const combinedStrategies = strategies.map(s => `- ${s.text}`).join('\n');
                
                const postContext = activePost.context?.trim() ? `\nCONTEXTO ESPECÍFICO DEL POST:\n${activePost.context}` : "";
                const postSpecificInstruction = activePost.postInstruction?.trim() ? `\nINSTRUCCIÓN ESPECÍFICA PARA ESTA PUBLICACIÓN (PRIORIDAD ALTA):\n${activePost.postInstruction}` : "";
                const globalContext = combinedStrategies ? `\nESTRATEGIAS GLOBALES ACTIVAS:\n${combinedStrategies}` : "";

                const systemPrompt = `
                    Eres la Senadora Ivideliza Reyes Hernández, Senadora por Nayarit (PAN). Estás respondiendo DIRECTAMENTE y EN PRIMERA PERSONA a los comentarios que te dejan los ciudadanos en tus redes sociales.
                    
                    ENFOQUES ACTIVOS DE LA PUBLICACIÓN (Combina estos estilos):
                    ${categoryInstructions}
                    
                    ${postContext}
                    ${postSpecificInstruction}
                    ${activeAliasesText}
                    ${globalContext}
                    
                    REGLAS Y GUARDRAILS OBLIGATORIOS (CERO TOLERANCIA):
                    1. IDENTIDAD ABSOLUTA (¡IMPORTANTE!): TÚ ERES LA SENADORA. Habla siempre en primera persona del singular ("Yo", "Agradezco", "Estoy trabajando") o plural inclusivo ("Estamos"). ESTÁ ESTRICTAMENTE PROHIBIDO responder en tercera persona. NUNCA digas "La senadora agradece...", "De parte de la senadora" o "El equipo de Ivideliza".
                    2. CRÍTICO Y OBLIGATORIO: Nunca uses la misma estructura de frase dos veces seguidas en este bloque de respuestas. Varía tu vocabulario (ej. "Gracias", "Te agradezco", "Qué gusto leerte", "Valoro tu mensaje") para que ninguna respuesta se parezca a la anterior. ¡Sé natural y orgánica!
                    3. No inventes datos, cifras, logros, denuncias, gestiones ni hechos. Si no hay información en el contexto, no la menciones.
                    4. No prometas resolver casos individuales ni gestiones específicas.
                    5. No hagas acusaciones directas sin evidencia explícita en el contexto.
                    6. Mantén las respuestas de máximo 1 o 2 frases, salvo que el enfoque Legislativo o Político requiera un poco más de desarrollo.
                    7. No inicies con 'Hola [Nombre]'. Usa el nombre o alias solo si se siente natural en la frase.
                    8. CLASIFICACIÓN DE SENTIMIENTO OBLIGATORIA (Elige solo una de estas 6):
                       - 'Positivo': apoyo, felicitación, acuerdo.
                       - 'Neutro': comentario informativo, simple.
                       - 'Reclamo ciudadano': queja legítima sobre un problema público, inconformidad ciudadana, sin ataque directo a la senadora. Responde con empatía.
                       - 'Crítica externa': comentario negativo contra el gobierno, autoridades, partidos u otros actores, pero NO dirigido contra la senadora. (No lo clasifiques como Negativo). Responde con contraste político si aplica.
                       - 'Negativo': insulto, burla o ataque DIRECTO hacia ti (la senadora) o tu trabajo.
                       - 'Escalar': denuncia grave, amenaza, solicitud de auxilio, violencia o tema que deba revisar un humano.
                `;

                const userPrompt = `PUBLICACIÓN:\n"${activePost.text}"\n\nCOMENTARIOS A RESPONDER:\n${newCommentsText}`;

                const payload = {
                    contents: [{ parts: [{ text: userPrompt }] }],
                    systemInstruction: { parts: [{ text: systemPrompt }] },
                    generationConfig: {
                        responseMimeType: "application/json",
                        responseSchema: {
                            type: "ARRAY",
                            items: {
                                type: "OBJECT",
                                properties: {
                                    nombreUsuario: { type: "STRING" },
                                    comentarioOriginal: { type: "STRING" },
                                    sentimiento: { type: "STRING", description: "Opciones: Positivo, Neutro, Reclamo ciudadano, Crítica externa, Negativo, Escalar" },
                                    razonSentimiento: { type: "STRING", description: "Breve justificación de por qué elegiste este sentimiento" },
                                    requiereRevision: { type: "BOOLEAN" },
                                    respuestaGenerada: { type: "STRING" },
                                    recomendacion: { type: "STRING", description: "Ej: Responder, No responder, Revisar antes, Responder institucional" },
                                    usarAliasDetectado: { type: "STRING", description: "Si usaste un alias de la lista, indícalo aquí, sino déjalo vacío" }
                                },
                                required: ["nombreUsuario", "comentarioOriginal", "sentimiento", "respuestaGenerada", "recomendacion"]
                            }
                        }
                    }
                };

                try {
                    const data = await fetchGeminiWithRetry(payload, currentApiKey);
                    const jsonText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (!jsonText) throw new Error("Asegúrate de que la API key de Gemini sea válida.");
                    
                    const generatedItems = JSON.parse(jsonText);
                    
                    for (const item of generatedItems) {
                        await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'comments'), {
                            postId: activePostId,
                            nombreUsuario: item.nombreUsuario || 'Desconocido',
                            originalComment: item.comentarioOriginal,
                            sentiment: item.sentimiento,
                            sentimentReason: item.razonSentimiento || "",
                            requiresReview: item.requiereRevision || false,
                            generatedResponse: item.respuestaGenerada,
                            recommendation: item.recomendacion || "",
                            usedAlias: item.usarAliasDetectado || "",
                            status: "pendiente",
                            createdAt: serverTimestamp()
                        });
                    }
                    setNewCommentsText("");
                } catch (err) {
                    console.error(err);
                    setErrorMsg("Error al generar respuestas: " + (err.message || "Revisa la API Key."));
                } finally { setIsGenerating(false); }
            };

            const handleGenerateResponses = () => {
                if (!newCommentsText.trim() || !activePostId || isGenerating) return;
                executeWithApiKey(runGenerateResponses);
            };

            const runRegenerateSingleResponse = async (currentApiKey) => {
                if (!regeneratingCommentId || !regenerateInstruction.trim()) return;
                setIsRegeneratingSingle(true);
                setErrorMsg("");

                const commentToUpdate = comments.find(c => c.id === regeneratingCommentId);
                const activePost = posts.find(p => p.id === commentToUpdate.postId);
                
                const systemPrompt = `
                    Eres la Senadora Ivideliza Reyes Hernández, Senadora por Nayarit (PAN). Estás respondiendo DIRECTAMENTE y EN PRIMERA PERSONA a los ciudadanos en tus redes sociales.
                    Tu tarea ahora es REESCRIBIR una respuesta tuya a un comentario de Facebook.
                    A tu equipo de comunicación no le gustó la respuesta anterior y te ha proporcionado una INSTRUCCIÓN ESPECÍFICA para que tú (la senadora) mejores tu redacción.
                    
                    REGLAS Y GUARDRAILS OBLIGATORIOS (CERO TOLERANCIA):
                    1. IDENTIDAD ABSOLUTA (¡IMPORTANTE!): TÚ ERES LA SENADORA. Habla siempre en primera persona del singular ("Yo", "Agradezco", "Mi compromiso"). ESTÁ ESTRICTAMENTE PROHIBIDO hablar de ti misma en tercera persona. NUNCA uses frases como "La senadora piensa", "De parte de la senadora" o "El equipo de la senadora".
                    2. VARIEDAD: Varía tu vocabulario para no sonar repetitiva, robótica o automatizada.
                    3. DEBES obedecer la instrucción específica proporcionada para mejorar la respuesta.
                    4. Mantén tu tono cercano, firme y político, según corresponda.
                    5. No inventes datos que no se te proporcionen.
                `;

                const userPrompt = `
                    PUBLICACIÓN ORIGINAL (Contexto):
                    "${activePost.text}"

                    COMENTARIO DEL CIUDADANO (${commentToUpdate.nombreUsuario}):
                    "${commentToUpdate.originalComment}"

                    RESPUESTA GENERADA ANTERIORMENTE (La que hay que mejorar):
                    "${commentToUpdate.generatedResponse}"

                    -------------------------------------
                    INSTRUCCIÓN ESPECÍFICA DE MEJORA:
                    "${regenerateInstruction}"
                    -------------------------------------

                    Redacta UNA nueva respuesta mejorada aplicando fielmente la instrucción específica, pero sin perder de vista los contextos y estrategias globales proporcionadas.
                `;

                const payload = {
                    contents: [{ parts: [{ text: userPrompt }] }],
                    systemInstruction: { parts: [{ text: systemPrompt }] },
                    generationConfig: {
                        responseMimeType: "application/json",
                        responseSchema: {
                            type: "OBJECT",
                            properties: {
                                nuevaRespuesta: { type: "STRING", description: "La nueva respuesta reescrita basándose en la instrucción." }
                            },
                            required: ["nuevaRespuesta"]
                        }
                    }
                };

                try {
                    const data = await fetchGeminiWithRetry(payload, currentApiKey);
                    const jsonText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (!jsonText) throw new Error("Error al comunicarse con Gemini.");
                    
                    const result = JSON.parse(jsonText);
                    
                    await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'comments', regeneratingCommentId), { 
                        generatedResponse: result.nuevaRespuesta,
                        status: 'editado' 
                    });
                    
                    setRegeneratingCommentId(null);
                    setRegenerateInstruction("");
                } catch (err) {
                    console.error(err);
                    setErrorMsg("Error al regenerar la respuesta: " + (err.message || "Intenta nuevamente."));
                } finally { 
                    setIsRegeneratingSingle(false); 
                }
            };

            const handleRegenerateExecute = () => {
                executeWithApiKey(runRegenerateSingleResponse);
            };

            const runGenerateDrafts = async (currentApiKey) => {
                setIsGeneratingDrafts(true);
                const latestReport = aiReports[0]; 
                
                const prompt = `
                    Actúa como Consultor Político y Copywriter para la Senadora Ivideliza Reyes.
                    Contexto y temperatura social (del último reporte mensual): ${latestReport ? JSON.stringify(latestReport.report) : 'Sin datos previos. Genera posts orgánicos y proactivos.'}
                    
                    Redacta 3 borradores de publicaciones para Facebook.
                    Deben ser altamente atractivos, cercanos a la ciudadanía y responder a los temas de interés actuales.
                    
                    Devuelve el resultado en formato JSON estricto con un array "borradores", cada uno con "tema" y "texto".
                `;

                const payload = {
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: {
                        responseMimeType: "application/json",
                        responseSchema: {
                            type: "OBJECT",
                            properties: {
                                borradores: { 
                                    type: "ARRAY", 
                                    items: { 
                                        type: "OBJECT", 
                                        properties: { tema: { type: "STRING" }, texto: { type: "STRING" } } 
                                    } 
                                }
                            }
                        }
                    }
                };

                try {
                    const data = await fetchGeminiWithRetry(payload, currentApiKey);
                    const result = JSON.parse(data.candidates?.[0]?.content?.parts?.[0]?.text);
                    setDraftsList(result.borradores);
                    setIsDraftModalOpen(true);
                } catch (err) { setErrorMsg("Error al generar borradores."); } 
                finally { setIsGeneratingDrafts(false); }
            };
            const generateDrafts = () => executeWithApiKey(runGenerateDrafts);

            const currentMonth = new Date().getMonth();
            const currentYear = new Date().getFullYear();
            const monthNames = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
            const currentMonthName = monthNames[currentMonth];
            
            const monthlyPosts = posts.filter(p => {
                if (!p.createdAt) return false;
                const d = p.createdAt.toDate();
                return d.getMonth() === currentMonth && d.getFullYear() === currentYear;
            });

            const monthlyComments = comments.filter(c => {
                if (!c.createdAt) return false;
                const d = c.createdAt.toDate();
                return d.getMonth() === currentMonth && d.getFullYear() === currentYear;
            });

            let sentPos = 0, sentNeu = 0, sentRec = 0, sentCrit = 0, sentNeg = 0, sentEsc = 0;
            monthlyComments.forEach(c => {
                const s = c.sentiment || '';
                if (s === 'Positivo') sentPos++;
                else if (s === 'Neutro') sentNeu++;
                else if (s === 'Reclamo ciudadano' || s === 'Reclamo') sentRec++;
                else if (s === 'Crítica externa') sentCrit++;
                else if (s === 'Escalar') sentEsc++;
                else sentNeg++; 
            });

            const catCounts = { Social: 0, Familiar: 0, Legislativa: 0, Política: 0 };
            monthlyPosts.forEach(p => { 
                const cats = getPostCategories(p);
                cats.forEach(c => { if(catCounts[c] !== undefined) catCounts[c]++; });
            });
            let topCat = "Ninguno";
            let maxCount = 0;
            for (const [cat, count] of Object.entries(catCounts)) {
                if (count > maxCount) { maxCount = count; topCat = cat; }
            }

            const avgEngagement = monthlyPosts.length > 0 ? (monthlyComments.length / monthlyPosts.length).toFixed(1) : 0;

            const runGenerateReport = async (currentApiKey) => {
                setIsGeneratingReport(true);
                
                const sampleTexts = monthlyPosts.map(p => p.text).join(" | ").substring(0, 3000);

                const prompt = `
                    Actúa como Consultor Político Estratega. Analiza el desempeño de comunicación en redes de la Senadora Ivideliza Reyes para el mes de ${currentMonthName} ${currentYear}.
                    
                    Datos del mes:
                    - Publicaciones totales: ${monthlyPosts.length}
                    - Desglose por enfoque (una publicación puede tener varios): ${JSON.stringify(catCounts)}
                    - Comentarios totales recibidos: ${monthlyComments.length}
                    - Sentimientos (Detalle estratégico):
                        * Apoyo ciudadano (Positivo): ${sentPos}
                        * Neutrales: ${sentNeu}
                        * Reclamos ciudadanos (Atención necesaria): ${sentRec}
                        * Críticas externas (Al gobierno u otros, no a ella): ${sentCrit}
                        * Ataques directos a la senadora (Negativos): ${sentNeg}
                        * Casos delicados (Escalar): ${sentEsc}
                    
                    Muestra de textos publicados: ${sampleTexts}

                    Extrae y genera un JSON estricto con:
                    1. "temaPrincipal": Cuál fue el tema más recurrente o importante.
                    2. "analisisSituacion": Un párrafo sobre la temperatura ciudadana (distinguiendo entre los que se quejan del gobierno y los que atacan a la senadora).
                    3. "propuestas": Array con 3 propuestas de mejora.
                `;

                const payload = {
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: {
                        responseMimeType: "application/json",
                        responseSchema: {
                            type: "OBJECT",
                            properties: {
                                temaPrincipal: { type: "STRING" },
                                analisisSituacion: { type: "STRING" },
                                propuestas: { type: "ARRAY", items: { type: "STRING" } }
                            }
                        }
                    }
                };

                try {
                    const data = await fetchGeminiWithRetry(payload, currentApiKey);
                    const result = JSON.parse(data.candidates?.[0]?.content?.parts?.[0]?.text);
                    
                    await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'ai_reports'), {
                        title: `Reporte ${currentMonthName} ${currentYear}`,
                        report: result,
                        month: currentMonth,
                        year: currentYear,
                        createdAt: serverTimestamp()
                    });
                } catch (err) { setErrorMsg("Error al generar el reporte de IA."); } 
                finally { setIsGeneratingReport(false); }
            };
            const generateAIReport = () => executeWithApiKey(runGenerateReport);

            if (authLoading) return null; 

            if (!user) {
                return (
                    <div className="flex items-center justify-center h-screen bg-gradient-to-br from-blue-50 to-slate-100 relative z-10">
                        <div className="bg-white p-10 rounded-3xl shadow-xl max-w-md w-full text-center border border-slate-200 m-4">
                            <div className="bg-blue-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6">
                                <Target className="w-10 h-10 text-blue-600" />
                            </div>
                            <h1 className="text-2xl font-black text-slate-800 mb-2">Gestor de Redes CMS</h1>
                            <p className="text-slate-500 mb-8 font-medium">Plataforma estratégica - Sen. Ivideliza Reyes</p>
                            
                            {loginError && (
                                <div className="mb-4 bg-red-50 text-red-600 p-3 rounded-lg text-sm border border-red-200 text-left">
                                    <AlertTriangle className="w-4 h-4 inline mr-2"/>
                                    {loginError}
                                </div>
                            )}

                            <button onClick={handleLogin} className="w-full flex items-center justify-center gap-3 bg-white border-2 border-slate-200 hover:bg-slate-50 hover:border-slate-300 text-slate-700 py-3 px-4 rounded-xl font-bold transition-all shadow-sm">
                                <svg className="w-5 h-5" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/><path fill="none" d="M1 1h22v22H1z"/></svg>
                                Ingresar con Google
                            </button>
                        </div>
                    </div>
                );
            }

            const activePost = posts.find(p => p.id === activePostId);
            const activeCategories = getPostCategories(activePost);
            const activeComments = comments.filter(c => c.postId === activePostId);
            const commentBeingRegenerated = comments.find(c => c.id === regeneratingCommentId);

            return (
                <div className="flex h-screen overflow-hidden relative bg-slate-50 z-10">
                    
                    {/* SIDEBAR */}
                    {isSidebarOpen && <div className="fixed inset-0 bg-black/20 z-40 lg:hidden" onClick={() => setIsSidebarOpen(false)} />}
                    <aside className={`fixed lg:static inset-y-0 left-0 w-80 bg-white border-r border-slate-200 z-50 transform transition-transform duration-300 flex flex-col ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'}`}>
                        <div className="p-4 border-b border-slate-200 bg-blue-50/50">
                            <h2 className="text-blue-800 font-bold text-lg flex items-center gap-2"><History className="w-5 h-5" /> Historial</h2>
                        </div>
                        <div className="flex-1 overflow-y-auto p-4 space-y-3">
                        <button onClick={() => { setActivePostId(null); setCurrentView('manager'); setIsSidebarOpen(false); setRevealedCopiedCommentIds([]); setRevealedIgnoredCommentIds([]); }} className={`w-full flex items-center justify-center gap-2 p-3 rounded-xl border-2 border-dashed font-medium transition-colors ${!activePostId && currentView === 'manager' ? 'border-blue-500 text-blue-600 bg-blue-50' : 'border-slate-300 text-slate-600 hover:border-blue-400 hover:bg-blue-50'}`}>
                            <Plus className="w-5 h-5" /> Nueva Publicación
                        </button>
                        <div className="pt-4 space-y-2">
                            {posts.map(post => {
                                const postCats = getPostCategories(post);
                                return (
                                <div key={post.id} className={`w-full text-left p-3 rounded-lg border transition-all relative group cursor-pointer ${activePostId === post.id && currentView === 'manager' ? 'border-blue-500 bg-blue-50 shadow-sm' : 'border-slate-200 hover:border-slate-300 bg-white'}`}>
                                    <div onClick={() => { setActivePostId(post.id); setCurrentView('manager'); setIsSidebarOpen(false); setRevealedCopiedCommentIds([]); setRevealedIgnoredCommentIds([]); }}>
                                        <p className="text-sm line-clamp-2 text-slate-700 pr-6">{post.text}</p>
                                        <div className="text-[10px] text-slate-400 mt-2 flex justify-between items-center">
                                        <span className="font-semibold text-blue-600 bg-blue-100 px-1.5 py-0.5 rounded truncate max-w-[150px]">
                                            {postCats.join(' · ')}
                                        </span>
                                        <span>{comments.filter(c => c.postId === post.id).length} resp.</span>
                                        </div>
                                    </div>
                                    
                                    <button 
                                        onClick={(e) => deletePost(post.id, e)}
                                        className="absolute top-2 right-2 p-1.5 text-slate-300 hover:text-red-500 hover:bg-red-50 rounded-md transition-colors md:opacity-0 md:group-hover:opacity-100 opacity-100"
                                        title="Eliminar publicación"
                                    >
                                        <Trash2 className="w-4 h-4" />
                                    </button>
                                </div>
                                );
                            })}
                        </div>
                        </div>
                    </aside>

                    {/* MAIN CONTENT */}
                    <main className="flex-1 flex flex-col h-full overflow-hidden relative">
                        <header className="bg-white border-b border-slate-200 p-4 flex items-center justify-between z-10 shrink-0">
                        <div className="flex items-center gap-4">
                            <button onClick={() => setIsSidebarOpen(true)} className="p-2 -ml-2 text-slate-500 lg:hidden rounded-lg hover:bg-slate-100"><Menu className="w-6 h-6" /></button>
                            <div className="hidden md:flex bg-slate-100 p-1 rounded-lg">
                            <button onClick={() => setCurrentView('manager')} className={`px-4 py-2 rounded-md text-sm font-bold flex items-center gap-2 transition-all ${currentView === 'manager' ? 'bg-white shadow-sm text-blue-700' : 'text-slate-500 hover:text-slate-700'}`}>
                                <MessageSquare className="w-4 h-4" /> Gestión
                            </button>
                            <button onClick={() => setCurrentView('analysis')} className={`px-4 py-2 rounded-md text-sm font-bold flex items-center gap-2 transition-all ${currentView === 'analysis' ? 'bg-white shadow-sm text-blue-700' : 'text-slate-500 hover:text-slate-700'}`}>
                                <BarChart3 className="w-4 h-4" /> Estrategia
                            </button>
                            </div>
                        </div>
                        <div className="flex items-center gap-4">
                            <h1 className="text-lg font-bold text-slate-800 hidden md:block">Sen. Ivideliza Reyes</h1>
                            <button onClick={() => setIsSettingsModalOpen(true)} className="text-slate-400 hover:text-blue-600 p-2 rounded-md transition-colors bg-slate-100 hover:bg-blue-50" title="Configuración y Mantenimiento">
                                <Settings className="w-5 h-5"/>
                            </button>
                            <div className="flex items-center gap-2 border-l border-slate-200 pl-4">
                                <img src={user.photoURL || "https://ui-avatars.com/api/?name=User"} className="w-8 h-8 rounded-full border border-slate-200" />
                                <button onClick={handleLogout} className="text-slate-400 hover:text-red-500 p-1 rounded-md transition-colors" title="Cerrar sesión"><LogOut className="w-5 h-5"/></button>
                            </div>
                        </div>
                        </header>

                        <div className="md:hidden flex bg-white border-b border-slate-200 shrink-0">
                            <button onClick={() => setCurrentView('manager')} className={`flex-1 py-3 text-sm font-bold text-center border-b-2 ${currentView === 'manager' ? 'border-blue-600 text-blue-700' : 'border-transparent text-slate-500'}`}>Gestión</button>
                            <button onClick={() => setCurrentView('analysis')} className={`flex-1 py-3 text-sm font-bold text-center border-b-2 ${currentView === 'analysis' ? 'border-blue-600 text-blue-700' : 'border-transparent text-slate-500'}`}>Estrategia</button>
                        </div>

                        {errorMsg && <div className="bg-red-50 text-red-600 p-3 text-sm text-center border-b border-red-100 flex justify-center items-center gap-2 shrink-0">
                            <AlertTriangle className="w-4 h-4"/> {errorMsg}
                        </div>}

                        <div className="flex-1 overflow-y-auto">
                        
                        {currentView === 'manager' && (
                            <div className="p-4 md:p-6 max-w-4xl mx-auto space-y-6">
                            {!activePostId ? (
                                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
                                <div className="flex items-center gap-3 mb-4 text-blue-700">
                                    <MessageSquare className="w-6 h-6" />
                                    <h2 className="text-lg font-semibold">1. Pega la publicación original</h2>
                                </div>
                                <textarea value={newPostText} onChange={(e) => setNewPostText(e.target.value)} placeholder="Ej: Seguimos trabajando por Nayarit..." className="w-full h-40 p-4 rounded-xl border border-slate-300 focus:border-blue-500 outline-none resize-none text-slate-700" />
                                <div className="mt-4 flex justify-end">
                                    <button onClick={createNewPost} disabled={!newPostText.trim()} className="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl font-medium disabled:opacity-50">Guardar y Continuar <ChevronRight className="w-5 h-5" /></button>
                                </div>
                                </div>
                            ) : (
                                <div className="space-y-6">
                                
                                <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 relative">
                                    <div className="absolute left-0 top-0 bottom-0 w-1 bg-blue-500 rounded-l-xl"></div>
                                    <div className="flex justify-between items-start mb-2">
                                        <h3 className="text-xs font-bold text-slate-400 uppercase tracking-wider">Publicación Original</h3>
                                        <div className="flex items-center gap-2">
                                            <button onClick={(e) => deletePost(activePost.id, e)} className="text-xs bg-red-50 hover:bg-red-100 text-red-600 px-3 py-1.5 rounded-lg font-medium flex items-center gap-1 border border-red-200 transition-colors" title="Eliminar publicación">
                                                <Trash2 className="w-3 h-3" /> Eliminar
                                            </button>
                                            <button onClick={openContextModal} className="text-xs bg-slate-100 hover:bg-slate-200 text-slate-600 px-3 py-1.5 rounded-lg font-medium flex items-center gap-1 border border-slate-200 transition-colors">
                                                <Settings className="w-3 h-3" /> {(activePost?.context || activePost?.postInstruction) ? 'Contexto Configurado' : '+ Añadir Contexto'}
                                            </button>
                                        </div>
                                    </div>
                                    <p className="text-slate-600 text-sm whitespace-pre-wrap">{activePost?.text}</p>
                                    
                                    <div className="mt-5 border-t border-slate-100 pt-4">
                                        <p className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Enfoques activos para responder (Selección múltiple)</p>
                                        <p className="text-[10px] text-slate-400 mb-3">Selecciona los tonos que debe combinar la IA al generar respuestas.</p>
                                        <div className="grid grid-cols-2 md:grid-cols-4 gap-2">
                                            {[
                                            { name: 'Social', icon: Users, color: 'text-emerald-600', bg: 'bg-emerald-50', border: 'border-emerald-300' },
                                            { name: 'Familiar', icon: Smile, color: 'text-pink-600', bg: 'bg-pink-50', border: 'border-pink-300' },
                                            { name: 'Legislativa', icon: BookOpen, color: 'text-indigo-600', bg: 'bg-indigo-50', border: 'border-indigo-300' },
                                            { name: 'Política', icon: Megaphone, color: 'text-orange-600', bg: 'bg-orange-50', border: 'border-orange-300' }
                                            ].map(cat => {
                                            const isActive = activeCategories.includes(cat.name);
                                            return (
                                                <button key={cat.name} onClick={() => togglePostCategory(activePost.id, cat.name, activeCategories)} className={`p-2 rounded-xl text-xs font-bold flex flex-col items-center gap-1 border-2 transition-all ${isActive ? `${cat.bg} ${cat.color} ${cat.border} shadow-sm scale-105` : 'bg-white text-slate-400 border-slate-100 hover:bg-slate-50'}`}>
                                                    <cat.icon className="w-4 h-4" /> {cat.name}
                                                </button>
                                            );
                                            })}
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-5">
                                    <h3 className="text-sm font-bold text-slate-700 mb-2">2. Pega los comentarios a responder</h3>
                                    <textarea value={newCommentsText} onChange={(e) => setNewCommentsText(e.target.value)} placeholder="Pega aquí los comentarios copiados de Facebook..." className="w-full h-32 p-3 rounded-lg border border-slate-300 focus:border-blue-500 outline-none resize-none text-sm mb-3" />
                                    <button onClick={handleGenerateResponses} disabled={!newCommentsText.trim() || isGenerating} className="w-full flex items-center justify-center gap-2 bg-slate-800 hover:bg-slate-900 disabled:opacity-50 text-white py-3 rounded-xl font-bold">
                                    {isGenerating ? "Analizando y Redactando..." : <><Send className="w-5 h-5" /> Generar Respuestas</>}
                                    </button>
                                </div>

                                <div className="space-y-4">
                                    {(() => {
                                        const copiedComments = activeComments.filter(c => c.status === 'copiado');
                                        const minimizedComments = copiedComments.filter(c => !revealedCopiedCommentIds.includes(c.id));
                                        const revealedComments = copiedComments.filter(c => revealedCopiedCommentIds.includes(c.id));
                                        
                                        const ignoredComments = activeComments.filter(c => c.status === 'no_responder');
                                        const minimizedIgnored = ignoredComments.filter(c => !revealedIgnoredCommentIds.includes(c.id));
                                        const revealedIgnored = ignoredComments.filter(c => revealedIgnoredCommentIds.includes(c.id));
                                        
                                        if (copiedComments.length === 0 && ignoredComments.length === 0) return null;
                                        
                                        return (
                                            <div className="flex flex-wrap justify-center gap-3">
                                                {minimizedComments.length > 0 && (
                                                    <button onClick={() => setRevealedCopiedCommentIds(copiedComments.map(c => c.id))} className="text-xs bg-slate-200 hover:bg-slate-300 text-slate-600 px-4 py-2 rounded-full font-bold flex items-center gap-2 transition-colors shadow-sm">
                                                        <Eye className="w-4 h-4"/> Mostrar {minimizedComments.length} copiadas
                                                    </button>
                                                )}
                                                {revealedComments.length > 0 && (
                                                    <button onClick={() => setRevealedCopiedCommentIds([])} className="text-xs bg-green-100 hover:bg-green-200 text-green-700 px-4 py-2 rounded-full font-bold flex items-center gap-2 transition-colors border border-green-200 shadow-sm">
                                                        <EyeOff className="w-4 h-4"/> Ocultar copiadas
                                                    </button>
                                                )}

                                                {minimizedIgnored.length > 0 && (
                                                    <button onClick={() => setRevealedIgnoredCommentIds(ignoredComments.map(c => c.id))} className="text-xs bg-slate-200 hover:bg-slate-300 text-slate-600 px-4 py-2 rounded-full font-bold flex items-center gap-2 transition-colors shadow-sm">
                                                        <Eye className="w-4 h-4"/> Mostrar {minimizedIgnored.length} ignoradas
                                                    </button>
                                                )}
                                                {revealedIgnored.length > 0 && (
                                                    <button onClick={() => setRevealedIgnoredCommentIds([])} className="text-xs bg-slate-100 hover:bg-slate-200 text-slate-600 px-4 py-2 rounded-full font-bold flex items-center gap-2 transition-colors border border-slate-200 shadow-sm">
                                                        <EyeOff className="w-4 h-4"/> Ocultar ignoradas
                                                    </button>
                                                )}
                                            </div>
                                        );
                                    })()}

                                    {activeComments.map((comment) => {
                                        const isCopiado = comment.status === 'copiado';
                                        const isRevealed = revealedCopiedCommentIds.includes(comment.id);
                                        const isHidden = isCopiado && !isRevealed;
                                        
                                        const isNoResponder = comment.status === 'no_responder';
                                        const isRevealedIgnored = revealedIgnoredCommentIds.includes(comment.id);
                                        const isHiddenIgnored = isNoResponder && !isRevealedIgnored;

                                        const vis = getSentimentVisuals(comment.sentiment, comment.isHostile);

                                        if (isHidden) {
                                            return (
                                                <div key={comment.id} className="bg-green-50 border border-green-200 rounded-lg p-2 flex justify-between items-center text-sm shadow-sm cursor-pointer hover:bg-green-100 transition-colors" onClick={() => setRevealedCopiedCommentIds(prev => [...prev, comment.id])}>
                                                    <div className="flex items-center gap-2 text-green-700 font-medium">
                                                        <CheckCircle2 className="w-4 h-4"/> Copiado
                                                        <span className="text-green-900 font-bold ml-2">{comment.nombreUsuario}</span>
                                                    </div>
                                                    <span className="text-xs text-green-600 bg-green-200 px-2 py-1 rounded font-bold">Mostrar</span>
                                                </div>
                                            );
                                        }

                                        if (isHiddenIgnored) {
                                            return (
                                                <div key={comment.id} className="bg-slate-50 border border-slate-200 rounded-lg p-2 flex justify-between items-center text-sm shadow-sm cursor-pointer hover:bg-slate-100 transition-colors" onClick={() => setRevealedIgnoredCommentIds(prev => [...prev, comment.id])}>
                                                    <div className="flex items-center gap-2 text-slate-500 font-medium">
                                                        <Ban className="w-4 h-4"/> Ignorado
                                                        <span className="text-slate-700 font-bold ml-2">{comment.nombreUsuario}</span>
                                                    </div>
                                                    <span className="text-xs text-slate-500 bg-slate-200 px-2 py-1 rounded font-bold">Mostrar</span>
                                                </div>
                                            );
                                        }

                                        return (
                                            <div key={comment.id} className={`bg-white rounded-2xl shadow-sm border-2 overflow-hidden flex flex-col md:flex-row ${vis.border} transition-all ${isNoResponder ? 'opacity-50 grayscale' : ''}`}>
                                                
                                                <div className="p-4 md:w-2/3 border-b md:border-b-0 md:border-r border-slate-100 flex flex-col space-y-3 relative">
                                                    
                                                    <div className="flex flex-wrap justify-between items-start gap-2">
                                                        <div className="flex items-center gap-2">
                                                            <span className="font-bold text-sm flex items-center gap-1 text-slate-800">
                                                                <User className="w-4 h-4 text-slate-400"/> {comment.nombreUsuario}
                                                            </span>
                                                            <button onClick={() => openAliasModal(comment.nombreUsuario)} className="text-[10px] bg-slate-100 hover:bg-blue-100 hover:text-blue-700 text-slate-500 px-1.5 py-0.5 rounded border border-slate-200 flex items-center gap-1 transition-colors" title="Personalizar nombre">
                                                                <UserPlus className="w-3 h-3"/> Alias
                                                            </button>
                                                        </div>
                                                        <span className={`text-[10px] font-bold uppercase px-2 py-1 rounded-md flex items-center gap-1 ${vis.bg} ${vis.text} ${vis.pulse ? 'animate-pulse' : ''}`}>
                                                            <vis.icon className="w-3 h-3"/> {vis.label}
                                                        </span>
                                                    </div>

                                                    <div className="bg-slate-50 p-3 rounded-lg border border-slate-200 text-sm">
                                                        <p className="text-slate-700 italic mb-2">"{comment.originalComment}"</p>
                                                        {(comment.sentimentReason || comment.recommendation || comment.requiresReview) && (
                                                            <div className="mt-2 pt-2 border-t border-slate-200 text-[11px] flex flex-col gap-1">
                                                                {comment.sentimentReason && <p className="text-slate-500"><span className="font-bold text-slate-600">Por qué:</span> {comment.sentimentReason}</p>}
                                                                {comment.recommendation && <p className="text-blue-600"><span className="font-bold">Sugerencia IA:</span> {comment.recommendation}</p>}
                                                                {comment.requiresReview && <p className="text-red-600 font-bold flex items-center gap-1"><ShieldAlert className="w-3 h-3"/> Requiere revisión antes de enviar.</p>}
                                                                {comment.usedAlias && <p className="text-purple-600 font-bold">Usó alias: {comment.usedAlias}</p>}
                                                            </div>
                                                        )}
                                                    </div>
                                                    
                                                    {editingCommentId === comment.id ? (
                                                        <textarea
                                                            value={editingCommentText}
                                                            onChange={(e) => setEditingCommentText(e.target.value)}
                                                            className="w-full mt-2 p-3 text-base text-slate-800 border-2 border-blue-400 rounded-xl focus:outline-none focus:ring-4 focus:ring-blue-100 min-h-[100px]"
                                                        />
                                                    ) : (
                                                        <div className="text-base text-slate-800 mt-2 font-medium bg-white p-3 rounded-xl border border-slate-100 shadow-inner">
                                                            {comment.generatedResponse}
                                                        </div>
                                                    )}
                                                </div>

                                                <div className="p-4 md:w-1/3 bg-slate-50 flex flex-col justify-center gap-2">
                                                    {editingCommentId === comment.id ? (
                                                        <>
                                                            <button onClick={() => saveEditedResponse(comment.id)} className="w-full py-3 rounded-xl font-bold flex items-center justify-center gap-2 bg-blue-600 text-white hover:bg-blue-700 transition-colors shadow-sm">
                                                                <Save className="w-5 h-5"/> Guardar
                                                            </button>
                                                            <button onClick={() => setEditingCommentId(null)} className="w-full py-3 rounded-xl font-bold flex items-center justify-center gap-2 bg-white text-slate-500 border border-slate-200 hover:bg-slate-100 transition-colors">
                                                                Cancelar
                                                            </button>
                                                        </>
                                                    ) : (
                                                        <>
                                                            <button onClick={() => handleCopy(comment.id, comment.generatedResponse)} className={`w-full py-3 rounded-xl font-bold flex items-center justify-center gap-2 transition-colors shadow-sm ${copiedId === comment.id ? 'bg-green-100 text-green-700 border border-green-300' : 'bg-white text-blue-700 border border-blue-200 hover:bg-blue-50'}`}>
                                                                {copiedId === comment.id ? <><CheckCircle2 className="w-5 h-5"/> ¡Copiado!</> : <><Copy className="w-5 h-5"/> Copiar Respuesta</>}
                                                            </button>
                                                            
                                                            <div className="grid grid-cols-2 gap-2">
                                                                <button onClick={() => startEditingComment(comment)} className="w-full py-2 rounded-xl font-bold flex items-center justify-center gap-1 bg-white text-slate-600 border border-slate-200 hover:bg-slate-100 text-xs transition-colors">
                                                                    <Edit2 className="w-4 h-4"/> Editar
                                                                </button>
                                                                <button onClick={() => { setRegeneratingCommentId(comment.id); setRegenerateInstruction(""); }} className="w-full py-2 rounded-xl font-bold flex items-center justify-center gap-1 bg-white text-purple-600 border border-purple-200 hover:bg-purple-50 text-xs transition-colors" title="Dar instrucciones para reescribir esta respuesta">
                                                                    <RefreshCw className="w-4 h-4"/> Repensar
                                                                </button>
                                                            </div>
                                                            <button onClick={() => {
                                                                changeCommentStatus(comment.id, isNoResponder ? 'pendiente' : 'no_responder');
                                                                setRevealedIgnoredCommentIds(prev => prev.filter(id => id !== comment.id));
                                                            }} className={`w-full py-2 rounded-xl font-bold flex items-center justify-center gap-1 border text-xs transition-colors ${isNoResponder ? 'bg-slate-700 text-white border-slate-800' : 'bg-white text-slate-400 border-slate-200 hover:bg-slate-100 hover:text-red-500'}`}>
                                                                <Ban className="w-4 h-4"/> {isNoResponder ? 'Restaurar' : 'Ignorar Comentario'}
                                                            </button>
                                                        </>
                                                    )}
                                                </div>
                                            </div>
                                        )
                                    })}
                                </div>
                                </div>
                            )}
                            </div>
                        )}

                        {currentView === 'analysis' && (
