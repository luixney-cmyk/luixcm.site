<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor CM - Sen. Ivideliza Reyes</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client?external=react",

    <script>
        window.addEventListener('error', function(event) {
            const root = document.getElementById('root');
            if(root) {
                root.innerHTML = '<div style="padding:20px; color:red; font-family:sans-serif; text-align:center;"><b>Error crítico en la aplicación:</b><br><br>' + event.message + '<br><br>Revisa la consola (F12) para más detalles.</div>';
            }
        });
    </script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased">
    
    <div id="root">
        <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; font-family:sans-serif; color:#64748b;">
            <div style="width:40px; height:40px; border:4px solid #3b82f6; border-top-color:transparent; border-radius:50%; animation: spin 1s linear infinite;"></div>
            <p style="margin-top:20px; font-weight:bold;">Cargando Gestor CM...</p>
            <style>@keyframes spin { 100% { transform: rotate(360deg); } }</style>
        </div>
    </div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
            Copy, Plus, Menu, X, Settings, MessageSquare, Send, CheckCircle2, ChevronRight, History, 
            AlertTriangle, User, Users, FileText, BookOpen, Megaphone, BarChart3, TrendingUp, Target, 
            Lightbulb, MessageCircle, LogOut, Key, Smile, Meh, Frown, Edit2, Trash2, FileClock, Check, 
            Save, UserPlus, Eye, EyeOff, ShieldAlert, Ban, Sparkles, Trash, RefreshCw, Video, Info, Wand2
        } from 'lucide-react';
        
        import { initializeApp } from 'firebase/app';
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from 'firebase/auth';
        import { getFirestore, collection, doc, setDoc, onSnapshot, addDoc, serverTimestamp, updateDoc, deleteDoc } from 'firebase/firestore';

        const firebaseConfig = {
            apiKey: "AIzaSyA7xjysJVQb3tYEb8ZU9yHbs-MBDWVUhk4",
            authDomain: "gestor-ivi.firebaseapp.com",
            projectId: "gestor-ivi",
            storageBucket: "gestor-ivi.firebasestorage.app",
            messagingSenderId: "562230194451",
            appId: "1:562230194451:web:3877b3bf0d18b6ac912ae6",
            measurementId: "G-5MDJNBV15H"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        provider.setCustomParameters({ prompt: 'select_account' });
        const appId = firebaseConfig.projectId;

        const ALLOWED_EMAIL = "luixnay@gmail.com";
        const normalizeEmail = (email) => (email || "").trim().toLowerCase();
        const isAllowedUser = (firebaseUser) => firebaseUser && normalizeEmail(firebaseUser.email) === ALLOWED_EMAIL && firebaseUser.emailVerified === true;

        const copyToClipboard = (text) => {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed"; textArea.style.left = "-9999px";
            document.body.appendChild(textArea); textArea.focus(); textArea.select();
            let successful = false;
            try { successful = document.execCommand('copy'); } catch (err) {}
            document.body.removeChild(textArea); return successful;
        };

        const delay = (ms) => new Promise(res => setTimeout(res, ms));

        const GEMINI_MODEL = "gemini-1.5-flash"; 

        const fetchGeminiWithRetry = async (payload, apiKey, retries = 4) => {
            const cleanApiKey = (apiKey || "").trim().replace(/^['"]|['"]$/g, "");
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${cleanApiKey}`;
            let attempt = 0;
            const backoff = [2000, 5000, 10000, 18000];

            while (attempt < retries) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        let detail = "";
                        try { const errJson = await response.json(); detail = errJson?.error?.message ? ` - ${errJson.error.message}` : ""; } catch (_) {}
                        if (response.status === 400) throw new Error(`Solicitud inválida${detail}`);
                        if (response.status === 401 || response.status === 403) throw new Error(`API Key rechazada${detail}`);
                        if (response.status === 429) throw new Error(`Límite alcanzado (429)${detail}`);
                        throw new Error(`Error ${response.status}${detail}`);
                    }
                    return await response.json();
                } catch (error) {
                    const msg = String(error?.message || error);
                    const retryable = msg.includes('429') || msg.includes('500') || msg.includes('Failed to fetch');
                    
                    if (!retryable || attempt === retries - 1) throw error;
                    await delay(backoff[attempt]);
                    attempt++;
                }
            }
        };

        const parseJSON = (text) => {
            try {
                const clean = text.replace(/```json/gi, '').replace(/```/g, '').trim();
                return JSON.parse(clean);
            } catch (e) { throw new Error("La IA no devolvió un formato válido."); }
        };

        const getPostCategories = (post) => {
            if (!post) return ["Social"];
            if (post.categories && Array.isArray(post.categories) && post.categories.length > 0) return post.categories;
            if (post.category) return post.category === "Genérica" ? ["Social"] : [post.category];
            return ["Social"];
        };

        const getSentimentVisuals = (rawSentiment, isHostile = false) => {
            let s = rawSentiment || (isHostile ? 'Negativo' : 'Neutro');
            if (s === 'Reclamo') s = 'Reclamo ciudadano';
            
            switch (s) {
                case 'Positivo': return { label: s, border: 'border-green-200', bg: 'bg-green-100', text: 'text-green-700', icon: Smile };
                case 'Neutro': return { label: s, border: 'border-slate-200', bg: 'bg-slate-100', text: 'text-slate-600', icon: Meh };
                case 'Reclamo ciudadano': return { label: s, border: 'border-amber-300', bg: 'bg-amber-100', text: 'text-amber-700', icon: MessageSquare };
                case 'Crítica externa': return { label: s, border: 'border-orange-300', bg: 'bg-orange-100', text: 'text-orange-700', icon: AlertTriangle };
                case 'Negativo': return { label: s, border: 'border-red-300', bg: 'bg-red-100', text: 'text-red-700', icon: Frown };
                case 'Escalar': return { label: s, border: 'border-red-500 shadow-sm shadow-red-200', bg: 'bg-red-100', text: 'text-red-900', icon: ShieldAlert, pulse: true };
                default: return { label: s, border: 'border-slate-200', bg: 'bg-slate-100', text: 'text-slate-600', icon: Meh };
            }
        };

        function App() {
            const [user, setUser] = useState(null);
            const [authLoading, setAuthLoading] = useState(true);
            const [currentView, setCurrentView] = useState('manager'); // 'manager', 'analysis', 'scripts'
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);

            // Bases de datos principales
            const [posts, setPosts] = useState([]);
            const [comments, setComments] = useState([]);
            const [strategies, setStrategies] = useState([]);
            const [aliases, setAliases] = useState([]);
            const [aiReports, setAiReports] = useState([]);
            const [scripts, setScripts] = useState([]);

            // Modales genéricos
            const [confirmDialog, setConfirmDialog] = useState({ isOpen: false, message: "", onConfirm: null });
            const [alertDialog, setAlertDialog] = useState({ isOpen: false, message: "" });
            const showConfirm = (message, onConfirmCallback) => setConfirmDialog({ isOpen: true, message, onConfirm: () => { onConfirmCallback(); setConfirmDialog({ isOpen: false, message: "", onConfirm: null }); } });
            const showAlert = (message) => setAlertDialog({ isOpen: true, message });

            // Estados - Gestión
            const [activePostId, setActivePostId] = useState(null);
            const [isContextModalOpen, setIsContextModalOpen] = useState(false);
            const [tempContextText, setTempContextText] = useState("");
            const [tempPostInstruction, setTempPostInstruction] = useState("");
            const [newPostText, setNewPostText] = useState("");
            const [newCommentsText, setNewCommentsText] = useState("");
            const [isGenerating, setIsGenerating] = useState(false);
            const [editingCommentId, setEditingCommentId] = useState(null);
            const [editingCommentText, setEditingCommentText] = useState("");
            const [regeneratingCommentId, setRegeneratingCommentId] = useState(null);
            const [regenerateInstruction, setRegenerateInstruction] = useState("");
            const [isRegeneratingSingle, setIsRegeneratingSingle] = useState(false);
            const [copiedId, setCopiedId] = useState(null);
            const [revealedCopiedCommentIds, setRevealedCopiedCommentIds] = useState([]);
            const [revealedIgnoredCommentIds, setRevealedIgnoredCommentIds] = useState([]);

            // Estados - Guiones (NUEVO)
            const [activeScriptId, setActiveScriptId] = useState(null);
            const [scriptTopic, setScriptTopic] = useState("");
            const [scriptCategories, setScriptCategories] = useState(["Legislativo"]);
            const [scriptConstraints, setScriptConstraints] = useState("");
            const [isGeneratingScript, setIsGeneratingScript] = useState(false);
            const [editingScriptText, setEditingScriptText] = useState("");
            const [scriptRefineInstruction, setScriptRefineInstruction] = useState("");
            const [isRefiningScript, setIsRefiningScript] = useState(false);
            const [isAdaptingScript, setIsAdaptingScript] = useState(false);

            // Estados - Otros
            const [isSettingsModalOpen, setIsSettingsModalOpen] = useState(false);
            const [isPurging, setIsPurging] = useState(false);
            const [isDraftModalOpen, setIsDraftModalOpen] = useState(false);
            const [draftsList, setDraftsList] = useState([]);
            const [isAliasModalOpen, setIsAliasModalOpen] = useState(false);
            const [tempAliasOriginal, setTempAliasOriginal] = useState("");
            const [tempAliasPreferred, setTempAliasPreferred] = useState("");
            const [newStrategyText, setNewStrategyText] = useState("");
            const [isSavingStrategy, setIsSavingStrategy] = useState(false);
            const [editingStrategyId, setEditingStrategyId] = useState(null);
            const [editingStrategyText, setEditingStrategyText] = useState("");
            const [strategySuccessMsg, setStrategySuccessMsg] = useState("");
            const [isGeneratingReport, setIsGeneratingReport] = useState(false);
            const [viewingReport, setViewingReport] = useState(null);
            const [isApiModalOpen, setIsApiModalOpen] = useState(false);
            const [tempApiKey, setTempApiKey] = useState("");
            const [pendingAction, setPendingAction] = useState(null);
            const [errorMsg, setErrorMsg] = useState("");
            const [loginError, setLoginError] = useState("");

            useEffect(() => {
                const unsubscribe = onAuthStateChanged(auth, async (currentUser) => {
                    if (currentUser && !isAllowedUser(currentUser)) {
                        setUser(null); setLoginError(`Acceso denegado. Esta aplicación solo está autorizada para ${ALLOWED_EMAIL}.`);
                        await signOut(auth); setAuthLoading(false); return;
                    }
                    setUser(currentUser); setAuthLoading(false);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const uid = user.uid; 
                const dbRefs = {
                    posts: collection(db, 'artifacts', appId, 'users', uid, 'posts'),
                    comments: collection(db, 'artifacts', appId, 'users', uid, 'comments'),
                    strategies: collection(db, 'artifacts', appId, 'users', uid, 'strategies'),
                    reports: collection(db, 'artifacts', appId, 'users', uid, 'ai_reports'),
                    aliases: collection(db, 'artifacts', appId, 'users', uid, 'user_aliases'),
                    scripts: collection(db, 'artifacts', appId, 'users', uid, 'scripts')
                };

                const errHandler = async (err) => { if (err.code === 'permission-denied') { setErrorMsg("Acceso denegado por reglas Firebase."); await signOut(auth); } };
                const unsubs = [];

                unsubs.push(onSnapshot(dbRefs.posts, (snap) => setPosts(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b)=>(b.createdAt?.toMillis()||0)-(a.createdAt?.toMillis()||0))), errHandler));
                unsubs.push(onSnapshot(dbRefs.comments, (snap) => setComments(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b)=>(b.createdAt?.toMillis()||0)-(a.createdAt?.toMillis()||0))), errHandler));
                unsubs.push(onSnapshot(dbRefs.strategies, (snap) => setStrategies(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b)=>(b.createdAt?.toMillis()||0)-(a.createdAt?.toMillis()||0))), errHandler));
                unsubs.push(onSnapshot(dbRefs.reports, (snap) => setAiReports(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b)=>(b.createdAt?.toMillis()||0)-(a.createdAt?.toMillis()||0))), errHandler));
                unsubs.push(onSnapshot(dbRefs.aliases, (snap) => setAliases(snap.docs.map(d => ({ id: d.id, ...d.data() }))), errHandler));
                unsubs.push(onSnapshot(dbRefs.scripts, (snap) => setScripts(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b)=>(b.createdAt?.toMillis()||0)-(a.createdAt?.toMillis()||0))), errHandler));

                return () => unsubs.forEach(unsub => unsub());
            }, [user]);

            const handleLogin = async () => {
                setLoginError("");
                try {
                    const result = await signInWithPopup(auth, provider);
                    if (!isAllowedUser(result.user)) { await signOut(auth); setUser(null); setLoginError(`Acceso denegado.`); }
                } catch (error) { setLoginError("Error al iniciar sesión: " + error.message); }
            };
            const handleLogout = () => signOut(auth);

            const purgeOldData = async () => {
                showConfirm("¿Estás seguro de eliminar todos los posts y comentarios de hace más de 3 meses?", async () => {
                    setIsPurging(true);
                    const threeMonthsAgo = new Date(); threeMonthsAgo.setMonth(threeMonthsAgo.getMonth() - 3);
                    try {
                        const oldP = posts.filter(p => p.createdAt && p.createdAt.toDate() < threeMonthsAgo);
                        const oldC = comments.filter(c => c.createdAt && c.createdAt.toDate() < threeMonthsAgo);
                        for (const p of oldP) await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'posts', p.id));
                        for (const c of oldC) await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'comments', c.id));
                        showAlert(`Se eliminaron ${oldP.length} posts y ${oldC.length} comentarios viejos.`);
                    } catch(e) { setErrorMsg("Error purgando datos."); } finally { setIsPurging(false); }
                });
            };

            const saveNewStrategy = async () => {
                if (!newStrategyText.trim()) return;
                setIsSavingStrategy(true);
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'strategies'), { text: newStrategyText.trim(), createdAt: serverTimestamp() });
                    setNewStrategyText(""); setStrategySuccessMsg("¡Guardada!"); setTimeout(() => setStrategySuccessMsg(""), 3000);
                } catch (err) { setErrorMsg("Error al guardar."); } finally { setIsSavingStrategy(false); }
            };

            const deleteStrategy = (id) => showConfirm("¿Eliminar instrucción?", () => deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'strategies', id)));
            const saveEditedStrategy = async () => {
                if (!editingStrategyText.trim()) return;
                try { await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'strategies', editingStrategyId), { text: editingStrategyText.trim() }); setEditingStrategyId(null); } catch (err) { setErrorMsg("Error."); }
            };

            const openAliasModal = (originalName) => {
                const existing = aliases.find(a => (a.originalName||"").toLowerCase() === (originalName||"").toLowerCase());
                setTempAliasOriginal(originalName || "Usuario Desconocido");
                setTempAliasPreferred(existing ? existing.preferredName : "");
                setIsAliasModalOpen(true);
            };

            const saveAlias = async () => {
                if (!tempAliasPreferred.trim()) return;
                try {
                    const ex = aliases.find(a => (a.originalName||"").toLowerCase() === tempAliasOriginal.toLowerCase());
                    if (ex) await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'user_aliases', ex.id), { preferredName: tempAliasPreferred.trim(), updatedAt: serverTimestamp() });
                    else await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'user_aliases'), { originalName: tempAliasOriginal.trim(), preferredName: tempAliasPreferred.trim(), createdAt: serverTimestamp() });
                    setIsAliasModalOpen(false); showAlert("Alias guardado exitosamente.");
                } catch (err) { setErrorMsg("Error alias."); }
            };

            const saveEditedResponse = async (commentId) => {
                if (!editingCommentText.trim()) return;
                try { await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'comments', commentId), { generatedResponse: editingCommentText.trim(), status: 'editado' }); setEditingCommentId(null); } catch (e) { setErrorMsg("Error al guardar."); }
            };
            const changeCommentStatus = async (commentId, status) => { try { await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'comments', commentId), { status }); } catch(e){} };
            
            const handleCopy = (id, text) => {
                if (copyToClipboard(text)) {
                    setCopiedId(id); setTimeout(() => { setCopiedId(null); changeCommentStatus(id, 'copiado'); setRevealedCopiedCommentIds(p => p.filter(c => c !== id)); }, 800);
                }
            };

            const createNewPost = async () => {
                if (!newPostText.trim()) return;
                try {
                    const docRef = await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'posts'), { text: newPostText.trim(), context: "", postInstruction: "", categories: ["Social"], createdAt: serverTimestamp() });
                    setActivePostId(docRef.id); setNewPostText("");
                    if (window.innerWidth < 1024) setIsSidebarOpen(false);
                } catch (err) { setErrorMsg("Error al crear la publicación."); }
            };

            const deletePost = (postId, e) => {
                if (e) e.stopPropagation();
                showConfirm("¿Eliminar publicación y respuestas?", async () => {
                    try {
                        const rel = comments.filter(c => c.postId === postId);
                        for (const c of rel) await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'comments', c.id));
                        await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'posts', postId));
                        if (activePostId === postId) { setActivePostId(null); setCurrentView('manager'); }
                    } catch(err) { setErrorMsg("Error al eliminar."); }
                });
            };

            const savePostContext = async () => {
                try { await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'posts', activePostId), { context: tempContextText, postInstruction: tempPostInstruction }); setIsContextModalOpen(false); showAlert("Contexto guardado."); } catch(err){}
            };

            const togglePostCategory = async (postId, cat, curr) => {
                try { let n = [...curr]; if(n.includes(cat)) n=n.filter(c=>c!==cat); else n.push(cat); if(!n.length) n=["Social"]; await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'posts', postId), { categories: n }); } catch(err){}
            };

            const executeWithApiKey = (actionCallback) => {
                const key = localStorage.getItem('gemini_api_key');
                if (!key) { setPendingAction(() => actionCallback); setIsApiModalOpen(true); } 
                else { actionCallback(key); }
            };
            const saveApiKeyAndExecute = () => {
                const k = tempApiKey.trim();
                if(k) { localStorage.setItem('gemini_api_key', k); setIsApiModalOpen(false); if(pendingAction) { pendingAction(k); setPendingAction(null); } }
            };

            const runGenerateResponses = async (apiKey) => {
                setIsGenerating(true); setErrorMsg("");
                const activePost = posts.find(p => p.id === activePostId);
                const activeCategories = getPostCategories(activePost);
                
                let catInst = activeCategories.map(cat => {
                    switch(cat) {
                        case 'Social': return "- SOCIAL: Cercanía ciudadana. Responder con calidez. Evitar sonar robótico.";
                        case 'Familiar': return "- FAMILIAR: Respuestas muy cortas, cálidas (1-10 palabras). Cero confrontación.";
                        case 'Legislativa': return "- LEGISLATIVA: Seriedad institucional, sin inventar datos.";
                        case 'Política': return "- POLÍTICA: Firmeza, contraste. No insultar ni acusar sin evidencia.";
                        default: return "";
                    }
                }).join('\n');

                const aliasTxt = aliases.length > 0 ? `\nMEMORIA ALIAS:\n${aliases.map(a => `- ${a.originalName} -> Prefiere: ${a.preferredName}`).join('\n')}` : "";
                const stratTxt = strategies.map(s => `- ${s.text}`).join('\n');
                const postCtx = activePost.context?.trim() ? `\nCONTEXTO POST:\n${activePost.context}` : "";
                const postInst = activePost.postInstruction?.trim() ? `\nINSTRUCCIÓN POST:\n${activePost.postInstruction}` : "";

                const sysPrompt = `Eres Senadora Ivideliza Reyes (Nayarit, PAN). Respondes EN PRIMERA PERSONA ("Yo", "Agradezco"). NUNCA tercera persona.
                ENFOQUES: ${catInst}\n${postCtx}\n${postInst}\n${aliasTxt}\nESTRATEGIAS:\n${stratTxt}
                REGLAS: Varía vocabulario. No inventes datos. Respuestas cortas.
                SENTIMIENTOS (elige 1): Positivo, Neutro, Reclamo ciudadano, Crítica externa, Negativo, Escalar.`;

                const payload = {
                    contents: [{ parts: [{ text: `POST:\n"${activePost.text}"\nCOMENTARIOS:\n${newCommentsText}` }] }],
                    systemInstruction: { parts: [{ text: sysPrompt }] },
                    generationConfig: {
                        responseMimeType: "application/json",
                        responseSchema: { type: "ARRAY", items: { type: "OBJECT", properties: { nombreUsuario: { type: "STRING" }, comentarioOriginal: { type: "STRING" }, sentimiento: { type: "STRING" }, razonSentimiento: { type: "STRING" }, requiereRevision: { type: "BOOLEAN" }, respuestaGenerada: { type: "STRING" }, recomendacion: { type: "STRING" }, usarAliasDetectado: { type: "STRING" } }, required: ["nombreUsuario", "comentarioOriginal", "sentimiento", "respuestaGenerada", "recomendacion"] } }
                    }
                };

                try {
                    const data = await fetchGeminiWithRetry(payload, apiKey);
                    const items = parseJSON(data.candidates?.[0]?.content?.parts?.[0]?.text);
                    for (const item of items) {
                        await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'comments'), {
                            postId: activePostId, nombreUsuario: item.nombreUsuario || 'Desconocido', originalComment: item.comentarioOriginal, sentiment: item.sentimiento, sentimentReason: item.razonSentimiento || "", requiresReview: item.requiereRevision || false, generatedResponse: item.respuestaGenerada, recommendation: item.recomendacion || "", usedAlias: item.usarAliasDetectado || "", status: "pendiente", createdAt: serverTimestamp()
                        });
                    }
                    setNewCommentsText("");
                } catch (err) { setErrorMsg("Error IA: " + err.message); } finally { setIsGenerating(false); }
            };

            const runRegenerateSingleResponse = async (apiKey) => {
                if (!regeneratingCommentId || !regenerateInstruction.trim()) return;
                setIsRegeneratingSingle(true); setErrorMsg("");
                const commentToUpdate = comments.find(c => c.id === regeneratingCommentId);
                const activePost = posts.find(p => p.id === commentToUpdate.postId);
                
                const sysPrompt = `Eres Senadora Ivideliza Reyes. REESCRIBE tu respuesta obedeciendo la instrucción dada. PRIMERA PERSONA ("Yo"). No inventes datos.`;
                const usrPrompt = `POST:\n"${activePost.text}"\nCOMENTARIO (${commentToUpdate.nombreUsuario}):\n"${commentToUpdate.originalComment}"\nRESPUESTA ACTUAL:\n"${commentToUpdate.generatedResponse}"\nINSTRUCCIÓN DE MEJORA:\n"${regenerateInstruction}"`;

                const payload = {
                    contents: [{ parts: [{ text: usrPrompt }] }], systemInstruction: { parts: [{ text: sysPrompt }] },
                    generationConfig: { responseMimeType: "application/json", responseSchema: { type: "OBJECT", properties: { nuevaRespuesta: { type: "STRING" } }, required: ["nuevaRespuesta"] } }
                };

                try {
                    const data = await fetchGeminiWithRetry(payload, apiKey);
                    const result = parseJSON(data.candidates?.[0]?.content?.parts?.[0]?.text);
                    await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'comments', regeneratingCommentId), { generatedResponse: result.nuevaRespuesta, status: 'editado' });
                    setRegeneratingCommentId(null); setRegenerateInstruction("");
                } catch (err) { setErrorMsg("Error: " + err.message); } finally { setIsRegeneratingSingle(false); }
            };

            const currentMonth = new Date().getMonth(); const currentYear = new Date().getFullYear(); const monthNames = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"]; const currentMonthName = monthNames[currentMonth];
            const monthlyPosts = posts.filter(p => { if (!p.createdAt) return false; const d = p.createdAt.toDate(); return d.getMonth() === currentMonth && d.getFullYear() === currentYear; });
            const monthlyComments = comments.filter(c => { if (!c.createdAt) return false; const d = c.createdAt.toDate(); return d.getMonth() === currentMonth && d.getFullYear() === currentYear; });

            let sentPos = 0, sentNeu = 0, sentRec = 0, sentCrit = 0, sentNeg = 0, sentEsc = 0;
            monthlyComments.forEach(c => { const s = c.sentiment || ''; if (s === 'Positivo') sentPos++; else if (s === 'Neutro') sentNeu++; else if (s === 'Reclamo ciudadano' || s === 'Reclamo') sentRec++; else if (s === 'Crítica externa') sentCrit++; else if (s === 'Escalar') sentEsc++; else sentNeg++; });

            const runGenerateReport = async (apiKey) => {
                setIsGeneratingReport(true);
                const sampleTexts = monthlyPosts.map(p => p.text).join(" | ").substring(0, 3000);
                const prompt = `Analiza el mes de ${currentMonthName}. Posts: ${monthlyPosts.length}, Comentarios: ${monthlyComments.length}. Positivos:${sentPos}, Reclamos:${sentRec}, Críticas:${sentCrit}. Textos: ${sampleTexts}. Genera JSON con "temaPrincipal", "analisisSituacion", "propuestas" (Array 3 strings).`;
                const payload = { contents: [{ parts: [{ text: prompt }] }], generationConfig: { responseMimeType: "application/json", responseSchema: { type: "OBJECT", properties: { temaPrincipal: { type: "STRING" }, analisisSituacion: { type: "STRING" }, propuestas: { type: "ARRAY", items: { type: "STRING" } } } } } };
                try {
                    const data = await fetchGeminiWithRetry(payload, apiKey);
                    const result = parseJSON(data.candidates?.[0]?.content?.parts?.[0]?.text);
                    await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'ai_reports'), { title: `Reporte ${currentMonthName} ${currentYear}`, report: result, month: currentMonth, year: currentYear, createdAt: serverTimestamp() });
                    showAlert("Reporte generado con éxito.");
                } catch (err) { setErrorMsg("Error IA Reporte."); } finally { setIsGeneratingReport(false); }
            };

            const runGenerateScript = async (apiKey) => {
                setIsGeneratingScript(true); setErrorMsg("");
                const sysPrompt = `Eres guionista para la Senadora Ivideliza Reyes. Crea un guion para redes sociales. NO inventes datos, usa la herramienta de búsqueda en Google para verificar información. El guion debe tener Gancho, Desarrollo y Cierre.`;
                const usrPrompt = `Tema principal: ${scriptTopic}\nEnfoques: ${scriptCategories.join(",")}\nOtras instrucciones: ${scriptConstraints}`;

                const payload = {
                    contents: [{ role: "user", parts: [{ text: usrPrompt }] }],
                    systemInstruction: { parts: [{ text: sysPrompt }] },
                    tools: [{ googleSearch: {} }] 
                };
                
                try {
                    const data = await fetchGeminiWithRetry(payload, apiKey);
                    const txt = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    const docRef = await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'scripts'), {
                        topic: scriptTopic, categories: scriptCategories, constraints: scriptConstraints, content: txt, createdAt: serverTimestamp()
                    });
                    setActiveScriptId(docRef.id); setEditingScriptText(txt);
                    setScriptTopic(""); setScriptConstraints("");
                } catch (err) { setErrorMsg("Error Guion: " + err.message); } finally { setIsGeneratingScript(false); }
            };

            const runAdaptScript = async (apiKey) => {
                if(!editingScriptText.trim()) return;
                setIsAdaptingScript(true); setErrorMsg("");
                const sysPrompt = `Revisa el siguiente texto. Corrige ortografía y mejora la fluidez (conecta las ideas para que suene natural). NO agregues información nueva, NO cambies el sentido y NO elimines datos clave. Devuelve SOLO el texto corregido.`;
                
                const payload = {
                    contents: [{ parts: [{ text: editingScriptText }] }],
                    systemInstruction: { parts: [{ text: sysPrompt }] }
                };
                try {
                    const data = await fetchGeminiWithRetry(payload, apiKey);
                    const txt = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    setEditingScriptText(txt);
                    if(activeScriptId) await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'scripts', activeScriptId), { content: txt });
                    showAlert("Texto adecuado y guardado.");
                } catch (err) { setErrorMsg("Error Adecuar: " + err.message); } finally { setIsAdaptingScript(false); }
            };

            const runRefineScript = async (apiKey) => {
                if(!scriptRefineInstruction.trim()) return;
                setIsRefiningScript(true); setErrorMsg("");
                const sysPrompt = `Modifica el guion de acuerdo a la instrucción específica. Mantén el tono. Devuelve SOLO el guion modificado.`;
                const usrPrompt = `GUION ACTUAL:\n${editingScriptText}\n\nINSTRUCCIÓN DE CAMBIO:\n${scriptRefineInstruction}`;
                
                const payload = {
                    contents: [{ parts: [{ text: usrPrompt }] }], systemInstruction: { parts: [{ text: sysPrompt }] }
                };
                try {
                    const data = await fetchGeminiWithRetry(payload, apiKey);
                    const txt = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    setEditingScriptText(txt); setScriptRefineInstruction("");
                    if(activeScriptId) await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'scripts', activeScriptId), { content: txt });
                    showAlert("Guion refinado y guardado.");
                } catch (err) { setErrorMsg("Error Refinar: " + err.message); } finally { setIsRefiningScript(false); }
            };


            if (authLoading) return null; 
            if (!user) {
                return (
                    <div className="flex items-center justify-center h-screen bg-gradient-to-br from-blue-50 to-slate-100 relative z-10">
                        <div className="bg-white p-10 rounded-3xl shadow-xl max-w-md w-full text-center border border-slate-200 m-4">
                            <div className="bg-blue-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6"><Target className="w-10 h-10 text-blue-600" /></div>
                            <h1 className="text-2xl font-black text-slate-800 mb-2">Gestor de Redes CMS</h1>
                            <p className="text-slate-500 mb-8 font-medium">Plataforma estratégica - Sen. Ivideliza Reyes</p>
                            {loginError && <div className="mb-4 bg-red-50 text-red-600 p-3 rounded-lg text-sm border border-red-200 text-left"><AlertTriangle className="w-4 h-4 inline mr-2"/>{loginError}</div>}
                            <button onClick={handleLogin} className="w-full flex items-center justify-center gap-3 bg-white border-2 border-slate-200 hover:bg-slate-50 hover:border-slate-300 text-slate-700 py-3 px-4 rounded-xl font-bold transition-all shadow-sm">
                                <svg className="w-5 h-5" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/><path fill="none" d="M1 1h22v22H1z"/></svg> Ingresar con Google
                            </button>
                        </div>
                    </div>
                );
            }

            const activePost = posts.find(p => p.id === activePostId);
            const activeCategories = getPostCategories(activePost);
            const activeComments = comments.filter(c => c.postId === activePostId);
            const commentBeingRegenerated = comments.find(c => c.id === regeneratingCommentId);
            const actScript = scripts.find(s => s.id === activeScriptId);

            return (
                <div className="flex h-screen overflow-hidden relative bg-slate-50 z-10">
                    
                    {}
                    {isSidebarOpen && <div className="fixed inset-0 bg-black/20 z-40 lg:hidden" onClick={() => setIsSidebarOpen(false)} />}
                    <aside className={`fixed lg:static inset-y-0 left-0 w-80 bg-white border-r border-slate-200 z-50 transform transition-transform duration-300 flex flex-col ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'}`}>
                        <div className="p-4 border-b border-slate-200 bg-blue-50/50">
                            <h2 className="text-blue-800 font-bold text-lg flex items-center gap-2"><History className="w-5 h-5" /> {currentView === 'scripts' ? 'Historial Guiones' : 'Historial Posts'}</h2>
                        </div>
                        <div className="flex-1 overflow-y-auto p-4 space-y-3">
                        
                        {currentView === 'scripts' ? (
                            <>
                                <button onClick={() => { setActiveScriptId(null); setEditingScriptText(""); setIsSidebarOpen(false); }} className={`w-full flex items-center justify-center gap-2 p-3 rounded-xl border-2 border-dashed font-medium transition-colors ${!activeScriptId ? 'border-indigo-500 text-indigo-600 bg-indigo-50' : 'border-slate-300 text-slate-600 hover:border-indigo-400 hover:bg-indigo-50'}`}>
                                    <Plus className="w-5 h-5" /> Nuevo Guion
                                </button>
                                <div className="pt-4 space-y-2">
                                    {scripts.map(s => (
                                        <div key={s.id} className={`w-full text-left p-3 rounded-lg border transition-all relative group cursor-pointer ${activeScriptId === s.id ? 'border-indigo-500 bg-indigo-50 shadow-sm' : 'border-slate-200 hover:border-slate-300 bg-white'}`}>
                                            <div onClick={() => { setActiveScriptId(s.id); setEditingScriptText(s.content); setIsSidebarOpen(false); }}>
                                                <p className="text-sm font-bold text-slate-700 pr-6 line-clamp-1">{s.topic}</p>
                                                <p className="text-xs text-slate-500 mt-1 line-clamp-1">{s.content}</p>
                                            </div>
                                            <button onClick={(e) => { e.stopPropagation(); showConfirm("¿Eliminar este guion?", () => deleteDoc(doc(db,'artifacts',appId,'users',user.uid,'scripts',s.id))); }} className="absolute top-2 right-2 p-1.5 text-slate-300 hover:text-red-500 hover:bg-red-50 rounded-md transition-colors md:opacity-0 md:group-hover:opacity-100 opacity-100" title="Eliminar guion"><Trash2 className="w-4 h-4" /></button>
                                        </div>
                                    ))}
                                </div>
                            </>
                        ) : (
                            <>
                                <button onClick={() => { setActivePostId(null); setCurrentView('manager'); setIsSidebarOpen(false); setRevealedCopiedCommentIds([]); setRevealedIgnoredCommentIds([]); }} className={`w-full flex items-center justify-center gap-2 p-3 rounded-xl border-2 border-dashed font-medium transition-colors ${!activePostId && currentView === 'manager' ? 'border-blue-500 text-blue-600 bg-blue-50' : 'border-slate-300 text-slate-600 hover:border-blue-400 hover:bg-blue-50'}`}>
                                    <Plus className="w-5 h-5" /> Nueva Publicación
                                </button>
                                <div className="pt-4 space-y-2">
                                    {posts.map(post => {
                                        const postCats = getPostCategories(post);
                                        return (
                                        <div key={post.id} className={`w-full text-left p-3 rounded-lg border transition-all relative group cursor-pointer ${activePostId === post.id && currentView === 'manager' ? 'border-blue-500 bg-blue-50 shadow-sm' : 'border-slate-200 hover:border-slate-300 bg-white'}`}>
                                            <div onClick={() => { setActivePostId(post.id); setCurrentView('manager'); setIsSidebarOpen(false); setRevealedCopiedCommentIds([]); setRevealedIgnoredCommentIds([]); }}>
                                                <p className="text-sm line-clamp-2 text-slate-700 pr-6">{post.text}</p>
                                                <div className="text-[10px] text-slate-400 mt-2 flex justify-between items-center">
                                                <span className="font-semibold text-blue-600 bg-blue-100 px-1.5 py-0.5 rounded truncate max-w-[150px]">{postCats.join(' · ')}</span>
                                                <span>{comments.filter(c => c.postId === post.id).length} resp.</span>
                                                </div>
                                            </div>
                                            <button onClick={(e) => deletePost(post.id, e)} className="absolute top-2 right-2 p-1.5 text-slate-300 hover:text-red-500 hover:bg-red-50 rounded-md transition-colors md:opacity-0 md:group-hover:opacity-100 opacity-100" title="Eliminar publicación"><Trash2 className="w-4 h-4" /></button>
                                        </div>
                                        );
                                    })}
                                </div>
                            </>
                        )}
                        </div>
                    </aside>

                    {}
                    <main className="flex-1 flex flex-col h-full overflow-hidden relative">
                        <header className="bg-white border-b border-slate-200 p-4 flex items-center justify-between z-10 shrink-0">
                        <div className="flex items-center gap-4">
                            <button onClick={() => setIsSidebarOpen(true)} className="p-2 -ml-2 text-slate-500 lg:hidden rounded-lg hover:bg-slate-100"><Menu className="w-6 h-6" /></button>
                            <div className="hidden md:flex bg-slate-100 p-1 rounded-lg">
                                <button onClick={() => setCurrentView('manager')} className={`px-4 py-2 rounded-md text-sm font-bold flex items-center gap-2 transition-all ${currentView === 'manager' ? 'bg-white shadow-sm text-blue-700' : 'text-slate-500 hover:text-slate-700'}`}><MessageSquare className="w-4 h-4" /> Gestión</button>
                                <button onClick={() => setCurrentView('scripts')} className={`px-4 py-2 rounded-md text-sm font-bold flex items-center gap-2 transition-all ${currentView === 'scripts' ? 'bg-white shadow-sm text-indigo-700' : 'text-slate-500 hover:text-slate-700'}`}><Video className="w-4 h-4" /> Guiones</button>
                                <button onClick={() => setCurrentView('analysis')} className={`px-4 py-2 rounded-md text-sm font-bold flex items-center gap-2 transition-all ${currentView === 'analysis' ? 'bg-white shadow-sm text-blue-700' : 'text-slate-500 hover:text-slate-700'}`}><BarChart3 className="w-4 h-4" /> Estrategia</button>
                            </div>
                        </div>
                        <div className="flex items-center gap-4">
                            <h1 className="text-lg font-bold text-slate-800 hidden md:block">Sen. Ivideliza Reyes</h1>
                            <button onClick={() => setIsSettingsModalOpen(true)} className="text-slate-400 hover:text-blue-600 p-2 rounded-md transition-colors bg-slate-100 hover:bg-blue-50" title="Configuración y Mantenimiento"><Settings className="w-5 h-5"/></button>
                            <div className="flex items-center gap-2 border-l border-slate-200 pl-4">
                                <img src={user.photoURL || "https://ui-avatars.com/api/?name=User"} className="w-8 h-8 rounded-full border border-slate-200" />
                                <button onClick={handleLogout} className="text-slate-400 hover:text-red-500 p-1 rounded-md transition-colors" title="Cerrar sesión"><LogOut className="w-5 h-5"/></button>
                            </div>
                        </div>
                        </header>

                        <div className="md:hidden flex bg-white border-b border-slate-200 shrink-0">
                            <button onClick={() => setCurrentView('manager')} className={`flex-1 py-3 text-sm font-bold text-center border-b-2 ${currentView === 'manager' ? 'border-blue-600 text-blue-700' : 'border-transparent text-slate-500'}`}>Gestión</button>
                            <button onClick={() => setCurrentView('scripts')} className={`flex-1 py-3 text-sm font-bold text-center border-b-2 ${currentView === 'scripts' ? 'border-indigo-600 text-indigo-700' : 'border-transparent text-slate-500'}`}>Guiones</button>
                            <button onClick={() => setCurrentView('analysis')} className={`flex-1 py-3 text-sm font-bold text-center border-b-2 ${currentView === 'analysis' ? 'border-blue-600 text-blue-700' : 'border-transparent text-slate-500'}`}>Estrategia</button>
                        </div>

                        {errorMsg && <div className="bg-red-50 text-red-600 p-3 text-sm text-center border-b border-red-100 flex justify-center items-center gap-2 shrink-0"><AlertTriangle className="w-4 h-4"/> {errorMsg}</div>}

                        <div className="flex-1 overflow-y-auto">
                        
                        {}
                        {currentView === 'manager' && (
                            <div className="p-4 md:p-6 max-w-4xl mx-auto space-y-6">
                            {!activePostId ? (
                                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
                                <div className="flex items-center gap-3 mb-4 text-blue-700">
                                    <MessageSquare className="w-6 h-6" />
                                    <h2 className="text-lg font-semibold">1. Pega la publicación original</h2>
                                </div>
                                <textarea value={newPostText} onChange={(e) => setNewPostText(e.target.value)} placeholder="Ej: Seguimos trabajando por Nayarit..." className="w-full h-40 p-4 rounded-xl border border-slate-300 focus:border-blue-500 outline-none resize-none text-slate-700" />
                                <div className="mt-4 flex justify-end">
                                    <button onClick={createNewPost} disabled={!newPostText.trim()} className="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl font-medium disabled:opacity-50">Guardar y Continuar <ChevronRight className="w-5 h-5" /></button>
                                </div>
                                </div>
                            ) : (
                                <div className="space-y-6">
                                
                                <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 relative">
                                    <div className="absolute left-0 top-0 bottom-0 w-1 bg-blue-500 rounded-l-xl"></div>
                                    <div className="flex justify-between items-start mb-2">
                                        <h3 className="text-xs font-bold text-slate-400 uppercase tracking-wider">Publicación Original</h3>
                                        <div className="flex items-center gap-2">
                                            <button onClick={(e) => deletePost(activePost.id, e)} className="text-xs bg-red-50 hover:bg-red-100 text-red-600 px-3 py-1.5 rounded-lg font-medium flex items-center gap-1 border border-red-200 transition-colors"><Trash2 className="w-3 h-3" /> Eliminar</button>
                                            <button onClick={openContextModal} className="text-xs bg-slate-100 hover:bg-slate-200 text-slate-600 px-3 py-1.5 rounded-lg font-medium flex items-center gap-1 border border-slate-200 transition-colors"><Settings className="w-3 h-3" /> {(activePost?.context || activePost?.postInstruction) ? 'Contexto Configurado' : '+ Añadir Contexto'}</button>
                                        </div>
                                    </div>
                                    <p className="text-slate-600 text-sm whitespace-pre-wrap">{activePost?.text}</p>
                                    
                                    <div className="mt-5 border-t border-slate-100 pt-4">
                                        <p className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Enfoques activos para responder (Selección múltiple)</p>
                                        <p className="text-[10px] text-slate-400 mb-3">Selecciona los tonos que debe combinar la IA al generar respuestas.</p>
                                        <div className="grid grid-cols-2 md:grid-cols-4 gap-2">
                                            {[
                                            { name: 'Social', icon: Users, color: 'text-emerald-600', bg: 'bg-emerald-50', border: 'border-emerald-300' },
                                            { name: 'Familiar', icon: Smile, color: 'text-pink-600', bg: 'bg-pink-50', border: 'border-pink-300' },
                                            { name: 'Legislativa', icon: BookOpen, color: 'text-indigo-600', bg: 'bg-indigo-50', border: 'border-indigo-300' },
                                            { name: 'Política', icon: Megaphone, color: 'text-orange-600', bg: 'bg-orange-50', border: 'border-orange-300' }
                                            ].map(cat => {
                                            const isActive = activeCategories.includes(cat.name);
                                            return (
                                                <button key={cat.name} onClick={() => togglePostCategory(activePost.id, cat.name, activeCategories)} className={`p-2 rounded-xl text-xs font-bold flex flex-col items-center gap-1 border-2 transition-all ${isActive ? `${cat.bg} ${cat.color} ${cat.border} shadow-sm scale-105` : 'bg-white text-slate-400 border-slate-100 hover:bg-slate-50'}`}><cat.icon className="w-4 h-4" /> {cat.name}</button>
                                            );
                                            })}
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-5">
                                    <h3 className="text-sm font-bold text-slate-700 mb-2">2. Pega los comentarios a responder</h3>
                                    <textarea value={newCommentsText} onChange={(e) => setNewCommentsText(e.target.value)} placeholder="Pega aquí los comentarios copiados de Facebook..." className="w-full h-32 p-3 rounded-lg border border-slate-300 focus:border-blue-500 outline-none resize-none text-sm mb-3" />
                                    <button onClick={() => handleGenerateResponses()} disabled={!newCommentsText.trim() || isGenerating} className="w-full flex items-center justify-center gap-2 bg-slate-800 hover:bg-slate-900 disabled:opacity-50 text-white py-3 rounded-xl font-bold">
                                    {isGenerating ? "Analizando y Redactando..." : <><Send className="w-5 h-5" /> Generar Respuestas</>}
                                    </button>
                                </div>

                                <div className="space-y-4">
                                    {(() => {
                                        const copiedComments = activeComments.filter(c => c.status === 'copiado');
                                        const minimizedComments = copiedComments.filter(c => !revealedCopiedCommentIds.includes(c.id));
                                        const revealedComments = copiedComments.filter(c => revealedCopiedCommentIds.includes(c.id));
                                        
                                        const ignoredComments = activeComments.filter(c => c.status === 'no_responder');
                                        const minimizedIgnored = ignoredComments.filter(c => !revealedIgnoredCommentIds.includes(c.id));
                                        const revealedIgnored = ignoredComments.filter(c => revealedIgnoredCommentIds.includes(c.id));
                                        
                                        if (copiedComments.length === 0 && ignoredComments.length === 0) return null;
                                        
                                        return (
                                            <div className="flex flex-wrap justify-center gap-3">
                                                {minimizedComments.length > 0 && <button onClick={() => setRevealedCopiedCommentIds(copiedComments.map(c => c.id))} className="text-xs bg-slate-200 text-slate-600 px-4 py-2 rounded-full font-bold flex items-center gap-2 shadow-sm"><Eye className="w-4 h-4"/> Mostrar {minimizedComments.length} copiadas</button>}
                                                {revealedComments.length > 0 && <button onClick={() => setRevealedCopiedCommentIds([])} className="text-xs bg-green-100 text-green-700 px-4 py-2 rounded-full font-bold flex items-center gap-2 shadow-sm border border-green-200"><EyeOff className="w-4 h-4"/> Ocultar copiadas</button>}
                                                {minimizedIgnored.length > 0 && <button onClick={() => setRevealedIgnoredCommentIds(ignoredComments.map(c => c.id))} className="text-xs bg-slate-200 text-slate-600 px-4 py-2 rounded-full font-bold flex items-center gap-2 shadow-sm"><Eye className="w-4 h-4"/> Mostrar {minimizedIgnored.length} ignoradas</button>}
                                                {revealedIgnored.length > 0 && <button onClick={() => setRevealedIgnoredCommentIds([])} className="text-xs bg-slate-100 text-slate-600 px-4 py-2 rounded-full font-bold flex items-center gap-2 shadow-sm border border-slate-200"><EyeOff className="w-4 h-4"/> Ocultar ignoradas</button>}
                                            </div>
                                        );
                                    })()}

                                    {activeComments.map((comment) => {
                                        const isCopiado = comment.status === 'copiado';
                                        const isRevealed = revealedCopiedCommentIds.includes(comment.id);
                                        const isHidden = isCopiado && !isRevealed;
                                        
                                        const isNoResponder = comment.status === 'no_responder';
                                        const isRevealedIgnored = revealedIgnoredCommentIds.includes(comment.id);
                                        const isHiddenIgnored = isNoResponder && !isRevealedIgnored;

                                        const vis = getSentimentVisuals(comment.sentiment, comment.isHostile);

                                        if (isHidden) return ( <div key={comment.id} className="bg-green-50 border border-green-200 rounded-lg p-2 flex justify-between items-center text-sm shadow-sm cursor-pointer hover:bg-green-100" onClick={() => setRevealedCopiedCommentIds(prev => [...prev, comment.id])}><div className="flex items-center gap-2 text-green-700 font-medium"><CheckCircle2 className="w-4 h-4"/> Copiado <span className="text-green-900 font-bold ml-2">{comment.nombreUsuario}</span></div><span className="text-xs text-green-600 bg-green-200 px-2 py-1 rounded font-bold">Mostrar</span></div> );
                                        if (isHiddenIgnored) return ( <div key={comment.id} className="bg-slate-50 border border-slate-200 rounded-lg p-2 flex justify-between items-center text-sm shadow-sm cursor-pointer hover:bg-slate-100" onClick={() => setRevealedIgnoredCommentIds(prev => [...prev, comment.id])}><div className="flex items-center gap-2 text-slate-500 font-medium"><Ban className="w-4 h-4"/> Ignorado <span className="text-slate-700 font-bold ml-2">{comment.nombreUsuario}</span></div><span className="text-xs text-slate-500 bg-slate-200 px-2 py-1 rounded font-bold">Mostrar</span></div> );

                                        return (
                                            <div key={comment.id} className={`bg-white rounded-2xl shadow-sm border-2 overflow-hidden flex flex-col md:flex-row ${vis.border} transition-all ${isNoResponder ? 'opacity-50 grayscale' : ''}`}>
                                                <div className="p-4 md:w-2/3 border-b md:border-b-0 md:border-r border-slate-100 flex flex-col space-y-3 relative">
                                                    <div className="flex flex-wrap justify-between items-start gap-2">
                                                        <div className="flex items-center gap-2">
                                                            <span className="font-bold text-sm flex items-center gap-1 text-slate-800"><User className="w-4 h-4 text-slate-400"/> {comment.nombreUsuario}</span>
                                                            <button onClick={() => openAliasModal(comment.nombreUsuario)} className="text-[10px] bg-slate-100 hover:bg-blue-100 hover:text-blue-700 text-slate-500 px-1.5 py-0.5 rounded border border-slate-200 flex items-center gap-1" title="Personalizar nombre"><UserPlus className="w-3 h-3"/> Alias</button>
                                                        </div>
                                                        <span className={`text-[10px] font-bold uppercase px-2 py-1 rounded-md flex items-center gap-1 ${vis.bg} ${vis.text} ${vis.pulse ? 'animate-pulse' : ''}`}><vis.icon className="w-3 h-3"/> {vis.label}</span>
                                                    </div>

                                                    <div className="bg-slate-50 p-3 rounded-lg border border-slate-200 text-sm">
                                                        <p className="text-slate-700 italic mb-2">"{comment.originalComment}"</p>
                                                        {(comment.sentimentReason || comment.recommendation || comment.requiresReview) && (
                                                            <div className="mt-2 pt-2 border-t border-slate-200 text-[11px] flex flex-col gap-1">
                                                                {comment.sentimentReason && <p className="text-slate-500"><span className="font-bold text-slate-600">Por qué:</span> {comment.sentimentReason}</p>}
                                                                {comment.recommendation && <p className="text-blue-600"><span className="font-bold">Sugerencia IA:</span> {comment.recommendation}</p>}
                                                                {comment.requiresReview && <p className="text-red-600 font-bold flex items-center gap-1"><ShieldAlert className="w-3 h-3"/> Requiere revisión antes de enviar.</p>}
                                                                {comment.usedAlias && <p className="text-purple-600 font-bold">Usó alias: {comment.usedAlias}</p>}
                                                            </div>
                                                        )}
                                                    </div>
                                                    
                                                    {editingCommentId === comment.id ? (
                                                        <textarea value={editingCommentText} onChange={(e) => setEditingCommentText(e.target.value)} className="w-full mt-2 p-3 text-base text-slate-800 border-2 border-blue-400 rounded-xl focus:outline-none focus:ring-4 focus:ring-blue-100 min-h-[100px]" />
                                                    ) : (
                                                        <div className="text-base text-slate-800 mt-2 font-medium bg-white p-3 rounded-xl border border-slate-100 shadow-inner">{comment.generatedResponse}</div>
                                                    )}
                                                </div>

                                                <div className="p-4 md:w-1/3 bg-slate-50 flex flex-col justify-center gap-2">
                                                    {editingCommentId === comment.id ? (
                                                        <>
                                                            <button onClick={() => saveEditedResponse(comment.id)} className="w-full py-3 rounded-xl font-bold flex items-center justify-center gap-2 bg-blue-600 text-white hover:bg-blue-700 shadow-sm"><Save className="w-5 h-5"/> Guardar</button>
                                                            <button onClick={() => setEditingCommentId(null)} className="w-full py-3 rounded-xl font-bold flex items-center justify-center gap-2 bg-white text-slate-500 border border-slate-200 hover:bg-slate-100">Cancelar</button>
                                                        </>
                                                    ) : (
                                                        <>
                                                            <button onClick={() => handleCopy(comment.id, comment.generatedResponse)} className={`w-full py-3 rounded-xl font-bold flex items-center justify-center gap-2 shadow-sm ${copiedId === comment.id ? 'bg-green-100 text-green-700 border border-green-300' : 'bg-white text-blue-700 border border-blue-200 hover:bg-blue-50'}`}>
                                                                {copiedId === comment.id ? <><CheckCircle2 className="w-5 h-5"/> ¡Copiado!</> : <><Copy className="w-5 h-5"/> Copiar Respuesta</>}
                                                            </button>
                                                            
                                                            <div className="grid grid-cols-2 gap-2">
                                                                <button onClick={() => startEditingComment(comment)} className="w-full py-2 rounded-xl font-bold flex items-center justify-center gap-1 bg-white text-slate-600 border border-slate-200 hover:bg-slate-100 text-xs"><Edit2 className="w-4 h-4"/> Editar</button>
                                                                <button onClick={() => { setRegeneratingCommentId(comment.id); setRegenerateInstruction(""); }} className="w-full py-2 rounded-xl font-bold flex items-center justify-center gap-1 bg-white text-purple-600 border border-purple-200 hover:bg-purple-50 text-xs"><RefreshCw className="w-4 h-4"/> Repensar</button>
                                                            </div>
                                                            <button onClick={() => { changeCommentStatus(comment.id, isNoResponder ? 'pendiente' : 'no_responder'); setRevealedIgnoredCommentIds(prev => prev.filter(id => id !== comment.id)); }} className={`w-full py-2 rounded-xl font-bold flex items-center justify-center gap-1 border text-xs ${isNoResponder ? 'bg-slate-700 text-white border-slate-800' : 'bg-white text-slate-400 border-slate-200 hover:bg-slate-100 hover:text-red-500'}`}><Ban className="w-4 h-4"/> {isNoResponder ? 'Restaurar' : 'Ignorar Comentario'}</button>
                                                        </>
                                                    )}
                                                </div>
                                            </div>
                                        )
                                    })}
                                </div>
                                </div>
                            )}
                            </div>
                        )}

                        {}
                        {currentView === 'scripts' && (
                            <div className="p-4 md:p-6 max-w-4xl mx-auto space-y-6">
                                {!activeScriptId ? (
                                    <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 md:p-8">
                                        <div className="flex items-center gap-3 mb-6 text-indigo-700">
                                            <Video className="w-7 h-7" />
                                            <h2 className="text-xl font-bold">Generador de Guiones con IA</h2>
                                        </div>
                                        <div className="space-y-6">
                                            <div>
                                                <label className="block text-sm font-bold text-slate-700 mb-2">1. ¿De qué tratará el video?</label>
                                                <p className="text-xs text-slate-500 mb-2">La IA buscará datos en internet para no inventar información.</p>
                                                <textarea value={scriptTopic} onChange={(e)=>setScriptTopic(e.target.value)} placeholder="Ej: Las recientes reformas al poder judicial y cómo afectan a Nayarit..." className="w-full h-24 p-4 rounded-xl border border-slate-300 focus:border-indigo-500 outline-none resize-none" />
                                            </div>
                                            <div>
                                                <label className="block text-sm font-bold text-slate-700 mb-2">2. Enfoque (Puedes elegir varios)</label>
                                                <div className="flex flex-wrap gap-2">
                                                    {['Legislativo', 'Política', 'Social', 'Familiar'].map(cat => (
                                                        <button key={cat} onClick={()=>{let n=[...scriptCategories]; if(n.includes(cat)) n=n.filter(c=>c!==cat); else n.push(cat); if(!n.length) n=["Legislativo"]; setScriptCategories(n);}} className={`px-4 py-2 rounded-full text-sm font-medium border transition-colors ${scriptCategories.includes(cat)?'bg-indigo-100 text-indigo-700 border-indigo-300':'bg-white text-slate-500 border-slate-200 hover:bg-slate-50'}`}>{cat}</button>
                                                    ))}
                                                </div>
                                            </div>
                                            <div>
                                                <label className="block text-sm font-bold text-slate-700 mb-2">3. Restricciones Especiales (Opcional)</label>
                                                <input value={scriptConstraints} onChange={(e)=>setScriptConstraints(e.target.value)} placeholder="Ej: Que dure menos de 1 minuto, usar lenguaje muy sencillo..." className="w-full p-3 rounded-lg border border-slate-300 focus:border-indigo-500 outline-none text-sm" />
                                            </div>
                                            <div className="flex justify-end pt-2 border-t border-slate-100">
                                                <button onClick={()=>executeWithApiKey(runGenerateScript)} disabled={!scriptTopic.trim()||isGeneratingScript} className="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-3 rounded-xl font-bold disabled:opacity-50 transition-colors">
                                                    <Wand2 className="w-5 h-5" /> {isGeneratingScript?"Escribiendo y Buscando...":"Generar Guion"}
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col min-h-[600px]">
                                        <div className="bg-indigo-50 border-b border-indigo-100 p-4 flex justify-between items-center shrink-0">
                                            <div>
                                                <h3 className="font-bold text-indigo-900 text-lg flex items-center gap-2"><Video className="w-5 h-5"/> Edición de Guion</h3>
                                                <p className="text-xs text-indigo-700 mt-1">Puedes modificar el texto directamente aquí.</p>
                                            </div>
                                            <div className="flex gap-2">
                                                <button onClick={()=>executeWithApiKey(runAdaptScript)} disabled={isAdaptingScript} className="text-sm font-bold bg-purple-100 hover:bg-purple-200 text-purple-700 px-4 py-2 rounded-lg flex items-center gap-2 transition-colors border border-purple-200" title="Pulir ortografía y redacción del texto actual">
                                                    <Sparkles className="w-4 h-4"/> {isAdaptingScript?"Adecuando...":"Adecuar"}
                                                </button>
                                                <button onClick={async ()=>{await updateDoc(doc(db,'artifacts',appId,'users',user.uid,'scripts',activeScriptId),{content:editingScriptText}); showAlert("Guion guardado exitosamente.");}} className="text-sm font-bold bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg flex items-center gap-2 transition-colors">
                                                    <Save className="w-4 h-4"/> Guardar
                                                </button>
                                                <button onClick={()=>{copyToClipboard(editingScriptText); showAlert("Copiado al portapapeles.");}} className="text-sm font-bold bg-white text-slate-600 border border-slate-300 hover:bg-slate-50 px-4 py-2 rounded-lg flex items-center gap-2 transition-colors">
                                                    <Copy className="w-4 h-4"/> Copiar
                                                </button>
                                            </div>
                                        </div>
                                        
                                        <textarea value={editingScriptText} onChange={(e)=>setEditingScriptText(e.target.value)} className="flex-1 w-full p-6 outline-none text-slate-700 bg-slate-50 hover:bg-white resize-none text-lg leading-relaxed focus:ring-2 focus:ring-indigo-100 focus:bg-white transition-colors" />
                                        
                                        <div className="border-t border-slate-200 bg-white p-4 shrink-0">
                                            <label className="block text-xs font-bold text-indigo-700 uppercase mb-2"><Wand2 className="w-3 h-3 inline mr-1" /> Ajustes con IA (Refinar)</label>
                                            <div className="flex gap-2">
                                                <input value={scriptRefineInstruction} onChange={(e)=>setScriptRefineInstruction(e.target.value)} className="flex-1 p-3 rounded-lg border border-slate-300 focus:border-indigo-500 outline-none text-sm" placeholder="Ej: Hazlo más corto, menciona la colonia Centro..." disabled={isRefiningScript} />
                                                <button onClick={()=>executeWithApiKey(runRefineScript)} disabled={!scriptRefineInstruction.trim()||isRefiningScript} className="bg-indigo-500 hover:bg-indigo-600 text-white px-6 py-2 rounded-lg font-bold disabled:opacity-50 transition-colors flex items-center gap-2">
                                                    {isRefiningScript ? <RefreshCw className="w-4 h-4 animate-spin"/> : <Edit2 className="w-4 h-4"/>} Refinar
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {}
                        {currentView === 'analysis' && (
                            <div className="p-4 md:p-6 max-w-5xl mx-auto space-y-6">
                            <div className="bg-white rounded-2xl shadow-sm border-2 border-purple-100 overflow-hidden">
                                <div className="bg-purple-50 p-4 border-b border-purple-100 flex items-center gap-3">
                                <Target className="w-6 h-6 text-purple-700" />
                                <div><h2 className="font-bold text-purple-900 text-lg">Estrategia Global (Aplica a todo)</h2><p className="text-xs text-purple-700">Líneas discursivas que Gemini considerará en todas las respuestas.</p></div>
                                </div>
                                <div className="p-5">
                                <textarea value={newStrategyText} onChange={(e) => setNewStrategyText(e.target.value)} placeholder="Ej: Siempre hablar de los foros ciudadanos..." className="w-full h-20 p-4 rounded-xl border border-slate-300 focus:border-purple-500 outline-none resize-none text-slate-700" />
                                <div className="mt-3 flex justify-between items-center">
                                    <div className="text-sm font-medium text-green-600 flex items-center gap-1 min-h-[24px]">
                                        {strategySuccessMsg && <><Check className="w-4 h-4"/> {strategySuccessMsg}</>}
                                    </div>
                                    <button onClick={saveNewStrategy} disabled={isSavingStrategy || !newStrategyText.trim()} className="bg-purple-600 hover:bg-purple-700 text-white px-6 py-2 rounded-xl font-bold disabled:opacity-50 transition-colors">
                                    {isSavingStrategy ? "Guardando..." : "Agregar a la lista"}
                                    </button>
                                </div>
                                </div>
                            </div>

                            {strategies.length > 0 && (
                                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                                    <div className="bg-slate-50 p-3 border-b border-slate-100"><h3 className="font-bold text-slate-700 text-sm flex items-center gap-2"><Target className="w-4 h-4 text-purple-500"/> Manual de Instrucciones Activas</h3></div>
                                    <div className="p-4 space-y-3">
                                        {strategies.map((strategy, index) => (
                                            <div key={strategy.id} className="p-3 bg-purple-50/50 border border-purple-100 rounded-lg flex gap-3 group relative">
                                                <div className="text-purple-400 font-bold text-sm mt-0.5">{index + 1}.</div>
                                                <div className="flex-1">
                                                    {editingStrategyId === strategy.id ? (
                                                        <div className="flex flex-col gap-2">
                                                            <textarea value={editingStrategyText} onChange={(e) => setEditingStrategyText(e.target.value)} className="w-full p-2 border border-purple-300 rounded-md focus:outline-none text-sm" rows="3" />
                                                            <div className="flex justify-end gap-2"><button onClick={() => setEditingStrategyId(null)} className="px-3 py-1 text-xs text-slate-500 hover:bg-slate-200 rounded">Cancelar</button><button onClick={saveEditedStrategy} className="px-3 py-1 text-xs bg-purple-600 text-white rounded font-bold">Guardar</button></div>
                                                        </div>
                                                    ) : ( <p className="text-slate-700 text-sm whitespace-pre-wrap">{strategy.text}</p> )}
                                                </div>
                                                {!editingStrategyId && (
                                                <div className="absolute top-2 right-2 opacity-0 group-hover:opacity-100 md:opacity-0 flex gap-1 bg-white shadow-sm border border-slate-200 rounded-md p-1 transition-opacity">
                                                    <button onClick={() => startEditingStrategy(strategy)} className="p-1.5 text-slate-400 hover:text-blue-500 rounded" title="Editar"><Edit2 className="w-4 h-4"/></button>
                                                    <button onClick={() => deleteStrategy(strategy.id)} className="p-1.5 text-slate-400 hover:text-red-500 rounded" title="Eliminar"><Trash2 className="w-4 h-4"/></button>
                                                </div>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-5">
