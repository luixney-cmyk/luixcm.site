    <title>Gestor CM - Sen. Ivideliza Reyes</title>
    
    <!-- 1. Cargar Tailwind CSS para el diseño -->

    <!-- 2. Cargar Babel para traducir React en el navegador -->

    <!-- 3. Importar React, iconos y Firebase (Solución de dependencias) -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client?external=react",
            "lucide-react": "https://esm.sh/lucide-react@0.344.0?bundle&external=react",

            }
        });

</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased">
    
    <div id="root">
        <!-- Loader inicial nativo para evitar pantalla blanca total -->
        <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; font-family:sans-serif; color:#64748b;">
            <div style="width:40px; height:40px; border:4px solid #3b82f6; border-top-color:transparent; border-radius:50%; animation: spin 1s linear infinite;"></div>
            <p style="margin-top:20px; font-weight:bold;">Cargando Gestor CM...</p>
            <style>@keyframes spin { 100% { transform: rotate(360deg); } }</style>
        </div>
    </div>

    <!-- 4. El Código de tu Aplicación -->
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        // Se agregaron los iconos Smile, Meh y Frown para los sentimientos, y Edit, Trash, FileClock, Check
        import { Copy, Plus, Menu, X, Settings, MessageSquare, Send, CheckCircle2, ChevronRight, History, AlertTriangle, User, Users, FileText, BookOpen, Megaphone, BarChart3, TrendingUp, Target, Lightbulb, PieChart, MessageCircle, LogOut, Key, Smile, Meh, Frown, Edit2, Trash2, FileClock, Check } from 'lucide-react';
        
        import { initializeApp } from 'firebase/app';
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from 'firebase/auth';
        import { getFirestore, collection, doc, setDoc, onSnapshot, addDoc, serverTimestamp, updateDoc, deleteDoc } from 'firebase/firestore';

        // --- CREDENCIALES DE FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyA7xjysJVQb3tYEb8ZU9yHbs-MBDWVUhk4",
            authDomain: "gestor-ivi.firebaseapp.com",
            projectId: "gestor-ivi",
            storageBucket: "gestor-ivi.firebasestorage.app",
            messagingSenderId: "562230194451",
            appId: "1:562230194451:web:3877b3bf0d18b6ac912ae6",
            measurementId: "G-5MDJNBV15H"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        provider.setCustomParameters({ prompt: 'select_account' });
        const appId = firebaseConfig.projectId;

        // --- ACCESO PERMITIDO ---
        const ALLOWED_EMAIL = "luixnay@gmail.com";
        const normalizeEmail = (email) => (email || "").trim().toLowerCase();
        const isAllowedUser = (firebaseUser) => {
            return firebaseUser &&
                   normalizeEmail(firebaseUser.email) === ALLOWED_EMAIL &&
                   firebaseUser.emailVerified === true;
        };

        // --- FUNCIONES UTILITARIAS ---
        const copyToClipboard = (text) => {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            textArea.style.left = "-9999px";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            let successful = false;
            try { successful = document.execCommand('copy'); } catch (err) {}
            document.body.removeChild(textArea);
            return successful;
        };

        const delay = (ms) => new Promise(res => setTimeout(res, ms));

        // --- CONFIGURACIÓN DE GEMINI ---
        const GEMINI_MODEL = "gemini-2.5-flash";

        // Función ajustada para recibir el apiKey dinámicamente
        const fetchGeminiWithRetry = async (payload, apiKey, retries = 3) => {
            const cleanApiKey = (apiKey || "").trim().replace(/^['"]|['"]$/g, "");
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent`;
            let attempt = 0;
            const backoff = [1000, 2500, 5000];

            while (attempt < retries) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'x-goog-api-key': cleanApiKey
                        },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        let detail = "";
                        try {
                            const errJson = await response.json();
                            detail = errJson?.error?.message ? ` - ${errJson.error.message}` : "";
                        } catch (_) {}

                        if (response.status === 400) throw new Error(`Solicitud inválida a Gemini${detail}`);
                        if (response.status === 401 || response.status === 403) throw new Error(`API Key rechazada o sin permisos para Gemini${detail}`);
                        if (response.status === 404) throw new Error(`Modelo no encontrado o apagado: ${GEMINI_MODEL}${detail}`);
                        if (response.status === 429) throw new Error(`Límite de uso/cuota alcanzado${detail}`);
                        throw new Error(`Error Gemini ${response.status}${detail}`);
                    }

                    return await response.json();
                } catch (error) {
                    const msg = String(error?.message || error);
                    const retryable = msg.includes('429') || msg.includes('500') || msg.includes('502') || msg.includes('503') || msg.includes('504') || msg.includes('Failed to fetch');
                    if (!retryable || attempt === retries - 1) throw error;
                    await delay(backoff[attempt]);
                    attempt++;
                }
            }
        };

        // --- APLICACIÓN PRINCIPAL ---
        function App() {
            const [user, setUser] = useState(null);
            const [authLoading, setAuthLoading] = useState(true);
            const [currentView, setCurrentView] = useState('manager'); 
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);

            const [posts, setPosts] = useState([]);
            const [comments, setComments] = useState([]);
            const [activePostId, setActivePostId] = useState(null);
            
            const [isContextModalOpen, setIsContextModalOpen] = useState(false);
            const [tempContextText, setTempContextText] = useState("");
            
            // Estados para el historial de Estrategias
            const [strategies, setStrategies] = useState([]);
            const [newStrategyText, setNewStrategyText] = useState("");
            const [isSavingStrategy, setIsSavingStrategy] = useState(false);
            const [editingStrategyId, setEditingStrategyId] = useState(null);
            const [editingStrategyText, setEditingStrategyText] = useState("");
            const [strategySuccessMsg, setStrategySuccessMsg] = useState("");

            const [newPostText, setNewPostText] = useState("");
            const [newCommentsText, setNewCommentsText] = useState("");
            const [isGenerating, setIsGenerating] = useState(false);
            const [errorMsg, setErrorMsg] = useState("");
            const [loginError, setLoginError] = useState("");
            const [copiedId, setCopiedId] = useState(null);
            
            // Estados para el historial de Reportes de IA
            const [aiReports, setAiReports] = useState([]);
            const [isGeneratingReport, setIsGeneratingReport] = useState(false);
            const [viewingReport, setViewingReport] = useState(null); // Reporte activo para el modal

            // Estados para el modal de API Key
            const [isApiModalOpen, setIsApiModalOpen] = useState(false);
            const [tempApiKey, setTempApiKey] = useState("");
            const [pendingAction, setPendingAction] = useState(null);

            useEffect(() => {
                const unsubscribe = onAuthStateChanged(auth, async (currentUser) => {
                    if (currentUser && !isAllowedUser(currentUser)) {
                        setUser(null);
                        setLoginError(`Acceso denegado. Esta aplicación solo está autorizada para ${ALLOWED_EMAIL}.`);
                        await signOut(auth);
                        setAuthLoading(false);
                        return;
                    }
                    setUser(currentUser);
                    setAuthLoading(false);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const uid = user.uid; 

                const postsRef = collection(db, 'artifacts', appId, 'users', uid, 'posts');
                const commentsRef = collection(db, 'artifacts', appId, 'users', uid, 'comments');
                const strategiesRef = collection(db, 'artifacts', appId, 'users', uid, 'strategies'); // Nueva colección
                const reportsRef = collection(db, 'artifacts', appId, 'users', uid, 'ai_reports'); // Nueva colección

                const handleFirestoreError = async (err) => {
                    console.error(err);
                    if (err.code === 'permission-denied') {
                        setErrorMsg("Acceso denegado por las reglas de Firebase.");
                        await signOut(auth);
                    } else {
                        setErrorMsg("Error al leer datos de Firebase.");
                    }
                };

                const unsubPosts = onSnapshot(postsRef, (snap) => {
                    const fetchedPosts = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    fetchedPosts.sort((a, b) => (b.createdAt?.toMillis() || 0) - (a.createdAt?.toMillis() || 0));
                    setPosts(fetchedPosts);
                }, handleFirestoreError);

                const unsubComments = onSnapshot(commentsRef, (snap) => {
                    const fetchedComments = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    fetchedComments.sort((a, b) => (b.createdAt?.toMillis() || 0) - (a.createdAt?.toMillis() || 0));
                    setComments(fetchedComments);
                }, handleFirestoreError);

                const unsubStrategies = onSnapshot(strategiesRef, (snap) => {
                    const fetchedStrategies = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    fetchedStrategies.sort((a, b) => (b.createdAt?.toMillis() || 0) - (a.createdAt?.toMillis() || 0));
                    setStrategies(fetchedStrategies);
                }, handleFirestoreError);

                const unsubReports = onSnapshot(reportsRef, (snap) => {
                    const fetchedReports = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    fetchedReports.sort((a, b) => (b.createdAt?.toMillis() || 0) - (a.createdAt?.toMillis() || 0));
                    setAiReports(fetchedReports);
                }, handleFirestoreError);

                return () => { unsubPosts(); unsubComments(); unsubStrategies(); unsubReports(); };
            }, [user]);

            const handleLogin = async () => {
                setLoginError("");
                try {
                    const result = await signInWithPopup(auth, provider);
                    if (!isAllowedUser(result.user)) {
                        await signOut(auth);
                        setUser(null);
                        setLoginError(`Acceso denegado. Esta aplicación solo está autorizada para ${ALLOWED_EMAIL}.`);
                    }
                } catch (error) {
                    console.error(error);
                    setLoginError("Error al iniciar sesión: " + error.message + " (Asegúrate de permitir las ventanas emergentes en tu navegador)");
                }
            };

            const handleLogout = () => { signOut(auth); };

            // --- GESTIÓN DE ESTRATEGIAS ---
            const saveNewStrategy = async () => {
                if (!newStrategyText.trim()) return;
                setIsSavingStrategy(true);
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'strategies'), {
                        text: newStrategyText.trim(),
                        createdAt: serverTimestamp()
                    });
                    setNewStrategyText("");
                    setStrategySuccessMsg("¡Instrucción guardada exitosamente!");
                    setTimeout(() => setStrategySuccessMsg(""), 3000);
                } catch (err) {
                    setErrorMsg("Error al guardar la estrategia.");
                } finally {
                    setIsSavingStrategy(false);
                }
            };

            const deleteStrategy = async (id) => {
                if(confirm("¿Estás seguro de eliminar esta instrucción?")) {
                    try {
                        await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'strategies', id));
                    } catch (err) { setErrorMsg("Error al eliminar la estrategia."); }
                }
            };

            const startEditingStrategy = (strategy) => {
                setEditingStrategyId(strategy.id);
                setEditingStrategyText(strategy.text);
            };

            const saveEditedStrategy = async () => {
                if (!editingStrategyText.trim()) return;
                try {
                    await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'strategies', editingStrategyId), {
                        text: editingStrategyText.trim()
                    });
                    setEditingStrategyId(null);
                    setEditingStrategyText("");
                } catch (err) { setErrorMsg("Error al actualizar la estrategia."); }
            };
            // ------------------------------

            const createNewPost = async () => {
                if (!newPostText.trim()) return;
                try {
                    const docRef = await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'posts'), {
                        text: newPostText.trim(),
                        context: "", 
                        category: "Genérica", 
                        createdAt: serverTimestamp()
                    });
                    setActivePostId(docRef.id);
                    setNewPostText("");
                    if (window.innerWidth < 1024) setIsSidebarOpen(false);
                } catch (err) { setErrorMsg("Error al crear la publicación."); }
            };

            const openContextModal = () => {
                const activePost = posts.find(p => p.id === activePostId);
                if (activePost) {
                    setTempContextText(activePost.context || "");
                    setIsContextModalOpen(true);
                }
            };

            const savePostContext = async () => {
                try {
                    const postRef = doc(db, 'artifacts', appId, 'users', user.uid, 'posts', activePostId);
                    await updateDoc(postRef, { context: tempContextText });
                    setIsContextModalOpen(false);
                } catch (err) { setErrorMsg("Error al guardar el contexto."); }
            };

            const updatePostCategory = async (postId, category) => {
                try {
                    const postRef = doc(db, 'artifacts', appId, 'users', user.uid, 'posts', postId);
                    await updateDoc(postRef, { category });
                } catch (err) { setErrorMsg("Error al actualizar la categoría."); }
            };

            const executeWithApiKey = (actionCallback) => {
                const key = localStorage.getItem('gemini_api_key');
                if (!key) {
                    setPendingAction(() => actionCallback); 
                    setIsApiModalOpen(true);
                } else {
                    actionCallback(key);
                }
            };

            const saveApiKeyAndExecute = () => {
                const cleanKey = tempApiKey.trim().replace(/^['"]|['"]$/g, "");
                if(cleanKey) {
                    localStorage.setItem('gemini_api_key', cleanKey);
                    setIsApiModalOpen(false);
                    if(pendingAction) {
                        pendingAction(cleanKey);
                        setPendingAction(null);
                    }
                }
            };

            const runGenerateResponses = async (currentApiKey) => {
                setIsGenerating(true);
                setErrorMsg("");
                const activePost = posts.find(p => p.id === activePostId);
                
                let categoryInstructions = "";
                switch(activePost.category) {
                    case 'Familiar': categoryInstructions = "CATEGORÍA: FAMILIAR. Las respuestas deben ser MUY CORTAS (1 a 10 palabras). Usa frases sencillas, cálidas y empáticas. Usa emojis cálidos. CERO política."; break;
                    case 'Legislativa': categoryInstructions = "CATEGORÍA: LEGISLATIVA. Respuestas más estudiadas y letradas. Utiliza argumentos respaldados en información jurídica o parlamentaria. Profesional y técnico."; break;
                    case 'Política': categoryInstructions = "CATEGORÍA: POLÍTICA. Tono FUERTE, CONTRASTANTE, FIRME y DIRECTO. Eres la voz de la oposición. Responde con alta política y contundencia, pero SIEMPRE respetuosa."; break;
                    case 'Genérica': default: categoryInstructions = "CATEGORÍA: GENÉRICA. Respuestas amables de rutina ('Totalmente de acuerdo', 'Seguiremos trabajando'). Usa emojis. No te extiendas."; break;
                }

                // Concatenar todas las estrategias activas
                const combinedStrategies = strategies.map(s => `- ${s.text}`).join('\n');

                const postContext = activePost.context?.trim() ? `\nCONTEXTO ESPECÍFICO DEL POST: ${activePost.context}` : "";
                const globalContext = combinedStrategies ? `\nLÍNEAS DISCURSIVAS / ESTRATEGIAS GLOBALES ACTIVAS (OBLIGATORIAS APLICAR SI EL TEMA SALE A COLACIÓN):\n${combinedStrategies}` : "";

                const systemPrompt = `
                    Eres el Community Manager de la Senadora Ivideliza Reyes Hernández (Nayarit). 
                    Perfil: Ex presidenta municipal de La Yesca, ex diputada, Senadora de oposición por 1ra minoría (PAN).
                    ${categoryInstructions}
                    ${postContext}
                    ${globalContext}
                    
                    Reglas:
                    1. Extrae nombre del usuario.
                    2. NUNCA inicies con "Hola [Nombre]". Facebook ya los etiqueta.
                    3. Analiza el sentimiento del comentario en una de estas 4 opciones estrictamente: 'Positivo', 'Neutro', 'Reclamo' (queja legítima ciudadana), o 'Negativo' (troll, insultos, hostilidad abierta).
                `;

                const userPrompt = `PUBLICACIÓN:\n"${activePost.text}"\n\nCOMENTARIOS:\n${newCommentsText}`;

                const payload = {
                    contents: [{ parts: [{ text: userPrompt }] }],
                    systemInstruction: { parts: [{ text: systemPrompt }] },
                    generationConfig: {
                        responseMimeType: "application/json",
                        responseSchema: {
                        type: "ARRAY",
                        items: {
                            type: "OBJECT",
                            properties: {
                            nombreUsuario: { type: "STRING" },
                            comentarioOriginal: { type: "STRING" },
                            sentimiento: { type: "STRING", description: "Debe ser: Positivo, Neutro, Reclamo, o Negativo" },
                            respuestaGenerada: { type: "STRING" }
                            },
                            required: ["nombreUsuario", "comentarioOriginal", "sentimiento", "respuestaGenerada"]
                        }
                        }
                    }
                };

                try {
                    const data = await fetchGeminiWithRetry(payload, currentApiKey);
                    const jsonText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (!jsonText) throw new Error("Asegúrate de que la API key de Gemini sea válida.");
                    
                    const generatedItems = JSON.parse(jsonText);
                    
                    for (const item of generatedItems) {
                        await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'comments'), {
                            postId: activePostId,
                            nombreUsuario: item.nombreUsuario || 'Desconocido',
                            originalComment: item.comentarioOriginal,
                            sentiment: item.sentimiento,
                            generatedResponse: item.respuestaGenerada,
                            createdAt: serverTimestamp()
                        });
                    }
                    setNewCommentsText("");
                } catch (err) {
                    console.error(err);
                    setErrorMsg("Error al generar respuestas: " + (err.message || "Revisa la API Key y el modelo de Gemini."));
                } finally { setIsGenerating(false); }
            };

            const handleGenerateResponses = () => {
                if (!newCommentsText.trim() || !activePostId || isGenerating) return;
                executeWithApiKey(runGenerateResponses);
            };

            const handleCopy = (id, text) => {
                if (copyToClipboard(text)) {
                    setCopiedId(id);
                    setTimeout(() => setCopiedId(null), 2000);
                }
            };

            // --- LÓGICA DE FECHAS (CÁLCULOS DEL MES EN CURSO) ---
            const currentMonth = new Date().getMonth();
            const currentYear = new Date().getFullYear();
            const monthNames = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
            const currentMonthName = monthNames[currentMonth];
            
            // Filtrar posteos exclusivos del mes actual
            const monthlyPosts = posts.filter(p => {
                if (!p.createdAt) return false;
                const d = p.createdAt.toDate();
                return d.getMonth() === currentMonth && d.getFullYear() === currentYear;
            });

            // Filtrar comentarios exclusivos del mes actual
            const monthlyComments = comments.filter(c => {
                if (!c.createdAt) return false;
                const d = c.createdAt.toDate();
                return d.getMonth() === currentMonth && d.getFullYear() === currentYear;
            });

            // MÉTRICAS CALCULADAS DEL MES
            let sentPos = 0, sentNeu = 0, sentNeg = 0;
            monthlyComments.forEach(c => {
                const s = c.sentiment || '';
                if (s === 'Positivo') sentPos++;
                else if (s === 'Neutro') sentNeu++;
                else sentNeg++; // Agrupa 'Reclamo', 'Negativo', 'Hostil'
            });

            // Tono Predominante del mes
            const catCounts = { Familiar: 0, Genérica: 0, Legislativa: 0, Política: 0 };
            monthlyPosts.forEach(p => { if(catCounts[p.category]!==undefined) catCounts[p.category]++; });
            let topCat = "Ninguno";
            let maxCount = 0;
            for (const [cat, count] of Object.entries(catCounts)) {
                if (count > maxCount) { maxCount = count; topCat = cat; }
            }

            // Promedio de respuestas por post (Interacción Promedio)
            const avgEngagement = monthlyPosts.length > 0 ? (monthlyComments.length / monthlyPosts.length).toFixed(1) : 0;


            const runGenerateReport = async (currentApiKey) => {
                setIsGeneratingReport(true);
                
                const catCounts = { Familiar: 0, Genérica: 0, Legislativa: 0, Política: 0 };
                monthlyPosts.forEach(p => { if(catCounts[p.category]!==undefined) catCounts[p.category]++; });
                
                const sentCounts = { Positivo: 0, Neutro: 0, Reclamo: 0, Negativo: 0 };
                monthlyComments.forEach(c => {
                    const s = c.sentiment || (c.isHostile ? 'Negativo' : 'Neutro');
                    if(sentCounts[s]!==undefined) sentCounts[s]++; 
                });

                const sampleTexts = monthlyPosts.map(p => p.text).join(" | ").substring(0, 3000);

                const prompt = `
                    Actúa como Consultor Político Estratega. Analiza el desempeño de comunicación en redes de la Senadora Ivideliza Reyes para el mes de ${currentMonthName} ${currentYear}.
                    Datos del mes:
                    - Publicaciones totales: ${monthlyPosts.length}
                    - Desglose por tipo: ${JSON.stringify(catCounts)}
                    - Comentarios totales recibidos: ${monthlyComments.length}
                    - Desglose de sentimientos: ${JSON.stringify(sentCounts)}
                    - Muestra de textos publicados: ${sampleTexts}

                    Extrae y analiza:
                    1. Cuál fue el tema más recurrente o importante.
                    2. Un análisis situacional de 1 párrafo sobre cómo se siente la temperatura ciudadana hacia ella basada en la proporción de comentarios a favor vs reclamos/negativos.
                    3. 3 propuestas de mejora o consejos prácticos para el equipo de redes.
                `;

                const payload = {
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: {
                        responseMimeType: "application/json",
                        responseSchema: {
                            type: "OBJECT",
                            properties: {
                                temaPrincipal: { type: "STRING" },
                                analisisSituacion: { type: "STRING" },
                                propuestas: { type: "ARRAY", items: { type: "STRING" } }
                            }
                        }
                    }
                };

                try {
                    const data = await fetchGeminiWithRetry(payload, currentApiKey);
                    const result = JSON.parse(data.candidates?.[0]?.content?.parts?.[0]?.text);
                    
                    // Guardar como un nuevo reporte en el historial
                    await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'ai_reports'), {
                        title: `Reporte ${currentMonthName} ${currentYear}`,
                        report: result,
                        month: currentMonth,
                        year: currentYear,
                        createdAt: serverTimestamp()
                    });
                    
                } catch (err) {
                    setErrorMsg("Error al generar el reporte de IA: " + (err.message || "Revisa la API Key y el modelo de Gemini."));
                } finally {
                    setIsGeneratingReport(false);
                }
            };

            const generateAIReport = () => {
                executeWithApiKey(runGenerateReport);
            };

            // VISTAS 
            if (authLoading) return null; // El loader HTML inicial se encarga de esto

            if (!user) {
                return (
                    <div className="flex items-center justify-center h-screen bg-gradient-to-br from-blue-50 to-slate-100 relative z-10">
                        <div className="bg-white p-10 rounded-3xl shadow-xl max-w-md w-full text-center border border-slate-200 m-4">
                            <div className="bg-blue-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6">
                                <Target className="w-10 h-10 text-blue-600" />
                            </div>
                            <h1 className="text-2xl font-black text-slate-800 mb-2">Gestor de Redes CMS</h1>
                            <p className="text-slate-500 mb-8 font-medium">Plataforma estratégica - Sen. Ivideliza Reyes</p>
                            
                            {loginError && (
                                <div className="mb-4 bg-red-50 text-red-600 p-3 rounded-lg text-sm border border-red-200 text-left">
                                    <AlertTriangle className="w-4 h-4 inline mr-2"/>
                                    {loginError}
                                </div>
                            )}

                            <button onClick={handleLogin} className="w-full flex items-center justify-center gap-3 bg-white border-2 border-slate-200 hover:bg-slate-50 hover:border-slate-300 text-slate-700 py-3 px-4 rounded-xl font-bold transition-all shadow-sm">
                                <svg className="w-5 h-5" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/><path fill="none" d="M1 1h22v22H1z"/></svg>
                                Ingresar con Google
                            </button>
                        </div>
                    </div>
                );
            }

            const activePost = posts.find(p => p.id === activePostId);
            const activeComments = comments.filter(c => c.postId === activePostId);

            return (
                <div className="flex h-screen overflow-hidden relative bg-slate-50 z-10">
                    
                    {/* SIDEBAR */}
                    {isSidebarOpen && <div className="fixed inset-0 bg-black/20 z-40 lg:hidden" onClick={() => setIsSidebarOpen(false)} />}
                    <aside className={`fixed lg:static inset-y-0 left-0 w-80 bg-white border-r border-slate-200 z-50 transform transition-transform duration-300 flex flex-col ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'}`}>
                        <div className="p-4 border-b border-slate-200 bg-blue-50/50">
                        <h2 className="text-blue-800 font-bold text-lg flex items-center gap-2"><History className="w-5 h-5" /> Historial</h2>
                        </div>
                        <div className="flex-1 overflow-y-auto p-4 space-y-3">
                        <button onClick={() => { setActivePostId(null); setCurrentView('manager'); setIsSidebarOpen(false); }} className={`w-full flex items-center justify-center gap-2 p-3 rounded-xl border-2 border-dashed font-medium transition-colors ${!activePostId && currentView === 'manager' ? 'border-blue-500 text-blue-600 bg-blue-50' : 'border-slate-300 text-slate-600 hover:border-blue-400 hover:bg-blue-50'}`}>
                            <Plus className="w-5 h-5" /> Nueva Publicación
                        </button>
                        <div className="pt-4 space-y-2">
                            {posts.map(post => (
                            <button key={post.id} onClick={() => { setActivePostId(post.id); setCurrentView('manager'); setIsSidebarOpen(false); }} className={`w-full text-left p-3 rounded-lg border transition-all ${activePostId === post.id && currentView === 'manager' ? 'border-blue-500 bg-blue-50 shadow-sm' : 'border-slate-200 hover:border-slate-300 bg-white'}`}>
                                <p className="text-sm line-clamp-2 text-slate-700">{post.text}</p>
                                <div className="text-[10px] text-slate-400 mt-2 flex justify-between">
                                <span className="font-semibold text-slate-500">{post.category}</span>
                                <span>{comments.filter(c => c.postId === post.id).length} resp.</span>
                                </div>
                            </button>
                            ))}
                        </div>
                        </div>
                    </aside>

                    {/* MAIN CONTENT */}
                    <main className="flex-1 flex flex-col h-full overflow-hidden relative">
                        <header className="bg-white border-b border-slate-200 p-4 flex items-center justify-between z-10 shrink-0">
                        <div className="flex items-center gap-4">
                            <button onClick={() => setIsSidebarOpen(true)} className="p-2 -ml-2 text-slate-500 lg:hidden rounded-lg hover:bg-slate-100"><Menu className="w-6 h-6" /></button>
                            <div className="hidden md:flex bg-slate-100 p-1 rounded-lg">
                            <button onClick={() => setCurrentView('manager')} className={`px-4 py-2 rounded-md text-sm font-bold flex items-center gap-2 transition-all ${currentView === 'manager' ? 'bg-white shadow-sm text-blue-700' : 'text-slate-500 hover:text-slate-700'}`}>
                                <MessageSquare className="w-4 h-4" /> Gestión
                            </button>
                            <button onClick={() => setCurrentView('analysis')} className={`px-4 py-2 rounded-md text-sm font-bold flex items-center gap-2 transition-all ${currentView === 'analysis' ? 'bg-white shadow-sm text-blue-700' : 'text-slate-500 hover:text-slate-700'}`}>
                                <BarChart3 className="w-4 h-4" /> Estrategia
                            </button>
                            </div>
                        </div>
                        <div className="flex items-center gap-4">
                            <h1 className="text-lg font-bold text-slate-800 hidden md:block">Sen. Ivideliza Reyes</h1>
                            <div className="flex items-center gap-2">
                                <img src={user.photoURL || "https://ui-avatars.com/api/?name=User"} className="w-8 h-8 rounded-full border border-slate-200" />
                                <button onClick={handleLogout} className="text-slate-400 hover:text-red-500 p-1 rounded-md transition-colors" title="Cerrar sesión"><LogOut className="w-5 h-5"/></button>
                            </div>
                        </div>
                        </header>

                        {/* MOBILE TABS */}
                        <div className="md:hidden flex bg-white border-b border-slate-200 shrink-0">
                        <button onClick={() => setCurrentView('manager')} className={`flex-1 py-3 text-sm font-bold text-center border-b-2 ${currentView === 'manager' ? 'border-blue-600 text-blue-700' : 'border-transparent text-slate-500'}`}>Gestión</button>
                        <button onClick={() => setCurrentView('analysis')} className={`flex-1 py-3 text-sm font-bold text-center border-b-2 ${currentView === 'analysis' ? 'border-blue-600 text-blue-700' : 'border-transparent text-slate-500'}`}>Estrategia</button>
                        </div>

                        {errorMsg && <div className="bg-red-50 text-red-600 p-3 text-sm text-center border-b border-red-100 flex justify-center items-center gap-2">
                            <AlertTriangle className="w-4 h-4"/> {errorMsg}
                        </div>}

                        <div className="flex-1 overflow-y-auto">
                        
                        {/* VISTA 1: GESTOR */}
                        {currentView === 'manager' && (
                            <div className="p-4 md:p-6 max-w-4xl mx-auto space-y-6">
                            {!activePostId ? (
                                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
                                <div className="flex items-center gap-3 mb-4 text-blue-700">
                                    <MessageSquare className="w-6 h-6" />
                                    <h2 className="text-lg font-semibold">1. Pega la publicación original</h2>
                                </div>
                                <textarea value={newPostText} onChange={(e) => setNewPostText(e.target.value)} placeholder="Ej: Seguimos trabajando por Nayarit..." className="w-full h-40 p-4 rounded-xl border border-slate-300 focus:border-blue-500 outline-none resize-none text-slate-700" />
                                <div className="mt-4 flex justify-end">
                                    <button onClick={createNewPost} disabled={!newPostText.trim()} className="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl font-medium disabled:opacity-50">Guardar <ChevronRight className="w-5 h-5" /></button>
                                </div>
                                </div>
                            ) : (
                                <div className="space-y-6">
                                <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 relative">
                                    <div className="absolute left-0 top-0 bottom-0 w-1 bg-blue-500"></div>
                                    <div className="flex justify-between items-start mb-2">
                                    <h3 className="text-xs font-bold text-slate-400 uppercase tracking-wider">Publicación Original</h3>
                                    <button onClick={openContextModal} className="text-xs bg-slate-100 hover:bg-slate-200 text-slate-600 px-3 py-1.5 rounded-lg font-medium flex items-center gap-1 border border-slate-200">
                                        <Settings className="w-3 h-3" /> {activePost?.context ? 'Contexto Activo' : '+ Contexto Específico'}
                                    </button>
                                    </div>
                                    <p className="text-slate-600 text-sm whitespace-pre-wrap">{activePost?.text}</p>
                                    
                                    <div className="mt-5 border-t border-slate-100 pt-4">
                                    <p className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">Tono de Respuestas (Categoría)</p>
                                    <div className="grid grid-cols-2 md:grid-cols-4 gap-2">
                                        {[
                                        { name: 'Familiar', icon: Users, color: 'text-pink-600', bg: 'bg-pink-50', border: 'border-pink-200' },
                                        { name: 'Genérica', icon: FileText, color: 'text-slate-600', bg: 'bg-slate-50', border: 'border-slate-200' },
                                        { name: 'Legislativa', icon: BookOpen, color: 'text-indigo-600', bg: 'bg-indigo-50', border: 'border-indigo-200' },
                                        { name: 'Política', icon: Megaphone, color: 'text-orange-600', bg: 'bg-orange-50', border: 'border-orange-200' }
                                        ].map(cat => {
                                        const isActive = (activePost?.category || 'Genérica') === cat.name;
                                        return (
                                            <button key={cat.name} onClick={() => updatePostCategory(activePost.id, cat.name)} className={`p-2 rounded-xl text-xs font-bold flex flex-col items-center gap-1 border-2 transition-all ${isActive ? `${cat.bg} ${cat.color} ${cat.border} shadow-sm scale-105` : 'bg-white text-slate-400 border-slate-100 hover:bg-slate-50'}`}>
                                            <cat.icon className="w-4 h-4" /> {cat.name}
                                            </button>
                                        );
                                        })}
                                    </div>
                                    </div>
                                </div>

                                {globalStrategy && (
                                    <div className="bg-purple-50 border border-purple-200 rounded-xl p-3 flex items-start gap-3">
                                    <Target className="w-5 h-5 text-purple-600 shrink-0 mt-0.5" />
                                    <div>
                                        <p className="text-xs font-bold text-purple-800 uppercase">Estrategia Global Activa</p>
                                        <p className="text-sm text-purple-900 mt-1">{globalStrategy}</p>
                                    </div>
                                    </div>
                                )}

                                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-5">
                                    <h3 className="text-sm font-bold text-slate-700 mb-2">2. Pega los comentarios de Facebook</h3>
                                    <textarea value={newCommentsText} onChange={(e) => setNewCommentsText(e.target.value)} placeholder="Pega los comentarios copiados..." className="w-full h-32 p-3 rounded-lg border border-slate-300 focus:border-blue-500 outline-none resize-none text-sm mb-3" />
                                    <button onClick={handleGenerateResponses} disabled={!newCommentsText.trim() || isGenerating} className="w-full flex items-center justify-center gap-2 bg-slate-800 hover:bg-slate-900 disabled:opacity-50 text-white py-3 rounded-xl font-bold">
                                    {isGenerating ? "Redactando..." : <><Send className="w-5 h-5" /> Generar Respuestas</>}
                                    </button>
                                </div>

                                <div className="space-y-4">
                                    {activeComments.map((comment) => {
                                    const isNegative = comment.sentiment === 'Negativo' || comment.sentiment === 'Reclamo' || comment.isHostile;
                                    return (
                                        <div key={comment.id} className={`bg-white rounded-2xl shadow-sm border-2 overflow-hidden flex flex-col md:flex-row ${isNegative ? 'border-red-300' : 'border-slate-200'}`}>
                                        <div className="p-4 md:w-2/3 border-b md:border-b-0 md:border-r border-slate-100 flex flex-col space-y-3">
                                            <div className="flex justify-between items-start">
                                            <span className="font-bold text-sm flex items-center gap-2"><User className="w-4 h-4 text-slate-400"/> {comment.nombreUsuario}</span>
                                            <span className={`text-[10px] font-bold uppercase px-2 py-1 rounded-md ${isNegative ? 'bg-red-100 text-red-700' : comment.sentiment === 'Positivo' ? 'bg-green-100 text-green-700' : 'bg-slate-100 text-slate-600'}`}>
                                                {comment.sentiment || (comment.isHostile ? 'Hostil' : 'Neutro')}
                                            </span>
                                            </div>
                                            <div className="bg-slate-50 p-2 rounded border border-slate-100 text-sm text-slate-600 italic">"{comment.originalComment}"</div>
                                            <div className="text-base text-slate-800">{comment.generatedResponse}</div>
                                        </div>
                                        <div className="p-4 md:w-1/3 bg-slate-50 flex items-center justify-center">
                                            <button onClick={() => handleCopy(comment.id, comment.generatedResponse)} className={`w-full py-4 rounded-xl font-bold flex items-center justify-center gap-2 ${copiedId === comment.id ? 'bg-green-100 text-green-700 border border-green-200' : 'bg-white text-blue-600 border-2 border-blue-100 hover:bg-blue-50'}`}>
                                            {copiedId === comment.id ? <><CheckCircle2 className="w-5 h-5"/> Copiado</> : <><Copy className="w-5 h-5"/> Copiar</>}
                                            </button>
                                        </div>
                                        </div>
                                    )
                                    })}
                                </div>
                                </div>
                            )}
                            </div>
                        )}

                        {/* VISTA 2: ANÁLISIS Y ESTRATEGIA (RECONSTRUIDA PARA HISTORIALES) */}
                        {currentView === 'analysis' && (
                            <div className="p-4 md:p-6 max-w-5xl mx-auto space-y-6">
                            
                            {/* CAJA DE NUEVA ESTRATEGIA */}
                            <div className="bg-white rounded-2xl shadow-sm border-2 border-purple-100 overflow-hidden">
                                <div className="bg-purple-50 p-4 border-b border-purple-100 flex items-center gap-3">
                                <Target className="w-6 h-6 text-purple-700" />
                                <div>
                                    <h2 className="font-bold text-purple-900 text-lg">Nueva Instrucción / Línea Discursiva</h2>
                                </div>
                                </div>
                                <div className="p-5">
                                <textarea value={newStrategyText} onChange={(e) => setNewStrategyText(e.target.value)} placeholder="Ej: Siempre contestar en primera persona..." className="w-full h-20 p-4 rounded-xl border border-slate-300 focus:border-purple-500 outline-none resize-none text-slate-700" />
                                
                                <div className="mt-3 flex justify-between items-center">
                                    <div className="text-sm font-medium text-green-600 flex items-center gap-1 min-h-[24px]">
                                        {strategySuccessMsg && <><Check className="w-4 h-4"/> {strategySuccessMsg}</>}
                                    </div>
                                    <button onClick={saveNewStrategy} disabled={isSavingStrategy || !newStrategyText.trim()} className="bg-purple-600 hover:bg-purple-700 text-white px-6 py-2 rounded-xl font-bold disabled:opacity-50 transition-colors">
                                    {isSavingStrategy ? "Guardando..." : "Agregar a la lista"}
                                    </button>
                                </div>
                                </div>
                            </div>

                            {/* HISTORIAL DE ESTRATEGIAS ACTIVAS */}
                            {strategies.length > 0 && (
                                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                                    <div className="bg-slate-50 p-3 border-b border-slate-100">
                                        <h3 className="font-bold text-slate-700 text-sm flex items-center gap-2"><Target className="w-4 h-4 text-purple-500"/> Manual de Instrucciones Activas</h3>
                                    </div>
                                    <div className="p-4 space-y-3">
                                        {strategies.map((strategy, index) => (
                                            <div key={strategy.id} className="p-3 bg-purple-50/50 border border-purple-100 rounded-lg flex gap-3 group relative">
                                                <div className="text-purple-400 font-bold text-sm mt-0.5">{index + 1}.</div>
                                                <div className="flex-1">
                                                    {editingStrategyId === strategy.id ? (
                                                        <div className="flex flex-col gap-2">
                                                            <textarea value={editingStrategyText} onChange={(e) => setEditingStrategyText(e.target.value)} className="w-full p-2 border border-purple-300 rounded-md focus:outline-none text-sm" rows="3" />
                                                            <div className="flex justify-end gap-2">
                                                                <button onClick={() => setEditingStrategyId(null)} className="px-3 py-1 text-xs text-slate-500 hover:bg-slate-200 rounded">Cancelar</button>
                                                                <button onClick={saveEditedStrategy} className="px-3 py-1 text-xs bg-purple-600 text-white rounded font-bold">Guardar</button>
                                                            </div>
                                                        </div>
                                                    ) : (
                                                        <p className="text-slate-700 text-sm whitespace-pre-wrap">{strategy.text}</p>
                                                    )}
                                                </div>
                                                
                                                {/* Botones de acción (visibles en hover o móviles) */}
                                                {!editingStrategyId && (
                                                <div className="absolute top-2 right-2 opacity-0 group-hover:opacity-100 md:opacity-0 flex gap-1 bg-white shadow-sm border border-slate-200 rounded-md p-1 transition-opacity">
                                                    <button onClick={() => startEditingStrategy(strategy)} className="p-1.5 text-slate-400 hover:text-blue-500 rounded" title="Editar"><Edit2 className="w-4 h-4"/></button>
                                                    <button onClick={() => deleteStrategy(strategy.id)} className="p-1.5 text-slate-400 hover:text-red-500 rounded" title="Eliminar"><Trash2 className="w-4 h-4"/></button>
                                                </div>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* SECCIÓN DE ESTADÍSTICAS Y REPORTES */}
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                
                                {/* BLOQUE DE ESTADÍSTICAS POR MES Y MÉTRICAS DE VALOR */}
                                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-5">
                                    <h3 className="font-bold text-slate-800 flex items-center gap-2 mb-4">
                                        <BarChart3 className="w-5 h-5 text-blue-500"/> Estadísticas de {currentMonthName}
                                    </h3>
                                    
                                    <div className="grid grid-cols-2 gap-4 mb-5">
                                        <div className="bg-blue-50 rounded-xl p-4 text-center border border-blue-100 flex flex-col items-center justify-center">
                                            <FileText className="w-5 h-5 text-blue-400 mb-1" />
                                            <p className="text-3xl font-black text-blue-700">{monthlyPosts.length}</p>
                                            <p className="text-[10px] font-bold text-blue-600 uppercase mt-1">Posteos</p>
                                        </div>
                                        <div className="bg-slate-50 rounded-xl p-4 text-center border border-slate-200 flex flex-col items-center justify-center">
                                            <MessageCircle className="w-5 h-5 text-slate-400 mb-1" />
                                            <p className="text-3xl font-black text-slate-700">{monthlyComments.length}</p>
                                            <p className="text-[10px] font-bold text-slate-600 uppercase mt-1">Comentarios</p>
                                        </div>
                                    </div>

                                    <p className="text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-3">Sentimiento Ciudadano</p>
                                    <div className="grid grid-cols-3 gap-3 mb-5">
                                        <div className="bg-emerald-50 rounded-xl p-3 flex flex-col items-center border border-emerald-100">
                                            <Smile className="w-5 h-5 text-emerald-500 mb-1" />
                                            <p className="text-xl font-black text-emerald-600">{sentPos}</p>
                                            <p className="text-[9px] font-bold text-emerald-700 uppercase mt-1">Positivos</p>
                                        </div>
                                        <div className="bg-slate-50 rounded-xl p-3 flex flex-col items-center border border-slate-200">
                                            <Meh className="w-5 h-5 text-slate-400 mb-1" />
                                            <p className="text-xl font-black text-slate-600">{sentNeu}</p>
                                            <p className="text-[9px] font-bold text-slate-600 uppercase mt-1">Neutrales</p>
                                        </div>
                                        <div className="bg-rose-50 rounded-xl p-3 flex flex-col items-center border border-rose-100">
                                            <Frown className="w-5 h-5 text-rose-500 mb-1" />
                                            <p className="text-xl font-black text-rose-600">{sentNeg}</p>
                                            <p className="text-[9px] font-bold text-rose-700 uppercase mt-1">Negativos</p>
                                        </div>
                                    </div>

                                    <p className="text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-3">Métricas de Valor</p>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                        <div className="bg-indigo-50 rounded-xl p-3 border border-indigo-100 flex items-center justify-between">
                                            <div>
                                                <p className="text-[10px] font-bold text-indigo-500 uppercase">Tono Predominante</p>
                                                <p className="text-sm font-bold text-indigo-700">{topCat}</p>
                                            </div>
                                            <Megaphone className="w-5 h-5 text-indigo-300" />
                                        </div>
                                        <div className="bg-amber-50 rounded-xl p-3 border border-amber-100 flex items-center justify-between">
                                            <div>
                                                <p className="text-[10px] font-bold text-amber-500 uppercase">Interacción Prom.</p>
                                                <p className="text-sm font-bold text-amber-700">{avgEngagement} <span className="text-[10px]">resp/post</span></p>
                                            </div>
                                            <TrendingUp className="w-5 h-5 text-amber-300" />
                                        </div>
                                    </div>
                                </div>

                                {/* ARCHIVERO DE REPORTES IA */}
                                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 flex flex-col h-full max-h-[500px]">
                                    <div className="p-4 border-b border-slate-100 flex justify-between items-center bg-slate-50 rounded-t-xl shrink-0">
                                        <h3 className="font-bold text-slate-800 flex items-center gap-2"><Lightbulb className="w-5 h-5 text-amber-500"/> Consultorías IA</h3>
                                        <button onClick={generateAIReport} disabled={isGeneratingReport || monthlyPosts.length === 0} className="bg-slate-800 hover:bg-slate-900 text-white text-xs px-3 py-1.5 rounded-lg font-bold disabled:opacity-50 transition-colors flex items-center gap-1">
                                        {isGeneratingReport ? "Analizando..." : <><Plus className="w-3 h-3"/> Nuevo Reporte</>}
                                        </button>
                                    </div>
                                    <div className="p-3 flex-1 overflow-y-auto space-y-2">
                                        {aiReports.length === 0 ? (
                                        <p className="text-sm text-slate-400 text-center mt-10">Aún no hay reportes generados. Genera uno al finalizar el mes.</p>
                                        ) : (
                                            aiReports.map((rep, index) => (
                                                <button key={rep.id} onClick={() => setViewingReport(rep)} className="w-full text-left p-4 rounded-xl border border-slate-200 hover:border-amber-300 hover:bg-amber-50 transition-all flex items-center gap-3">
                                                    <div className="bg-white p-2 rounded-lg border border-slate-100 shadow-sm"><FileClock className="w-5 h-5 text-amber-600"/></div>
                                                    <div>
                                                        <p className="font-bold text-slate-700 text-sm">{rep.title || `Reporte 0${index + 1}`}</p>
                                                        <p className="text-xs text-slate-400">{rep.createdAt?.toDate().toLocaleDateString() || 'Generado recientemente'}</p>
                                                    </div>
                                                    <ChevronRight className="w-4 h-4 text-slate-300 ml-auto" />
                                                </button>
                                            ))
                                        )}
                                    </div>
                                </div>
                            </div>
                            </div>
                        )}
                        </div>
                    </main>

                    {/* MODAL PARA VER REPORTE IA */}
                    {viewingReport && (
                        <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-white rounded-2xl shadow-xl w-full max-w-2xl max-h-[90vh] flex flex-col overflow-hidden animate-in zoom-in duration-200">
                                <div className="p-4 border-b flex justify-between items-center bg-amber-50">
                                    <h2 className="font-bold text-amber-900 flex items-center gap-2"><Lightbulb className="w-5 h-5 text-amber-600" /> {viewingReport.title || 'Reporte de Consultoría'}</h2>
                                    <button onClick={() => setViewingReport(null)} className="p-1 hover:bg-amber-100 rounded-lg transition-colors"><X className="w-6 h-6 text-amber-700" /></button>
                                </div>
                                <div className="p-6 overflow-y-auto space-y-6">
                                    <div className="bg-blue-50/50 p-4 rounded-xl border border-blue-100">
                                        <p className="text-[10px] font-bold text-blue-600 uppercase mb-1">Tema Principal del Periodo</p>
                                        <p className="text-lg font-black text-slate-800 leading-tight">{viewingReport.report.temaPrincipal}</p>
                                    </div>
                                    <div>
                                        <p className="text-[10px] font-bold text-slate-400 uppercase mb-2">Diagnóstico Situacional</p>
                                        <p className="text-sm text-slate-600 bg-slate-50 p-4 rounded-xl border border-slate-200 leading-relaxed">{viewingReport.report.analisisSituacion}</p>
                                    </div>
                                    <div>
                                        <p className="text-[10px] font-bold text-slate-400 uppercase mb-3">Propuestas de Mejora</p>
                                        <ul className="space-y-3">
                                            {viewingReport.report.propuestas.map((propuesta, idx) => (
                                                <li key={idx} className="flex gap-3 text-sm text-slate-700">
                                                    <span className="text-amber-500 mt-0.5"><CheckCircle2 className="w-4 h-4" /></span>
                                                    <span>{propuesta}</span>
                                                </li>
                                            ))}
                                        </ul>
                                    </div>
                                </div>
                                <div className="p-4 border-t bg-slate-50 flex justify-end">
                                    <button onClick={() => setViewingReport(null)} className="px-6 py-2 bg-slate-800 hover:bg-slate-900 text-white rounded-lg font-bold">Cerrar Reporte</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL DE CONTEXTO ESPECÍFICO */}
                    {isContextModalOpen && (
                        <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
                        <div className="bg-white rounded-2xl shadow-xl w-full max-w-lg overflow-hidden">
                            <div className="p-4 border-b flex justify-between bg-slate-50">
                            <h2 className="font-bold flex items-center gap-2"><Settings className="w-5 h-5 text-slate-500" /> Contexto Específico</h2>
                            <button onClick={() => setIsContextModalOpen(false)}><X className="w-6 h-6 text-slate-400" /></button>
                            </div>
                            <div className="p-6">
                            <textarea value={tempContextText} onChange={(e) => setTempContextText(e.target.value)} placeholder="Contexto para este post en particular..." className="w-full h-32 p-4 rounded-xl border border-slate-300 outline-none resize-none" />
                            </div>
                            <div className="p-4 border-t bg-slate-50 flex justify-end gap-3">
                            <button onClick={() => setIsContextModalOpen(false)} className="px-4 py-2 text-slate-600">Cancelar</button>
                            <button onClick={savePostContext} className="px-6 py-2 bg-blue-600 text-white rounded-lg font-bold">Guardar</button>
                            </div>
                        </div>
                        </div>
                    )}

                    {/* MODAL PARA SOLICITAR API KEY */}
                    {isApiModalOpen && (
                        <div className="fixed inset-0 bg-black/60 z-[60] flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden animate-in fade-in zoom-in duration-200">
                                <div className="bg-blue-600 p-6 text-center">
                                    <div className="bg-white/20 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                                        <Key className="w-8 h-8 text-white" />
                                    </div>
                                    <h2 className="text-xl font-bold text-white">Configurar Gemini API Key</h2>
                                    <p className="text-blue-100 text-sm mt-2">Por seguridad, la llave se guarda de forma local en tu navegador y no en servidores públicos.</p>
                                </div>
                                <div className="p-6">
                                    <label className="block text-sm font-bold text-slate-700 mb-2">Ingresa tu API Key:</label>
                                    <input 
                                        type="password" 
                                        value={tempApiKey} 
                                        onChange={(e) => setTempApiKey(e.target.value)} 
                                        placeholder="AIzaSyA..." 
                                        className="w-full p-4 rounded-xl border-2 border-slate-200 focus:border-blue-500 outline-none text-slate-800 font-mono transition-colors"
                                    />
                                    <div className="mt-6 flex justify-end gap-3">
                                        <button onClick={() => { setIsApiModalOpen(false); setPendingAction(null); }} className="px-5 py-3 text-slate-500 font-medium hover:bg-slate-100 rounded-xl transition-colors">Cancelar</button>
                                        <button onClick={saveApiKeyAndExecute} disabled={!tempApiKey.trim()} className="px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold disabled:opacity-50 transition-colors shadow-md">Guardar y Continuar</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // Se usa try-catch para atrapar cualquier error antes de que quede la pantalla blanca
        try {
            const root = createRoot(document.getElementById('root'));
            root.render(<App />);
        } catch (error) {
            console.error(error);
            document.getElementById('root').innerHTML = '<div style="padding:20px; color:red; font-family:sans-serif; text-align:center;"><b>Error crítico al renderizar:</b><br><br>' + error.message + '</div>';
        }
    </script>
</body>
</html>
