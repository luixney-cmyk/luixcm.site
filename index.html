                            <div className="p-4 md:p-6 max-w-5xl mx-auto space-y-6">
                            <div className="bg-white rounded-2xl shadow-sm border-2 border-purple-100 overflow-hidden">
                                <div className="bg-purple-50 p-4 border-b border-purple-100 flex items-center gap-3">
                                <Target className="w-6 h-6 text-purple-700" />
                                <div>
                                    <h2 className="font-bold text-purple-900 text-lg">Estrategia Global (Aplica a todo)</h2>
                                    <p className="text-xs text-purple-700">Líneas discursivas que Gemini considerará en todas las respuestas.</p>
                                </div>
                                </div>
                                <div className="p-5">
                                <textarea value={newStrategyText} onChange={(e) => setNewStrategyText(e.target.value)} placeholder="Ej: Siempre hablar de los foros ciudadanos..." className="w-full h-20 p-4 rounded-xl border border-slate-300 focus:border-purple-500 outline-none resize-none text-slate-700" />
                                
                                <div className="mt-3 flex justify-between items-center">
                                    <div className="text-sm font-medium text-green-600 flex items-center gap-1 min-h-[24px]">
                                        {strategySuccessMsg && <><Check className="w-4 h-4"/> {strategySuccessMsg}</>}
                                    </div>
                                    <button onClick={saveNewStrategy} disabled={isSavingStrategy || !newStrategyText.trim()} className="bg-purple-600 hover:bg-purple-700 text-white px-6 py-2 rounded-xl font-bold disabled:opacity-50 transition-colors">
                                    {isSavingStrategy ? "Guardando..." : "Agregar a la lista"}
                                    </button>
                                </div>
                                </div>
                            </div>

                            {strategies.length > 0 && (
                                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                                    <div className="bg-slate-50 p-3 border-b border-slate-100">
                                        <h3 className="font-bold text-slate-700 text-sm flex items-center gap-2"><Target className="w-4 h-4 text-purple-500"/> Manual de Instrucciones Activas</h3>
                                    </div>
                                    <div className="p-4 space-y-3">
                                        {strategies.map((strategy, index) => (
                                            <div key={strategy.id} className="p-3 bg-purple-50/50 border border-purple-100 rounded-lg flex gap-3 group relative">
                                                <div className="text-purple-400 font-bold text-sm mt-0.5">{index + 1}.</div>
                                                <div className="flex-1">
                                                    {editingStrategyId === strategy.id ? (
                                                        <div className="flex flex-col gap-2">
                                                            <textarea value={editingStrategyText} onChange={(e) => setEditingStrategyText(e.target.value)} className="w-full p-2 border border-purple-300 rounded-md focus:outline-none text-sm" rows="3" />
                                                            <div className="flex justify-end gap-2">
                                                                <button onClick={() => setEditingStrategyId(null)} className="px-3 py-1 text-xs text-slate-500 hover:bg-slate-200 rounded">Cancelar</button>
                                                                <button onClick={saveEditedStrategy} className="px-3 py-1 text-xs bg-purple-600 text-white rounded font-bold">Guardar</button>
                                                            </div>
                                                        </div>
                                                    ) : (
                                                        <p className="text-slate-700 text-sm whitespace-pre-wrap">{strategy.text}</p>
                                                    )}
                                                </div>
                                                
                                                {!editingStrategyId && (
                                                <div className="absolute top-2 right-2 opacity-0 group-hover:opacity-100 md:opacity-0 flex gap-1 bg-white shadow-sm border border-slate-200 rounded-md p-1 transition-opacity">
                                                    <button onClick={() => startEditingStrategy(strategy)} className="p-1.5 text-slate-400 hover:text-blue-500 rounded" title="Editar"><Edit2 className="w-4 h-4"/></button>
                                                    <button onClick={() => deleteStrategy(strategy.id)} className="p-1.5 text-slate-400 hover:text-red-500 rounded" title="Eliminar"><Trash2 className="w-4 h-4"/></button>
                                                </div>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                
                                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-5">
                                    <h3 className="font-bold text-slate-800 flex items-center gap-2 mb-4">
                                        <BarChart3 className="w-5 h-5 text-blue-500"/> Estadísticas de {currentMonthName}
                                    </h3>
                                    
                                    <div className="grid grid-cols-2 gap-4 mb-5">
                                        <div className="bg-blue-50 rounded-xl p-4 text-center border border-blue-100 flex flex-col items-center justify-center">
                                            <FileText className="w-5 h-5 text-blue-400 mb-1" />
                                            <p className="text-3xl font-black text-blue-700">{monthlyPosts.length}</p>
                                            <p className="text-[10px] font-bold text-blue-600 uppercase mt-1">Posteos</p>
                                        </div>
                                        <div className="bg-slate-50 rounded-xl p-4 text-center border border-slate-200 flex flex-col items-center justify-center">
                                            <MessageCircle className="w-5 h-5 text-slate-400 mb-1" />
                                            <p className="text-3xl font-black text-slate-700">{monthlyComments.length}</p>
                                            <p className="text-[10px] font-bold text-slate-600 uppercase mt-1">Comentarios Analizados</p>
                                        </div>
                                    </div>

                                    <p className="text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-3 border-b pb-1">Desglose de Sentimientos</p>
                                    <div className="grid grid-cols-3 gap-3 mb-5">
                                        <div className="bg-green-50 rounded-xl p-3 flex flex-col items-center border border-green-100">
                                            <p className="text-xl font-black text-green-600">{sentPos}</p>
                                            <p className="text-[9px] font-bold text-green-700 uppercase mt-1 text-center leading-tight">Positivo</p>
                                        </div>
                                        <div className="bg-slate-50 rounded-xl p-3 flex flex-col items-center border border-slate-200">
                                            <p className="text-xl font-black text-slate-600">{sentNeu}</p>
                                            <p className="text-[9px] font-bold text-slate-600 uppercase mt-1 text-center leading-tight">Neutro</p>
                                        </div>
                                        <div className="bg-amber-50 rounded-xl p-3 flex flex-col items-center border border-amber-100">
                                            <p className="text-xl font-black text-amber-600">{sentRec}</p>
                                            <p className="text-[9px] font-bold text-amber-700 uppercase mt-1 text-center leading-tight">Reclamo</p>
                                        </div>
                                        <div className="bg-orange-50 rounded-xl p-3 flex flex-col items-center border border-orange-100">
                                            <p className="text-xl font-black text-orange-600">{sentCrit}</p>
                                            <p className="text-[9px] font-bold text-orange-700 uppercase mt-1 text-center leading-tight">Crítica Externa</p>
                                        </div>
                                        <div className="bg-red-50 rounded-xl p-3 flex flex-col items-center border border-red-100">
                                            <p className="text-xl font-black text-red-600">{sentNeg}</p>
                                            <p className="text-[9px] font-bold text-red-700 uppercase mt-1 text-center leading-tight">Negativo / Ataque</p>
                                        </div>
                                        <div className="bg-red-100 rounded-xl p-3 flex flex-col items-center border border-red-300">
                                            <p className="text-xl font-black text-red-800">{sentEsc}</p>
                                            <p className="text-[9px] font-bold text-red-900 uppercase mt-1 text-center leading-tight">Escalar</p>
                                        </div>
                                    </div>

                                    <p className="text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-3">Enfoque Predominante</p>
                                    <div className="bg-indigo-50 rounded-xl p-3 border border-indigo-100 flex items-center justify-between">
                                        <div>
                                            <p className="text-[10px] font-bold text-indigo-500 uppercase">Más usado</p>
                                            <p className="text-sm font-bold text-indigo-700">{topCat}</p>
                                        </div>
                                        <Megaphone className="w-5 h-5 text-indigo-300" />
                                    </div>
                                </div>

                                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 flex flex-col h-full max-h-[600px]">
                                    <div className="p-4 border-b border-slate-100 flex justify-between items-center bg-slate-50 rounded-t-xl shrink-0">
                                        <h3 className="font-bold text-slate-800 flex items-center gap-2"><Lightbulb className="w-5 h-5 text-amber-500"/> Consultorías IA</h3>
                                        <button onClick={generateAIReport} disabled={isGeneratingReport || monthlyPosts.length === 0} className="bg-slate-800 hover:bg-slate-900 text-white text-xs px-3 py-1.5 rounded-lg font-bold disabled:opacity-50 transition-colors flex items-center gap-1">
                                        {isGeneratingReport ? "Analizando..." : <><Plus className="w-3 h-3"/> Nuevo Reporte</>}
                                        </button>
                                    </div>
                                    <div className="p-3 flex-1 overflow-y-auto space-y-2">
                                        {aiReports.length === 0 ? (
                                        <p className="text-sm text-slate-400 text-center mt-10">Aún no hay reportes generados. Genera uno al finalizar el mes.</p>
                                        ) : (
                                            aiReports.map((rep, index) => (
                                                <button key={rep.id} onClick={() => setViewingReport(rep)} className="w-full text-left p-4 rounded-xl border border-slate-200 hover:border-amber-300 hover:bg-amber-50 transition-all flex items-center gap-3">
                                                    <div className="bg-white p-2 rounded-lg border border-slate-100 shadow-sm"><FileClock className="w-5 h-5 text-amber-600"/></div>
                                                    <div>
                                                        <p className="font-bold text-slate-700 text-sm">{rep.title || `Reporte 0${index + 1}`}</p>
                                                        <p className="text-xs text-slate-400">{rep.createdAt?.toDate().toLocaleDateString() || 'Generado recientemente'}</p>
                                                    </div>
                                                    <ChevronRight className="w-4 h-4 text-slate-300 ml-auto" />
                                                </button>
                                            ))
                                        )}
                                    </div>
                                </div>
                            </div>
                            </div>
                        )}
                        </div>
                    </main>

                    {/* MODAL PARA VER REPORTE IA */}
                    {viewingReport && (
                        <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-white rounded-2xl shadow-xl w-full max-w-2xl max-h-[90vh] flex flex-col overflow-hidden animate-in zoom-in duration-200">
                                <div className="p-4 border-b flex justify-between items-center bg-amber-50">
                                    <h2 className="font-bold text-amber-900 flex items-center gap-2"><Lightbulb className="w-5 h-5 text-amber-600" /> {viewingReport.title || 'Reporte de Consultoría'}</h2>
                                    <button onClick={() => setViewingReport(null)} className="p-1 hover:bg-amber-100 rounded-lg transition-colors"><X className="w-6 h-6 text-amber-700" /></button>
                                </div>
                                <div className="p-6 overflow-y-auto space-y-6">
                                    <div className="bg-blue-50/50 p-4 rounded-xl border border-blue-100">
                                        <p className="text-[10px] font-bold text-blue-600 uppercase mb-1">Tema Principal del Periodo</p>
                                        <p className="text-lg font-black text-slate-800 leading-tight">{viewingReport.report?.temaPrincipal}</p>
                                    </div>
                                    <div>
                                        <p className="text-[10px] font-bold text-slate-400 uppercase mb-2">Diagnóstico Situacional</p>
                                        <p className="text-sm text-slate-600 bg-slate-50 p-4 rounded-xl border border-slate-200 leading-relaxed">{viewingReport.report?.analisisSituacion}</p>
                                    </div>
                                    <div>
                                        <p className="text-[10px] font-bold text-slate-400 uppercase mb-3">Propuestas de Mejora</p>
                                        <ul className="space-y-3">
                                            {viewingReport.report?.propuestas?.map((propuesta, idx) => (
                                                <li key={idx} className="flex gap-3 text-sm text-slate-700">
                                                    <span className="text-amber-500 mt-0.5"><CheckCircle2 className="w-4 h-4" /></span>
                                                    <span>{propuesta}</span>
                                                </li>
                                            ))}
                                        </ul>
                                    </div>
                                </div>
                                <div className="p-4 border-t bg-slate-50 flex justify-end">
                                    <button onClick={() => setViewingReport(null)} className="px-6 py-2 bg-slate-800 hover:bg-slate-900 text-white rounded-lg font-bold">Cerrar Reporte</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL CONFIGURACIONES Y PURGADO */}
                    {isSettingsModalOpen && (
                        <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                        <div className="bg-white rounded-2xl shadow-xl w-full max-w-2xl overflow-hidden flex flex-col max-h-[90vh]">
                            <div className="p-4 border-b flex justify-between bg-slate-50 shrink-0">
                                <h2 className="font-bold flex items-center gap-2"><Settings className="w-5 h-5 text-slate-500" /> Configuración y Mantenimiento</h2>
                                <button onClick={() => setIsSettingsModalOpen(false)}><X className="w-6 h-6 text-slate-400 hover:text-slate-700" /></button>
                            </div>
                            
                            <div className="p-6 overflow-y-auto flex-1 space-y-8">
                                <div className="border border-red-200 rounded-xl overflow-hidden">
                                    <div className="bg-red-50 p-4 border-b border-red-200 flex items-center gap-3">
                                        <Trash className="w-5 h-5 text-red-600"/>
                                        <div>
                                            <h3 className="font-bold text-red-900">Limpieza de Base de Datos</h3>
                                            <p className="text-xs text-red-700">Evita superar la cuota gratuita de lecturas de Firebase borrando datos antiguos.</p>
                                        </div>
                                    </div>
                                    <div className="p-4 bg-white flex justify-between items-center">
                                        <div className="text-sm text-slate-600">
                                            <p>Actualmente tienes <b>{posts.length}</b> posts y <b>{comments.length}</b> comentarios en total.</p>
                                        </div>
                                        <button onClick={purgeOldData} disabled={isPurging} className="bg-red-100 text-red-700 hover:bg-red-600 hover:text-white px-4 py-2 rounded-lg font-bold text-sm transition-colors flex items-center gap-2">
                                            {isPurging ? "Borrando..." : <><Trash2 className="w-4 h-4"/> Purgar &gt; 3 meses</>}
                                        </button>
                                    </div>
                                </div>
                            </div>

                            <div className="p-4 border-t bg-slate-50 flex justify-end shrink-0">
                                <button onClick={() => setIsSettingsModalOpen(false)} className="px-6 py-2 bg-slate-800 text-white rounded-lg font-bold hover:bg-slate-900 shadow-sm">Cerrar</button>
                            </div>
                        </div>
                        </div>
                    )}

                    {/* MODAL BORRADORES GENERADOS */}
                    {isDraftModalOpen && (
                        <div className="fixed inset-0 bg-black/60 z-[55] flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-white rounded-2xl shadow-xl w-full max-w-3xl flex flex-col max-h-[90vh] animate-in zoom-in duration-200">
                                <div className="p-4 border-b flex justify-between items-center bg-blue-50 shrink-0">
                                    <h2 className="font-bold text-blue-900 flex items-center gap-2"><Sparkles className="w-5 h-5 text-blue-600" /> Borradores de Publicaciones</h2>
                                    <button onClick={() => setIsDraftModalOpen(false)} className="p-1 hover:bg-blue-100 rounded-lg transition-colors"><X className="w-6 h-6 text-blue-700" /></button>
                                </div>
                                <div className="p-6 overflow-y-auto space-y-6 flex-1">
                                    <p className="text-sm text-slate-500 mb-4">La IA ha propuesto estas ideas basándose en los temas más comentados de tu último reporte.</p>
                                    {draftsList.map((draft, idx) => (
                                        <div key={idx} className="bg-white border-2 border-slate-100 rounded-xl p-5 hover:border-blue-200 transition-colors shadow-sm">
                                            <p className="text-xs font-bold text-blue-600 uppercase mb-2">Opción {idx + 1}: {draft.tema}</p>
                                            <p className="text-slate-700 font-medium whitespace-pre-wrap">{draft.texto}</p>
                                            <div className="mt-4 flex justify-end">
                                                <button onClick={() => copyToClipboard(draft.texto)} className="text-xs bg-slate-100 hover:bg-blue-100 text-slate-600 hover:text-blue-700 px-3 py-1.5 rounded-lg font-bold flex items-center gap-1 transition-colors">
                                                    <Copy className="w-3 h-3"/> Copiar Idea
                                                </button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <div className="p-4 border-t bg-slate-50 flex justify-end">
                                    <button onClick={() => setIsDraftModalOpen(false)} className="px-6 py-2 bg-slate-800 hover:bg-slate-900 text-white rounded-lg font-bold">Cerrar Borradores</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL DE CONTEXTO E INSTRUCCIÓN ESPECÍFICA (POST) */}
                    {isContextModalOpen && (
                        <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                        <div className="bg-white rounded-2xl shadow-xl w-full max-w-lg overflow-hidden flex flex-col max-h-[90vh]">
                            <div className="p-4 border-b flex justify-between bg-slate-50 shrink-0">
                            <h2 className="font-bold flex items-center gap-2"><Settings className="w-5 h-5 text-slate-500" /> Configuración de la Publicación</h2>
                            <button onClick={() => setIsContextModalOpen(false)}><X className="w-6 h-6 text-slate-400 hover:text-slate-700" /></button>
                            </div>
                            
                            <div className="p-6 overflow-y-auto flex-1 space-y-6">
                                <div>
                                    <label className="block text-sm font-bold text-slate-700 mb-1">Contexto Específico (Antecedentes)</label>
                                    <p className="text-[10px] text-slate-500 mb-2">Información de qué trata el post, datos importantes que la IA deba saber para responder.</p>
                                    <textarea value={tempContextText} onChange={(e) => setTempContextText(e.target.value)} placeholder="Ej: Se entregaron 500 apoyos en la colonia Centro..." className="w-full h-24 p-3 rounded-xl border border-slate-300 outline-none resize-none text-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-100" />
                                </div>
                                <div>
                                    <label className="block text-sm font-bold text-blue-700 mb-1">Instrucción Temporal para Respuestas</label>
                                    <p className="text-[10px] text-slate-500 mb-2">Una instrucción que SOLO aplique a este post (no se guardará como global).</p>
                                    <textarea value={tempPostInstruction} onChange={(e) => setTempPostInstruction(e.target.value)} placeholder="Ej: Agradecer reclamos ciudadanos y llevar respuesta hacia soluciones..." className="w-full h-24 p-3 rounded-xl border border-blue-300 outline-none resize-none text-sm bg-blue-50 focus:border-blue-500 focus:ring-2 focus:ring-blue-200" />
                                </div>
                            </div>

                            <div className="p-4 border-t bg-slate-50 flex justify-end gap-3 shrink-0">
                            <button onClick={() => setIsContextModalOpen(false)} className="px-4 py-2 text-slate-600 font-medium hover:bg-slate-200 rounded-lg">Cancelar</button>
                            <button onClick={savePostContext} className="px-6 py-2 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700 shadow-sm">Guardar Configuración</button>
                            </div>
                        </div>
                        </div>
                    )}

                    {/* MODAL PARA GUARDAR ALIAS */}
                    {isAliasModalOpen && (
                        <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                        <div className="bg-white rounded-2xl shadow-xl w-full max-w-sm overflow-hidden">
                            <div className="p-4 border-b flex justify-between bg-blue-50">
                                <h2 className="font-bold flex items-center gap-2 text-blue-800"><UserPlus className="w-5 h-5 text-blue-600" /> Memoria de Nombres</h2>
                                <button onClick={() => setIsAliasModalOpen(false)}><X className="w-5 h-5 text-blue-400 hover:text-blue-700" /></button>
                            </div>
                            <div className="p-5">
                                <div className="mb-4">
                                    <label className="block text-xs font-bold text-slate-500 uppercase">Nombre en Facebook:</label>
                                    <p className="text-slate-800 font-medium bg-slate-50 p-2 rounded border mt-1">{tempAliasOriginal}</p>
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-blue-600 uppercase">¿Cómo prefiere que le llamen?</label>
                                    <input 
                                        type="text" 
                                        value={tempAliasPreferred}
                                        onChange={(e) => setTempAliasPreferred(e.target.value)}
                                        placeholder="Ej: Pakin, Lic. José..."
                                        className="w-full mt-1 p-3 border-2 border-blue-200 rounded-lg focus:outline-none focus:border-blue-500 text-slate-800"
                                    />
                                    <p className="text-[10px] text-slate-500 mt-2">La IA recordará este alias en el futuro de forma automática al detectar a este usuario.</p>
                                </div>
                            </div>
                            <div className="p-4 border-t bg-slate-50 flex justify-end gap-3">
                                <button onClick={() => setIsAliasModalOpen(false)} className="px-4 py-2 text-slate-600 text-sm font-medium">Cancelar</button>
                                <button onClick={saveAlias} disabled={!tempAliasPreferred.trim()} className="px-6 py-2 bg-blue-600 text-white rounded-lg text-sm font-bold disabled:opacity-50">Guardar Alias</button>
                            </div>
                        </div>
                        </div>
                    )}

                    {/* MODAL PARA SOLICITAR API KEY */}
                    {isApiModalOpen && (
                        <div className="fixed inset-0 bg-black/60 z-[60] flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden animate-in fade-in zoom-in duration-200">
                                <div className="bg-blue-600 p-6 text-center">
                                    <div className="bg-white/20 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                                        <Key className="w-8 h-8 text-white" />
                                    </div>
                                    <h2 className="text-xl font-bold text-white">Configurar Gemini API Key</h2>
                                    <p className="text-blue-100 text-sm mt-2">Por seguridad, la llave se guarda de forma local en tu navegador y no en servidores públicos.</p>
                                </div>
                                <div className="p-6">
                                    <label className="block text-sm font-bold text-slate-700 mb-2">Ingresa tu API Key:</label>
                                    <input 
                                        type="password" 
                                        value={tempApiKey} 
                                        onChange={(e) => setTempApiKey(e.target.value)} 
                                        placeholder="AIzaSyA..." 
                                        className="w-full p-4 rounded-xl border-2 border-slate-200 focus:border-blue-500 outline-none text-slate-800 font-mono transition-colors"
                                    />
                                    <div className="mt-6 flex justify-end gap-3">
                                        <button onClick={() => { setIsApiModalOpen(false); setPendingAction(null); }} className="px-5 py-3 text-slate-500 font-medium hover:bg-slate-100 rounded-xl transition-colors">Cancelar</button>
                                        <button onClick={saveApiKeyAndExecute} disabled={!tempApiKey.trim()} className="px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold disabled:opacity-50 transition-colors shadow-md">Guardar y Continuar</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* NUEVO: MODAL PARA REGENERAR RESPUESTA ESPECÍFICA */}
                    {regeneratingCommentId && commentBeingRegenerated && (
                        <div className="fixed inset-0 bg-black/60 z-[55] flex items-center justify-center p-4 backdrop-blur-sm">
                        <div className="bg-white rounded-2xl shadow-xl w-full max-w-lg overflow-hidden flex flex-col max-h-[90vh] border border-purple-200">
                            <div className="p-4 border-b flex justify-between bg-purple-50 shrink-0">
                                <div>
                                    <h2 className="font-bold flex items-center gap-2 text-purple-900"><RefreshCw className="w-5 h-5 text-purple-600" /> Repensar Respuesta</h2>
                                    <p className="text-xs text-purple-700 mt-1">Dale instrucciones a la IA para mejorar esta respuesta.</p>
                                </div>
                                <button onClick={() => { setRegeneratingCommentId(null); setRegenerateInstruction(""); }} disabled={isRegeneratingSingle}><X className="w-6 h-6 text-purple-400 hover:text-purple-700" /></button>
                            </div>
                            
                            <div className="p-6 overflow-y-auto flex-1 space-y-4">
                                {/* Contexto del Comentario */}
                                <div className="bg-slate-50 border border-slate-200 p-3 rounded-xl text-sm">
                                    <p className="text-[10px] font-bold text-slate-400 uppercase mb-1">Comentario original de {commentBeingRegenerated.nombreUsuario}:</p>
                                    <p className="text-slate-700 italic">"{commentBeingRegenerated.originalComment}"</p>
                                    
                                    <div className="mt-3 pt-3 border-t border-slate-200">
                                        <p className="text-[10px] font-bold text-red-400 uppercase mb-1">Lo que dijo la IA (Versión actual):</p>
                                        <p className="text-slate-600 bg-white p-2 rounded border border-slate-100">"{commentBeingRegenerated.generatedResponse}"</p>
                                    </div>
                                </div>

                                {/* Campo para la instrucción */}
                                <div>
                                    <label className="block text-sm font-bold text-purple-700 mb-2">¿Cómo quieres que sea la nueva respuesta?</label>
                                    <textarea 
                                        value={regenerateInstruction} 
                                        onChange={(e) => setRegenerateInstruction(e.target.value)} 
                                        placeholder="Ej: Hazla más amable, agrega que este usuario es líder vecinal, menciona que el evento es mañana a las 5pm..." 
                                        className="w-full h-28 p-3 rounded-xl border-2 border-purple-200 outline-none resize-none text-sm focus:border-purple-500 focus:ring-2 focus:ring-purple-100" 
                                        disabled={isRegeneratingSingle}
                                    />
                                </div>
                            </div>

                            <div className="p-4 border-t bg-slate-50 flex justify-end gap-3 shrink-0">
                                <button onClick={() => { setRegeneratingCommentId(null); setRegenerateInstruction(""); }} disabled={isRegeneratingSingle} className="px-4 py-2 text-slate-600 font-medium hover:bg-slate-200 rounded-lg disabled:opacity-50">Cancelar</button>
                                <button 
                                    onClick={handleRegenerateExecute} 
                                    disabled={!regenerateInstruction.trim() || isRegeneratingSingle} 
                                    className="px-6 py-2 bg-purple-600 text-white rounded-lg font-bold hover:bg-purple-700 shadow-sm disabled:opacity-50 flex items-center gap-2"
                                >
                                    {isRegeneratingSingle ? <><RefreshCw className="w-4 h-4 animate-spin"/> Pensando...</> : "Generar nueva versión"}
                                </button>
                            </div>
                        </div>
                        </div>
                    )}
                </div>
            );
        }

        // Se usa try-catch para atrapar cualquier error antes de que quede la pantalla blanca
        try {
            const root = createRoot(document.getElementById('root'));
            root.render(<App />);
        } catch (error) {
            console.error(error);
            document.getElementById('root').innerHTML = '<div style="padding:20px; color:red; font-family:sans-serif; text-align:center;"><b>Error crítico al renderizar:</b><br><br>' + error.message + '</div>';
        }
    </script>
</body>
</html>
